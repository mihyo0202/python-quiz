<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Python Quiz — Pro (Select Mode)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
  --border: #2e3250; --accent: #7c6af7; --accent2: #56cfb2;
  --text: #e2e5f1; --muted: #7b82a8;
  --green: #34d399; --red: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Menu chọn đề */
#start-menu {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 17, 23, 0.98); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(5px);
}
.menu-box {
  background: var(--surface); border: 1px solid var(--border); padding: 32px 24px;
  border-radius: 16px; text-align: center; max-width: 450px; width: 90%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.menu-box h2 {
  font-size: 1.5rem; margin-bottom: 8px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.menu-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
.menu-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px; margin-bottom: 12px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all .2s;
}
.menu-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); transform: translateY(-2px); }
.menu-btn.highlight { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #0f1117; border: none; }
.menu-btn.highlight:hover { opacity: 0.9; box-shadow: 0 4px 15px rgba(86, 207, 178, 0.3); }

/* Header & Progress */
.header {
  background: rgba(26,29,39,0.95); border-bottom: 1px solid var(--border);
  padding: 14px 20px; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px); display: none;
}
.header-inner {
  max-width: 880px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}

/* Nút Thoát */
.btn-exit {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.btn-exit:hover { background: var(--red); border-color: var(--red); color: #fff; }

.header h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; color: var(--text); margin-right: auto; }
.progress-wrap { flex: 1; min-width: 160px; }
.progress-meta { font-size: 0.7rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 5px; }
.progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; width: 0%; }
.score-badge { font-size: 0.75rem; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; white-space: nowrap; }
.score-c { color: var(--green); }
.score-w { color: var(--red); }

/* Quiz Main Layout */
.main { max-width: 880px; margin: 0 auto; padding: 24px 16px 64px; display: none; }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; transition: border-color .3s; }
.q-card.answered-correct { border-color: rgba(52,211,153,.5); }
.q-card.answered-wrong   { border-color: rgba(248,113,113,.5); }

.q-head { display: flex; align-items: flex-start; gap: 12px; padding: 16px 18px 12px; }
.q-num { font-size: 0.7rem; font-weight: 700; letter-spacing: .05em; color: var(--text); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.q-num span.original-id { color: var(--muted); font-weight: 500; font-size: 0.85em; margin-left: 4px; }
.q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.55; flex: 1; }
.q-text u { text-decoration: underline; }
.q-status { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; opacity: 0; transition: opacity .3s; }
.q-status.show { opacity: 1; }
.q-status.correct-icon { background: var(--green); color: #0f1117; }
.q-status.wrong-icon   { background: var(--red); color: #fff; }

pre.code-block { 
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.6; 
  background: #13151f; border-left: 4px solid #4a5568; 
  padding: 16px 20px; margin: 0 18px 16px 18px; border-radius: 0 6px 6px 0; overflow-x: auto; color: #abb2bf; 
}
kw  { color: #c678dd; } fn  { color: #61afef; } bi  { color: #e5c07b; } num { color: #d19a66; } str, str * { color: #98c379 !important; } cmt, cmt * { color: #5c6370 !important; font-style: italic !important; } 

.options { padding: 0 18px 6px; display: grid; gap: 8px; }
.opt { display: flex; align-items: center; gap: 11px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: pointer; transition: all .15s; font-size: 0.9rem; user-select: none; }
.opt:hover:not(.disabled) { border-color: var(--accent); background: #252847; }
.opt-key { width: 26px; height: 26px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: all .15s; }
.opt-text { flex: 1; line-height: 1.4; }
.opt.correct { background: rgba(52,211,153,.1); border-color: var(--green); }
.opt.correct .opt-key { background: var(--green); color: #0f1117; }
.opt.wrong   { background: rgba(248,113,113,.1); border-color: var(--red); }
.opt.wrong   .opt-key { background: var(--red); color: #fff; }
.opt.disabled { cursor: default; }

.explanation { display: none; margin: 12px 18px 16px; padding: 12px 16px; background: rgba(124,106,247,.08); border-left: 3px solid var(--accent); border-radius: 0 7px 7px 0; font-size: 0.88rem; line-height: 1.65; color: #c4c9e8; }
.explanation .exp-label { font-size: 0.7rem; font-weight: 700; letter-spacing: .07em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
.explanation.show { display: block; }

#result-banner { display: none; background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 36px; text-align: center; margin-top: 24px; }
.grade-ring { width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; }
.grade-ring small { font-size: 0.62rem; font-weight: 500; color: var(--muted); }
#result-banner h2 { font-size: 1.5rem; margin-bottom: 8px; }
#result-banner p  { color: var(--muted); font-size: 0.88rem; }
.btn-reset { margin-top: 20px; padding: 11px 28px; border-radius: 8px; background: linear-gradient(90deg, var(--accent), #6554e8); color: #fff; font-weight: 700; font-size: 0.9rem; border: none; cursor: pointer; transition: opacity .2s; }
.btn-reset:hover { opacity: .85; }
@media (max-width: 540px) { .progress-wrap { order: 3; min-width: 100%; } .header h1 { order: 2; margin-left: auto; margin-right: 0; } .btn-exit { order: 1; margin-right: 10px; } }
</style>
</head>
<body>

<div id="start-menu">
  <div class="menu-box">
    <h2>🐍 Python Quiz Master</h2>
    <p>Chọn chế độ bạn muốn thử thách hôm nay</p>
    
    <button class="menu-btn" onclick="startQuiz(1)">
      <span>📘</span> Đề 1 - 100 Câu Cơ Bản (Cũ)
    </button>
    
    <button class="menu-btn" onclick="startQuiz(2)">
      <span>📙</span> Đề 2 - 100 Câu Nâng Cao (Từ PDF)
    </button>

    <button class="menu-btn" onclick="startQuiz(4)" style="border-color: var(--accent2);">
      <span>🧠</span> Đề 3 - 125 Câu Tư Duy Tính Toán
    </button>
    
    <button class="menu-btn highlight" onclick="startQuiz(3)">
      <span>🎲</span> Đề Random Tổng Hợp (50 Câu)
    </button>
  </div>
</div>

<header class="header" id="main-header">
  <div class="header-inner">
    <button class="btn-exit" onclick="location.reload()">🔙 Thoát</button>
    
    <h1 id="quiz-title">🐍 Python Quiz</h1>
    
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-text">0 / 0 đã trả lời</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    
    <div class="score-badge">
      <span class="score-c">✓ <span id="cnt-c">0</span></span>
      &nbsp;&nbsp;
      <span class="score-w">✗ <span id="cnt-w">0</span></span>
    </div>
  </div>
</header>

<main class="main" id="main-content">
  <div id="quiz-container"></div>
  <div id="result-banner">
    <div class="grade-ring" id="grade-ring"><span id="grade-txt">—</span><small id="grade-total">/ 100</small></div>
    <h2 id="res-title"></h2><p id="res-sub"></p>
    <button class="btn-reset" onclick="location.reload()">🔄 Chọn Đề Khác</button>
  </div>
</main>

<script>
// ==========================================
// DATA 1: 100 CÂU CƠ BẢN CŨ
// ==========================================
// ==========================================
// DATA 1: 100 CÂU CƠ BẢN (CẬP NHẬT ĐẦY ĐỦ TỪ PDF)
// ==========================================
const rawQuizData1 = [
  { q: "Output của đoạn code sau? (Trace Code kỹ):", c: "x = 0\nfor i in range(1, 5):\n  for j in range(1, i):\n    if (i + j) % 2 == 0:\n      x += i\n    else:\n      x -= 1\nprint(x)", o: ["A. 2", "B. 4", "C. 3", "D. 5"], a: 2, e: "Dựa vào logic, vòng lặp tính toán x ra lần lượt: -1 -> 2 -> 1 -> 0 -> 4 -> 3. Kết quả là 3." },
  { q: "Output? (Short-circuit & Side Effects):", c: "a = [0]\ndef f(i):\n  a[0] += 1\n  return 0\n\nif f(0) and f(1):\n  pass\n\nprint(a[0])", o: ["A. 1", "B. 2", "C. 0", "D. Error"], a: 0, e: "Toán tử 'and' có tính chất short-circuit. Do f(0) trả về 0 (False), vế sau f(1) bị bỏ qua. Hàm f chỉ chạy 1 lần làm a[0] bằng 1." },
  { q: "Output? (For-Else & Break Logic):", c: "c = 0\nfor i in range(3):\n  for j in range(3):\n    if i == j:\n      break\n    c += 1\n  else:\n    c += 10\nprint(c)", o: ["A. 33", "B. 3", "C. 30", "D. 6"], a: 1, e: "Khối else của vòng lặp for chỉ chạy khi không có break. Ở đây j luôn gặp break khi j==i. Khối else không bao giờ chạy. c đếm số lần lặp: 0+1+2 = 3." },
  { q: "Output? (Chain Comparison):", c: "print(1 < x and x < 10 == 5 > 5)", o: ["A. True", "B. False", "C. Error", "D. 1"], a: 1, e: "Vì 10==5 là False, toàn bộ chuỗi logic AND phía sau dù viết dưới dạng chain comparison cũng trả về False." },
  { q: "Output? (While loop trick):", c: "i = 0\nwhile i < 3:\n  i += 1\n  if i == 2:\n    continue\nelse:\n  i += 10\nprint(i)", o: ["A. 3", "B. 12", "C. 13", "D. Loop vô hạn"], a: 2, e: "While kết thúc tự nhiên khi i đạt 3 (không bị break). Lúc này else chạy, i+=10. Kết quả 3+10=13." },
  { q: "Output? (Operator Precedence):", c: "print(3 + 2 ** 3 // 4 * 2)", o: ["A. 5", "B. 7", "C. 6", "D. 8"], a: 1, e: "Thứ tự: Lũy thừa -> Chia -> Nhân -> Cộng. 2**3=8. 8//4=2. 2*2=4. 3+4=7." },
  { q: "Output? (Nested List Comp):", c: "print(sum([i*j for i in range(3) for j in range(3) if i == j]))", o: ["A. 3", "B. 5", "C. 14", "D. 6"], a: 1, e: "Lấy các cặp i==j là (0,0), (1,1), (2,2). Tính tổng các tích: 0 + 1 + 4 = 5." },
  { q: "Output? (Boolean Arithmetic):", c: "print(True + True - False - True - False)", o: ["A. 1", "B. 0", "C. True", "D. -1"], a: 0, e: "Trong Python toán học: True=1, False=0. Phép toán: 1 + 1 - 0 - 1 - 0 = 1." },
  { q: "Output? (Unpacking):", c: "a, *b, c = range(5)\nprint(b)", o: ["A. [1, 2, 3, 4]", "B. [1, 2, 3]", "C. [2, 3, 4]", "D. (1, 2, 3)"], a: 1, e: "a nhận 0 (đầu), c nhận 4 (cuối). *b nhận mảng phần còn lại ở giữa là [1, 2, 3]." },
  { q: "Output? (Try-Finally Flow):", c: "def f():\n  try:\n    return 1\n  finally:\n    return 2\n\nprint(f())", o: ["A. 1", "B. 2", "C. Error", "D. None"], a: 1, e: "Khối finally luôn được ưu tiên thực thi kể cả khi try đã có lệnh return. Nên return 2 ghi đè return 1." },
  { q: "Late Binding Closure problem, Output?:", c: "funcs = [lambda: i for i in range(3)]\nprint([f() for f in funcs])", o: ["A. [0, 1, 2]", "B. [2, 2, 2]", "C. [0, 0, 0]", "D. Error"], a: 1, e: "Late Binding: Biến i bên trong lambda trỏ đến scope ngoài. Khi gọi hàm thì vòng lặp đã xong, i bằng 2. Cả 3 hàm đều trả về 2." },
  { q: "Output? (Default Mutability):", c: "def f(x, l=[]):\n  for i in range(x):\n    l.append(i * i)\n  return l\n\nf(2)\nprint(f(2))", o: ["A. [0, 1]", "B. [0, 1, 0, 1]", "C. [0, 1, 4, 9]", "D. Error"], a: 1, e: "Default array l=[] chỉ khởi tạo 1 lần. Lần 1 gọi f(2) l=[0,1]. Lần 2 gọi f(2) tiếp tục nhét thêm vào l cũ thành [0, 1, 0, 1]." },
  { q: "Output? (Global vs Local):", c: "x = 5\ndef f():\n  try:\n    print(x)\n    x = 10\n  except:\n    print('Error')\n\nf()", o: ["A. 5", "B. 10", "C. Error", "D. None"], a: 2, e: "Vì có lệnh x=10 bên trong hàm, Python xem x là biến local. Việc in x trước khi biến được gán cục bộ gây UnboundLocalError." },
  { q: "Output? (Nonlocal):", c: "def outer():\n  x = 'local'\n  def inner():\n    nonlocal x\n    x = 'nonlocal'\n  inner()\n  return x\n\nprint(outer())", o: ["A. local", "B. nonlocal", "C. global", "D. Error"], a: 1, e: "Từ khóa nonlocal cho phép hàm inner cập nhật trực tiếp biến x của scope outer thay vì tạo biến local mới." },
  { q: "Output? (Args packing):", c: "def f(*args, **kwargs):\n  print(len(args) + len(kwargs))\n\nf(1, 2, 3, x=4, y=5)", o: ["A. 5", "B. 4", "C. 3", "D. 2"], a: 0, e: "args là tuple (1,2,3) dài 3. kwargs là dict {x:4, y:5} dài 2. Tổng chiều dài 3+2=5." },
  { q: "Output? (Keyword Only Args):", c: "def f(a, *, b):\n  return a + b\n\ntry:\n  print(f(1, 2))\nexcept:\n  print('Error')", o: ["A. 3", "B. Error", "C. None", "D. 1"], a: 1, e: "Tham số sau dấu sao (*) bắt buộc phải gọi dạng keyword. Gọi f(1, 2) gây lỗi TypeError. Cần gọi f(1, b=2)." },
  { q: "Output? (Decorator execution order):", c: "def d(f):\n  print('Dec')\n  return f\n\n@d\ndef func():\n  pass\n\nprint('Call')", o: ["A. Call Dec", "B. Dec Call", "C. Call", "D. Dec"], a: 1, e: "Decorator chạy lập tức khi hàm được định nghĩa (parse time). In 'Dec' trước. Lệnh print('Call') chạy sau." },
  { q: "Output? (Recursion Trace):", c: "def f(n):\n  if n == 0:\n    return 0\n  return n - f(n-1)\n\nprint(f(3))", o: ["A. 3", "B. 2", "C. 1", "D. 0"], a: 1, e: "f(0)=0. f(1)=1-0=1. f(2)=2-1=1. f(3)=3-1=2." },
  { q: "Output? (Generator):", c: "def g():\n  yield 1\n  yield 2\n  return 3\n\nx = list(g())\nprint(x)", o: ["A. [1, 2, 3]", "B. [1, 2]", "C. [1, 2, None]", "D. Error"], a: 1, e: "Return trong Generator sẽ ngắt (raise StopIteration) mà không đưa giá trị 3 vào list." },
  { q: "Output? (Lambda scope):", c: "x = 10; y = 20\nlambdas = [lambda x: x + y, lambda y: x + y]\nx = 20; y = 10\nprint(lambdas[0](10), lambdas[1](10))", o: ["A. 20 30", "B. 30 30", "C. 20 20", "D. Error"], a: 0, e: "Lambda 1: x(10)+y(global_10) = 20. Lambda 2: x(global_20)+y(10) = 30." },
  { q: "Output? (id of Immutables):", c: "a = 256; b = 256\nc = 257; d = 257\nprint(a is b, c is d)", o: ["A. True True", "B. True False", "C. False False", "D. False True"], a: 1, e: "Integer cache trong CPython cấp sẵn vùng nhớ cho [-5, 256]. 256 thì trỏ chung bộ nhớ (True). 257 thì là 2 object độc lập (False)." },
  { q: "Output? (List Mutation Loop):", c: "a = [1, 2, 3]\nfor x in a:\n  if x == 3:\n    a.append(x + 1)\n  if len(a) > 5:\n    break\nprint(len(a))", o: ["A. 3", "B. 4", "C. 5", "D. Error"], a: 1, e: "Khi x=3, append(4) vào list. Vòng lặp duyệt tiếp tới 4, x=4!=3 nên dừng append. Len cuối là 4." },
  { q: "Output? (Dict Key Hashing):", c: "d = {}\nd[1] = 'Float'\nd[1.0] = 'Int'\nd[True] = 'Bool'\nprint(len(d), d[1.0])", o: ["A. 3 Bool", "B. 1 Bool", "C. 3 Float", "D. 2 Int"], a: 1, e: "Python coi 1 == 1.0 == True có chung mã băm Hash. Các key này ghi đè nhau, dict có chiều dài 1, lấy value cuối được gán là 'Bool'." },
  { q: "Output? (Set logic):", c: "print({1, True, 1.0})", o: ["A. {1, True, 1.0}", "B. {1}", "C. {1, 1, 1}", "D. Error"], a: 1, e: "Tương tự như Dict, Set loại bỏ các giá trị trùng lặp (1 == True == 1.0) và giữ lại object khởi tạo đầu tiên là 1." },
  { q: "Output? (Copying):", c: "a = [[1]] * 2\na[0][0] = 2\nprint(a)", o: ["A. [[2], [1]]", "B. [[2], [2]]", "C. [[1], [1]]", "D. Error"], a: 1, e: "Phép nhân list list*2 tạo tham chiếu nông (shallow copy) tới cùng 1 list con. Sửa 1 chỗ ảnh hưởng cả 2. Kết quả [[2], [2]]." },
  { q: "Output? (Deepcopy):", c: "import copy\na = [1, [2]]\nb = copy.deepcopy(a)\na[1].append(3)\nprint(b)", o: ["A. [1, [2]]", "B. [1, [2, 3]]", "C. [1, [2, 3], 3]", "D. Error"], a: 0, e: "Deepcopy tách hoàn toàn bộ nhớ của list con. Sửa a không làm b thay đổi. b giữ nguyên gốc [1, [2]]." },
  { q: "Output? (Dict Pop):", c: "d = {'a': 1}\nprint(d.pop('b', 2))", o: ["A. Error", "B. None", "C. 2", "D. 1"], a: 2, e: "pop(key, default) trả về giá trị mặc định nếu key không tồn tại. Key 'b' không có nên trả về 2." },
  { q: "Output? (Set & FrozenSet):", c: "a = {frozenset({1, 2}), frozenset({2, 1})}\nprint(len(a))", o: ["A. 2", "B. 1", "C. Error", "D. 0"], a: 1, e: "frozenset({1, 2}) và ({2, 1}) giống hệt nhau về nội dung. Set tự động gom loại bỏ trùng lặp nên độ dài còn 1." },
  { q: "Output? (String Formatting):", c: "x = 123.456\nprint(f'{x:06.1f}')", o: ["A. 0123.5", "B. 123.50", "C. 00123.5", "D. 123.4"], a: 0, e: ".1f làm tròn 1 chữ số là 123.5. Quy định chiều dài chuỗi là 6 và đệm bằng 0. 123.5 có 5 ký tự -> thêm một 0 ở đầu thành 0123.5." },
  { q: "Output? (List Slicing Step):", c: "a = [1, 2, 3, 4]\na[::2] = [10, 20, 30]\nprint(a)", o: ["A. [10, 1, 20, 3, 30]", "B. [10, 20, 30, 4]", "C. Error", "D. [10, 20, 30]"], a: 2, e: "Slicing nhảy bước [::2] chọn ra đúng 2 vị trí (index 0, 2). Cố nhồi 3 giá trị [10,20,30] vào 2 slot sẽ quăng ValueError." },
  { q: "Output? (Dictionary Compression collision):", c: "print({x: x*2 for x in range(3) for x in range(2)})", o: ["A. {0: 0, 1: 2}", "B. {0: 0, 1: 2, 2: 4}", "C. Error", "D. {0:0, 1: 2, 2: 4}"], a: 0, e: "Vòng for lồng nhau dùng chung biến x. Vòng inner range(2) luôn đè biến x thành 0 và 1. Dict cuối chỉ có {0: 0, 1: 2}." },
  { q: "Output? (Tuple +=):", c: "t = ([],)\ntry:\n  t[0].extend([1])\nexcept:\n  print('Err')\nprint(t)", o: ["A. ([1],)", "B. ([],)", "C. Error", "D. None"], a: 0, e: "Tuple là bất biến nhưng List nằm TRONG nó là mutable. Dùng extend can thiệp thẳng vào list hợp lệ. t biến thành ([1],)." },
  { q: "Output? (Complex Slicing):", c: "l = list(range(10))\nprint(l[2:8:2])", o: ["A. [2, 4, 6]", "B. [2, 3, 4]", "C. [2, 5, 8]", "D. [2, 4, 6, 8]"], a: 0, e: "Cắt list từ index 2 tới cận 8 nhảy bước 2. Tương ứng lấy các index: 2, 4, 6." },
  { q: "Output? (Sorting with key):", c: "l = ['a', 'ccc', 'bb']\nprint(sorted(l, key=lambda x: (len(x), x)))", o: ["A. ['a', 'ccc', 'bb']", "B. ['a', 'bb', 'ccc']", "C. ['ccc', 'bb', 'a']", "D. Error"], a: 1, e: "Sắp xếp ưu tiên độ dài len(x) trước. Kế tiếp mới tới bảng chữ cái. 'a' (1) -> 'bb' (2) -> 'ccc' (3)." },
  { q: "Output? (Max with default):", c: "print(max([], default=0))", o: ["A. Error", "B. None", "C. 0", "D. []"], a: 2, e: "Hàm max trên array rỗng bị lỗi, nhưng dùng tham số default=0 sẽ báo an toàn và trả về số 0." },
  { q: "Output? (Any/All empty):", c: "print(any([]), all([]))", o: ["A. False False", "B. True True", "C. False True", "D. True False"], a: 2, e: "any([]) cần ít nhất 1 cái True -> False. all([]) mặc định True nếu không có ai vi phạm (Vacuous truth)." },
  { q: "Output? (Bytes vs String):", c: "print(len(b\"abc\") == len(\"abc\"))", o: ["A. True", "B. False", "C. Error", "D. None"], a: 0, e: "Chuỗi byte 'abc' dài 3. Chuỗi string 'abc' chuẩn ASCII cũng dài 3 ký tự. len bằng nhau là True." },
  { q: "Output? (Map & Filter lazy):", c: "m = map(lambda x: x, [1])\nprint(m == [1])", o: ["A. True", "B. False", "C. Error", "D. None"], a: 1, e: "map trả về một Map Object dạng lazy iterator, không phải là List thực tế nên so sánh sẽ trả về False." },
  { q: "Output? (Range lazy):", c: "r = range(10**10)\nprint(len(r))", o: ["A. 10000000000", "B. MemoryError", "C. 10", "D. Error"], a: 0, e: "Range object trong Python 3 cực kì thông minh (chỉ tính toán đầu cuối chứ không bung hết ra RAM). Len chạy bình thường trả đúng chiều dài." },
  { q: "Output? (Type of Class):", c: "class A: pass\nprint(type(A))", o: ["A. class", "B. object", "C. type", "D. Error"], a: 2, e: "Mọi class tạo ra trong Python đều là instance của metaclass có tên là 'type'." },
  { q: "Output? (MRO Diamond):", c: "class A:\n  def f(self): return 1\n\nclass B(A): pass\n\nclass C(A):\n  def f(self): return 2\n\nclass D(B, C): pass\nprint(D().f())", o: ["A. 1", "B. 2", "C. Error", "D. Both"], a: 1, e: "C3 MRO đa kế thừa: D -> B -> C -> A. B không có hàm f, C có f (return 2). Nó chạy và dừng tại C." },
  { q: "Output? (Super with arguments):", c: "class A:\n  def __init__(self, x): self.x = x\n\nclass B(A):\n  def __init__(self, x): super().__init__(x + 1)\n\nprint(B(1).x)", o: ["A. 1", "B. 2", "C. 3", "D. 0"], a: 1, e: "Khởi tạo B truyền 1. B gọi init class A và nhét 1+1=2 vào. A set x=2. In ra 2." },
  { q: "Output? (Class variables shadowing):", c: "class A: x = 1\na = A(); b = A()\na.x = 2; A.x = 3\nprint(a.x, b.x)", o: ["A. 2 1", "B. 3 3", "C. 2 3", "D. 2 2"], a: 2, e: "a.x tạo biến riêng. A.x cập nhật biến chung cho mọi instance không có biến riêng (như b). Vậy a.x=2, b.x=3." },
  { q: "Output? (Private name mangling):", c: "class A:\n  __x = 1\n\nclass B(A): pass\n\ntry:\n  print(B().__x)\nexcept:\n  print('Err')", o: ["A. 1", "B. Err", "C. None", "D. 0"], a: 1, e: "Biến __x bị name mangling ẩn giấu thành _A__x. Truy cập thẳng .__x bị lỗi AttributeError." },
  { q: "Output? (Polymorphism exception):", c: "class A:\n  def __len__(self): return 0\n\nprint(bool(A()))", o: ["A. True", "B. False", "C. Error", "D. None"], a: 1, e: "Nếu thiếu hàm bool(), Python mượn hàm len() định giá. Trả về độ dài rỗng (0) đồng nghĩa class bị ép thành False." },
  { q: "Output? (isinstance vs type):", c: "class A: pass\nclass B(A): pass\n\nprint(isinstance(B(), A), type(B()) == A)", o: ["A. True True", "B. True False", "C. False True", "D. False False"], a: 1, e: "isinstance dò theo nhánh kế thừa đa hình (B con A -> True). Hàm type() thì so sánh cứng nhắc tuyệt đối tên gốc B != A (False)." },
  { q: "Output? (Static Method):", c: "class A:\n  @staticmethod\n  def f(x):\n    return x * 2\n\nprint(A.f(5))", o: ["A. 10", "B. Error", "C. None", "D. 5"], a: 0, e: "Static method đứng độc lập như hàm global không cần self hay cls, có thể gọi thẳng bằng tên class. Trả về 5*2=10." },
  { q: "Output? (Class Method factory):", c: "class A:\n  val = 1\n  @classmethod\n  def create(cls): return cls().val\nclass B(A):\n  val = 2\nprint(B.create())", o: ["A. 1", "B. 2", "C. Error", "D. None"], a: 1, e: "Khi gọi B.create(), cls chính là class B. Phương thức sẽ khởi tạo thực thể B() và gọi thuộc tính val của B, trả về 2." },
  { q: "Output? (Property decorator):", c: "class A:\n  @property\n  def x(self): return 1\na = A()\ntry: a.x = 2\nexcept: print('Err')", o: ["A. a.x becomes 2", "B. Err", "C. Nothing happens", "D. Crash"], a: 1, e: "Decorator @property tạo ra thuộc tính chỉ đọc (read-only) nếu không định nghĩa thêm setter. Cố gán a.x = 2 sẽ sinh lỗi." },
  { q: "Output? (slots):", c: "class A:\n  __slots__ = ['a']\na = A()\ntry: a.y = 1\nexcept: print('Err')", o: ["A. y is set", "B. Err", "C. None", "D. Warn"], a: 1, e: "__slots__ ngăn chặn việc tạo thêm thuộc tính động ngoài những thuộc tính đã khai báo. Gán a.y = 1 sẽ bị từ chối." },
  { q: "Output? (new vs init):", c: "class A:\n  def __new__(cls): return 1\n  def __init__(self): print('Init')\nprint(A())", o: ["A. Init 1", "B. 1", "C. None", "D. Error"], a: 1, e: "__new__ trả về số 1 (không phải là thực thể của lớp A), do đó hàm __init__ sẽ bị bỏ qua không bao giờ được gọi." },
  { q: "Output? (Metaclasses simple):", c: "print(type(int))", o: ["A. object", "B. None", "C. type", "D. int"], a: 2, e: "Mọi class trong Python, bao gồm cả các kiểu xây dựng sẵn như int, str, list đều được sinh ra từ metaclass gốc là 'type'." },
  { q: "Output? (Hashable):", c: "try:\n  s = {1, (2, [3])}\nexcept:\n  print('Err')", o: ["A. No error", "B. Err", "C. None", "D. Warn"], a: 1, e: "Tuple chứa một list mutable bên trong, khiến bản thân tuple đó mất đi tính bất biến (hashable) nên không thể đưa vào trong Set." },
  { q: "Output? (Equality):", c: "class A:\n  def __eq__(self, o): return True\nprint(A() == 1)", o: ["A. True", "B. False", "C. Error", "D. None"], a: 0, e: "Hàm __eq__ (toán tử so sánh bằng) đã bị override luôn trả về True với bất cứ object nào được đem ra so sánh." },
  { q: "Output? (Call method):", c: "class A:\n  def __call__(self): return 1\nprint(A()())", o: ["A. 1", "B. Error", "C. A object", "D. None"], a: 0, e: "A() tạo ra một đối tượng (instance). Cặp ngoặc tròn thứ hai () kích hoạt dunder method __call__, thực thi hàm và trả về 1." },
  { q: "Output? (Super MRO again):", c: "class A: pass\nclass B(A): pass\nclass C(A): pass\nclass D(B, C): pass\nprint([c.__name__ for c in D.__mro__])", o: ["A. ['D', 'B', 'A', 'C', 'object']", "B. ['D', 'B', 'C', 'A', 'object']", "C. ['D', 'C', 'B', 'A']", "D. ['D', 'B', 'C']"], a: 1, e: "Theo thuật toán C3 Linearization, MRO sẽ tìm trên nhánh trái trước (B), nhánh phải sau (C), rồi mới hội tụ về gốc chung (A), cuối cùng là object." },
  { q: "Output? (Del method):", c: "class A:\n  def __del__(self): print('Bye')\na = A()\ndel a", o: ["A. Bye", "B. Nothing", "C. Error", "D. None"], a: 0, e: "Lệnh del a giải phóng bộ nhớ của object ngay lập tức, tự động kích hoạt hàm dọn rác __del__ và in ra 'Bye'." },
  { q: "Output? (Abstract Method Instantiation):", c: "from abc import ABC, abstractmethod\nclass A(ABC):\n  @abstractmethod\n  def f(self): pass\ntry: A()\nexcept: print('Err')", o: ["A. Creates A", "B. Err", "C. None", "D. Crash"], a: 1, e: "Không thể khởi tạo thực thể trực tiếp từ một Abstract Base Class chứa các abstract method chưa được định nghĩa hoàn chỉnh." },
  { q: "Output? (Inheritance variable check):", c: "class A: x = 1\nclass B(A): pass\nB.x = 2\nprint(A.x, B.x)", o: ["A. 2 2", "B. 1 2", "C. 2 1", "D. None"], a: 1, e: "B.x = 2 gán giá trị mới cho biến lớp B, độc lập với lớp cha A. Giá trị của A.x vẫn được bảo toàn là 1." },
  { q: "Output? (Multiple Init):", c: "class A:\n  def __init__(self): print('A')\nclass B(A):\n  def __init__(self): print('B')\nB()", o: ["A. B A", "B. B", "C. A B", "D. Error"], a: 1, e: "Hàm __init__ của lớp B đã ghi đè hoàn toàn hàm __init__ của lớp cha A. Do không có lệnh gọi super(), chỉ chữ 'B' được in ra." },
  { q: "Độ phức tạp của đoạn code? \nfor i in range(n):\n  j = 1\n  while j < n:\n    j *= 2", c: "", o: ["A. O(n²)", "B. O(n log n)", "C. O(n)", "D. O(log n)"], a: 1, e: "Vòng lặp ngoài chạy n lần. Vòng lặp trong tăng j theo cấp số nhân (j *= 2) nên tốn log(n) bước. Tổng cộng: O(n log n)." },
  { q: "Độ phức tạp của hàm đệ quy sau? \ndef f(n):\n  if n <= 1: return 1\n  return f(n-1) + f(n-1)", c: "", o: ["A. O(n)", "B. O(n²)", "C. O(2^n)", "D. O(log n)"], a: 2, e: "Mỗi lần gọi hàm lại sinh ra thêm 2 nhánh gọi đệ quy mới. Tạo thành một cây nhị phân hoàn chỉnh với độ sâu n. Độ phức tạp là hàm mũ O(2^n)." },
  { q: "Cấu trúc dữ liệu nào tìm kiếm nhanh nhất trong trường hợp tổng quát (Average Case)?", c: "", o: ["A. List", "B. Dictionary (Hash Map)", "C. Tuple", "D. Ordered List"], a: 1, e: "Dictionary (Hash Map) có thời gian tra cứu trung bình là O(1) nhờ cơ chế định vị khóa bằng hàm băm (hash function)." },
  { q: "Thuật toán sắp xếp nào là Stable Sort (Sắp xếp ổn định)?", c: "", o: ["A. Quick Sort", "B. Merge Sort", "C. Heap Sort", "D. Selection Sort"], a: 1, e: "Merge Sort giữ nguyên thứ tự tương đối của các phần tử có giá trị bằng nhau sau khi sắp xếp, nên nó là Stable Sort." },
  { q: "Stack Overflow do đệ quy thường xảy ra do thiếu:", c: "", o: ["A. RAM", "B. Base case (Điều kiện dừng)", "C. CPU Speed", "D. Disk space"], a: 1, e: "Nếu thiếu điều kiện dừng (base case), đệ quy sẽ lặp vô tận, đắp liên tục các khung gọi hàm vào Call Stack cho tới khi tràn bộ nhớ." },
  { q: "Đệ quy có ưu điểm gì so với vòng lặp?", c: "", o: ["A. Chạy nhanh hơn", "B. Code gọn hơn với các bài toán chia nhỏ/cây", "C. Tốn ít bộ nhớ RAM hơn", "D. Không bao giờ gửi lỗi"], a: 1, e: "Đệ quy biểu diễn logic các bài toán chia để trị, đồ thị, thuật toán duyệt cây cực kỳ tự nhiên, thanh thoát và dễ hiểu." },
  { q: "Bài toán Tháp Hà Nội 3 tầng cần bao nhiêu bước tối thiểu?", c: "", o: ["A. 9", "B. 7", "C. 5", "D. 8"], a: 1, e: "Công thức số bước giải bài toán Tháp Hà Nội cho n tầng đĩa là (2^n) - 1. Với n=3, ta có 2^3 - 1 = 7 bước." },
  { q: "Tìm kiếm nhị phân trên mảng [1, 3, 5, 7, 9], tìm số 8. Các số được so sánh lần lượt ở mốc mid là:", c: "", o: ["A. 5, 7, 9", "B. 5, 7, 9 (Theo logic middle index floor)", "C. 1, 3, 5", "D. 9, 7, 5"], a: 1, e: "Vòng 1 mốc mid là 5. Vì 8 > 5 nên lấy nửa phải [7, 9]. Vòng 2 mid là 7. Vòng 3 mid là 9. Trả về không tìm thấy." },
  { q: "Phương thức sắp xếp list.sort() trong Python mặc định dùng thuật toán gì?", c: "", o: ["A. QuickSort", "B. Timsort", "C. MergeSort", "D. BubbleSort"], a: 1, e: "Timsort là thuật toán lai ghép đỉnh cao giữa Merge Sort và Insertion Sort, được tối ưu hóa đặc biệt cho dữ liệu thực tế." },
  { q: "So sánh độ phức tạp của phép toán 'x in collection' giữa list và set?", c: "", o: ["A. Ngang nhau", "B. List O(n), Set O(1)", "C. List O(1), Set O(n)", "D. List O(log n)"], a: 1, e: "List phải quét tuần tự từng phần tử một O(n). Set sử dụng bảng băm (hash table) giúp kiểm tra cực kỳ nhanh chóng trong O(1)." },
  { q: "Khi nào thực tế nên ưu tiên sử dụng Generator (yield) thay vì tạo ra toàn bộ List?", c: "", o: ["A. Khi cần truy cập ngẫu nhiên index", "B. Khi xử lý luồng dữ liệu lớn để tiết kiệm bộ nhớ RAM", "C. Khi cần sắp xếp", "D. Khi dữ liệu nhỏ"], a: 1, e: "Generator sinh ra dữ liệu theo từng nhịp (on-the-fly) thay vì nạp toàn bộ mảng khổng lồ vào RAM." },
  { q: "Độ phức tạp thời gian khi gọi hàm min() trên một tập Set là?", c: "", o: ["A. O(n)", "B. O(1)", "C. O(log n)", "D. O(n²)" ], a: 0, e: "Bản chất Set lưu trữ giá trị phân tán và không có thứ tự. Hàm min() bắt buộc phải quét rà soát toàn bộ Set O(n) để tìm phần tử nhỏ nhất." },
  { q: "Hàng đợi (Queue) giả lập bằng cấu trúc Python List có nhược điểm chí mạng gì khi dùng lệnh pop(0)?", c: "", o: ["A. Không có", "B. O(n) do phải dịch chuyển toàn bộ phần tử", "C. O(1)", "D. Không remove được"], a: 1, e: "Khi bóc phần tử đầu mảng, CPU phải đẩy toàn bộ các phần tử còn lại tụt về phía trước 1 bậc, gây tốn kém O(n) thời gian xử lý." },
  { q: "Để cài đặt cấu trúc hàng đợi (Queue) hiệu năng hoàn hảo O(1) thao tác ở cả 2 đầu, ta dùng thư viện class nào?", c: "", o: ["A. list", "B. collections.deque", "C. set", "D. tuple"], a: 1, e: "Double Ended Queue (Deque) là danh sách liên kết đôi tối ưu chuyên trị những thao tác thêm/xóa dữ liệu nhạy bén ở hai cực." },
  { q: "Thuật toán Dijkstra được sử dụng rộng rãi cho mục đích nào?", c: "", o: ["A. Sắp xếp", "B. Tìm đường đi ngắn nhất trong đồ thị", "C. Tìm kiếm chuỗi", "D. Mã hóa"], a: 1, e: "Thuật toán nổi tiếng dùng trong quy hoạch tìm lộ trình, tối ưu hóa đường truyền mạng và GPS với trọng số khoảng cách dương." },
  { q: "Trong trường hợp tồi tệ nhất (các Node bị add liên tiếp lệch hẳn 1 bên), độ phức tạp tìm kiếm của Binary Search Tree (BST) là:", c: "", o: ["A. O(log n)", "B. O(n log n)", "C. O(n)", "D. O(n²)" ], a: 2, e: "Cây bị biến dạng duỗi thẳng tắp không khác gì một danh sách liên kết thông thường, đánh mất đi lợi thế phân đôi mảng (O(n))." },
  { q: "Hash collision (Va chạm băm) được Python xử lý thế nào trong cấu trúc Dict?", c: "", o: ["A. Link list", "B. Open addressing (Probe)", "C. Bỏ qua", "D. Crash"], a: 1, e: "Khi đụng độ hash, Python dùng thuật toán thăm dò (Probing) để dò quét sang các vị trí slot ngẫu nhiên khác còn trống trong bảng băm." },
  { q: "Sử dụng Quy hoạch động (Dynamic Programming - Array Memoization) tính Fibonacci có độ phức tạp thời gian là?", c: "", o: ["A. O(n)", "B. O(2^n)", "C. O(1)", "D. O(n²)" ], a: 0, e: "Quy hoạch động lưu lại đáp án bài toán con tránh việc tính đệ quy trùng lặp nhiều lần, kéo hạ thời gian chạy từ hàm mũ xuống tuyến tính O(n)." },

  { q: "Output của đoạn code sau? (Thay đổi List trong lúc đang lặp)", c: "nums = [1, 2]\nfor x in nums:\n  nums.append(x * 10)\n  if len(nums) == 4:\n    break\nprint(nums)", o: ["A. [1, 2, 10, 20]", "B. [1, 2, 10]", "C. Vòng lặp vô hạn", "D. RuntimeError"], a: 0, e: "Khi lặp trong Python, iterator theo dõi index mảng. Loop 1: thêm 10 (len 3). Loop 2: thêm 20 (len 4). If đạt điều kiện break. Mảng cuối: [1, 2, 10, 20]." },
  { q: "Output của đoạn code sau? (Cơ chế băm key của Dictionary)", c: "d = {}\nd[0] = 'Text'\nd[0.0] = 'Float Zero'\nd[False] = 'Bool False'\nprint(len(d), d[0])", o: ["A. 3 Zero", "B. 1 Bool False", "C. 1 Float Zero", "D. 3 Bool False"], a: 1, e: "0, 0.0, và False trong Python đều hash về cùng một mã và tính là bằng nhau. Dict chỉ lưu 1 key, giá trị bị ghi đè liên tục lấy giá trị cuối: Bool False." },
  { q: "Output của đoạn code sau? (Logic của Set với các giá trị tương đương)", c: "my_set = {0, False, 0.0}\nprint(len(my_set))", o: ["A. 1", "B. 2", "C. 3", "D. TypeError"], a: 0, e: "Set tự động loại bỏ trùng lặp. Tương tự như Dict, 0 == False == 0.0, nên Set hợp nhất tất cả lại và chỉ giữ lại 1 phần tử duy nhất." },
  { q: "Output của đoạn code sau? (Nhân bản List chứa List con - Copying)", c: "matrix = [[0]] * 3\nmatrix[0][0] = 5\nprint(matrix)", o: ["A. [[5], [0], [0]]", "B. [[5], [5], [5]]", "C. [[0], [5], [0]]", "D. IndexError"], a: 1, e: "Nhân list chứa list bằng toán tử * sinh ra hiện tượng Shallow copy (tham chiếu tới cùng 1 list con). Sửa 1 chỗ, cả 3 dòng đều biến thành 5." },
  { q: "Output của đoạn code sau? (Deepcopy vs Shallow copy)", c: "import copy\nlst1 = [10, [20, 30]]\nlst2 = copy.deepcopy(lst1)\nlst1[1][0] = 99\nprint(lst2[1][0])", o: ["A. 20", "B. 99", "C. 10", "D. AttributeError"], a: 0, e: "Hàm deepcopy tách biệt tài nguyên bộ nhớ hoàn toàn ở cả tầng list con. Sự thay đổi ở lst1 thành 99 không hề làm ảnh hưởng tới lst2 (giữ nguyên 20)." },
  { q: "Output của đoạn code sau? (Lấy giá trị an toàn với Dict Pop)", c: "info = {'name': 'Bot'}\nresult = info.pop('age', 18)\nprint(result)", o: ["A. KeyError", "B. None", "C. 18", "D. 'Bot'"], a: 2, e: "Hàm pop(key, default) quét tìm key. Nếu key không tồn tại, nó sẽ không báo lỗi KeyError mà ném ra giá trị default dự phòng là 18." },
  { q: "Output của đoạn code sau? (Tính chất của Frozenset)", c: "s1 = frozenset([1, 2, 3])\ns2 = frozenset([3, 2, 1])\nmy_dict = {s1: 'A', s2: 'B'}\nprint(len(my_dict))", o: ["A. 1", "B. 2", "C. TypeError", "D. 0"], a: 0, e: "Frozenset là set bất biến nên có thể làm key của dict. s1 và s2 chứa nội dung y hệt nhau nên tính là cùng 1 key, đè nhau khiến độ dài dict = 1." },
  { q: "Output của đoạn code sau? (Định dạng chuỗi căn lề số)", c: "n = 5\nprint(f'{n:03d}')", o: ["A. 005", "B. 5.00", "C. 500", "D. 05"], a: 0, e: "Cú pháp f-string :03d nghĩa là định dạng số nguyên (d), chiều rộng tối thiểu 3 ký tự, đệm bằng số 0 ở đầu nếu chưa đủ. Kết quả là 005." },
  { q: "Output của đoạn code sau? (Cắt list với bước nhảy âm)", c: "word = ['P', 'y', 't', 'h', 'o', 'n']\nprint(word[::-2])", o: ["A. ['n', 'h', 'y']", "B. ['n', 'o', 't']", "C. ['P', 'h', 'o']", "D. ['P', 't', 'n']"], a: 0, e: "Slicing [::-2] đảo ngược mảng bắt đầu từ cuối, và nhảy bước 2. Quét ra 'n', nhảy qua 'o' lấy 'h', nhảy qua 't' lấy 'y'." },
  { q: "Output của đoạn code sau? (Dictionary Comprehension với 2 vòng lặp)", c: "d = {i: j for i in range(2) for j in range(3)}\nprint(d)", o: ["A. {0:0, 1:1, 2:4}", "B. SyntaxError", "C. {0: 2, 1: 2}", "D. {0:0, 0:1, ...}"], a: 2, e: "Hai vòng for lồng nhau. Từng i(0, 1) sẽ ghi key i với value j(0, 1, 2). Mỗi lần j chạy thì giá trị value lại đè vào key i. Kết thúc value của mọi key chốt ở số 2." },
  { q: "Output của đoạn code sau? (Chỉnh sửa List nằm bên trong Tuple)", c: "t = ([1, 2], 'A')\nt[0].append(3)\nprint(t)", o: ["A. ([1, 2, 3], 'A')", "B. Lỗi TypeError", "C. ([1, 2], 'A')", "D. ('A', 3)"], a: 0, e: "Tuple không thể gán biến khác (t[0] = ... sẽ lỗi), nhưng list nằm bên trong thì khả biến. Sửa trực tiếp ruột của list [1, 2] thành [1, 2, 3] hợp lệ." },
  { q: "Output của đoạn code sau? (Complex Slicing)", c: "arr = [0, 10, 20, 30, 40, 50]\nprint(arr[1:5:2])", o: ["A. [10, 30]", "B. [10, 20, 30]", "C. [0, 20, 40]", "D. IndexError"], a: 0, e: "Cắt mảng từ index 1 (số 10) tới index 4 nhảy bước 2. Lấy vị trí 1 (10), rồi vị trí 3 (30). Mảng kết quả [10, 30]." },
  { q: "Output của đoạn code sau? (Sắp xếp nâng cao với tham số key)", c: "words = ['apple', 'bat', 'cat', 'banana']\nprint(sorted(words, key=lambda x: len(x)))", o: ["A. ['bat', 'cat', 'apple', 'banana']", "B. ['apple', 'banana', 'bat', 'cat']", "C. ['banana', 'apple', 'bat', 'cat']", "D. TypeError"], a: 0, e: "Sắp xếp tăng dần theo độ dài len. 'bat'(3), 'cat'(3) đứng trước, 'apple'(5) rồi tới 'banana'(6). sorted() của Python là Stable Sort nên giữ nguyên thứ tự bat và cat." },
  { q: "Output của đoạn code sau? (Hàm Any/All với mảng rỗng)", c: "print(all([]), any([]))", o: ["A. True False", "B. False True", "C. False False", "D. True True"], a: 0, e: "all() quét mảng rỗng theo lý thuyết 'vacuous truth' không tìm thấy ai vi phạm, nên trả về True. any() cần ít nhất 1 phần tử mang giá trị True, mảng rỗng trả False." },
  { q: "Output của đoạn code sau? (Tính lười biếng của hàm Map)", c: "nums = [1, 2, 3]\nm = map(lambda x: x * 2, nums)\ntry:\n  print(m[0])\nexcept Exception as e:\n  print(type(e).__name__)", o: ["A. TypeError", "B. 2", "C. 1", "D. None"], a: 0, e: "Hàm map() trả về Map Iterator Object mang tính chất lazy evaluation, không phải một mảng thực. Không hỗ trợ truy cập dạng index m[0], ném ra TypeError." },
  { q: "Output của đoạn code sau? (So sánh String thông thường và Bytes)", c: "s1 = 'abc'\ns2 = b'abc'\nprint(len(s1) == len(s2), type(s1) == type(s2))", o: ["A. True False", "B. True True", "C. False False", "D. False True"], a: 0, e: "Số lượng ký tự / byte đều là 3 nên chiều dài bằng nhau (True). Nhưng kiểu dữ liệu khác nhau (str khác bytes) nên type bằng nhau là False." },
  { q: "Output của đoạn code sau? (Phạm vi biến trong list Comprehension)", c: "val = 99\narr = [val for val in range(3)]\nprint(val)", o: ["A. 99", "B. 2", "C. 3", "D. NameError"], a: 0, e: "Từ Python 3, biến đếm của List Comprehension bị giam trong scope nội bộ của nó. Nó không bị 'rò rỉ' rác ra ngoài đè lên biến val = 99 ở global." },
  { q: "Output của đoạn code sau? (Xử lý mảng cực lớn với hàm Range)", c: "r = range(10**12)\nprint(len(r))", o: ["A. 1000000000000", "B. MemoryError", "C. 10", "D. 0"], a: 0, e: "Range trong Python là cấu trúc lazy cực thông minh. Nó chỉ lưu thông số đầu/cuối/bước chứ không bung toàn bộ mảng ra RAM, nên gọi len() trả số ngay tức khắc không tràn bộ nhớ." },
  { q: "Output của đoạn code sau? (Kiểu dữ liệu của một Class)", c: "class Student:\n  pass\nprint(type(Student))", o: ["A. <class 'type'>", "B. <class 'object'>", "C. <class '__main__.Student'>", "D. TypeError"], a: 0, e: "Trong Python, mọi thứ đều là object, kể cả class. Class được đúc ra từ một cấu trúc cha (metaclass) cao nhất mang tên là 'type'." },
  // --- PHẦN 2: LẬP TRÌNH HƯỚNG ĐỐI TƯỢNG - OOP ---
  { q: "Output của đoạn code sau? (Thứ tự phân giải phương thức - MRO)", c: "class A:\n  def ping(self): return 'A'\nclass B(A):\n  def ping(self): return 'B'\nclass C(A):\n  def ping(self): return 'C'\nclass D(B, C): pass\nprint(D().ping())", o: ["A. A", "B. B", "C. C", "D. Lỗi (Error)"], a: 1, e: "Đa kế thừa Python áp dụng thuật toán C3 Linearization. Lớp D kế thừa B và C. Nó ưu tiên tra trái sang phải, tìm thấy hàm ping ở B trước nên dừng và in ra B." },
  { q: "Output của đoạn code sau? (Kế thừa và hàm super)", c: "class Parent:\n  def show(self): return 'P'\nclass Child(Parent):\n  def show(self): return super().show() + 'C'\nprint(Child().show())", o: ["A. P", "B. C", "C. PC", "D. AttributeError"], a: 2, e: "Lệnh super().show() gọi kích hoạt hàm ở lớp cha Parent trả về 'P', cộng nối chuỗi nội bộ thành 'PC'." },
  { q: "Output của đoạn code sau? (Biến của Class so với biến của Instance)", c: "class Dog:\n  legs = 4\nd1 = Dog()\nd2 = Dog()\nd1.legs = 3\nprint(d1.legs, d2.legs, Dog.legs)", o: ["A. 3 3 4", "B. 3 4 4", "C. 4 4 4", "D. 3 3 3"], a: 1, e: "d1.legs=3 tạo một biến cục bộ cho instance d1. Trong khi đó d2 vẫn tham chiếu lên biến class chung. Kết quả 3, 4, 4." },
  { q: "Output của đoạn code sau? (Name Mangling)", c: "class Secret:\n  __key = 123\ns = Secret()\ntry:\n  print(s.__key)\nexcept AttributeError:\n  print('Err')", o: ["A. 123", "B. Err", "C. None", "D. _Secret__key"], a: 1, e: "Biến có 2 dấu gạch dưới tự động bị Name Mangling giấu đi thành _Secret__key. Truy cập ngoài class qua tên __key ném ra AttributeError." },
  { q: "Output của đoạn code sau? (Magic Method quy định giá trị Boolean)", c: "class EmptyBox:\n  def __len__(self):\n    return 0\nbox = EmptyBox()\nprint(bool(box))", o: ["A. True", "B. False", "C. TypeError", "D. 0"], a: 1, e: "Nếu thiếu hàm __bool__, hàm bool() sẽ mượn kết quả của hàm __len__ để định giá. Trả về độ dài 0 đồng nghĩa với False." },
  { q: "Output của đoạn code sau? (So sánh isinstance và type)", c: "class Animal: pass\nclass Cat(Animal): pass\nc = Cat()\nprint(isinstance(c, Animal), type(c) == Animal)", o: ["A. True True", "B. True False", "C. False True", "D. False False"], a: 1, e: "isinstance dò phả hệ đa hình, Cat là con của Animal nên trả True. Hàm type() so sánh cứng nhắc nguồn gốc tuyệt đối Cat != Animal trả False." },
  { q: "Output của đoạn code sau? (Phương thức tĩnh - Static Method)", c: "class MathUtils:\n  @staticmethod\n  def add(a, b):\n    return a + b\nprint(MathUtils.add(3, 4))", o: ["A. 7", "B. Lỗi (Thiếu self)", "C. None", "D. 3"], a: 0, e: "Static method đứng độc lập không cần thuộc tính self hay cls, hoạt động như một hàm ngoài đời thực nhưng gắn trong không gian tên class." },
  { q: "Output của đoạn code sau? (Phương thức lớp - Class Method)", c: "class Counter:\n  count = 0\n  @classmethod\n  def inc(cls):\n    cls.count += 1\n    return cls.count\nprint(Counter.inc(), Counter().inc())", o: ["A. 1 1", "B. 1 2", "C. 0 1", "D. TypeError"], a: 1, e: "Class method dùng 'cls' thao tác trực tiếp lên biến class gốc. Lần gọi 1 biến lên 1. Lần gọi 2 (dù qua thực thể) vẫn điều khiển class gốc lên 2." },
  { q: "Output của đoạn code sau? (Hành vi của Property Decorator)", c: "class User:\n  @property\n  def name(self):\n    return 'Admin'\nu = User()\ntry:\n  u.name = 'Guest'\nexcept AttributeError:\n  print('Err')", o: ["A. Admin", "B. Guest", "C. Err", "D. None"], a: 2, e: "@property biến hàm name thành một thuộc tính Read-only (chỉ đọc). Cố tình gán dữ liệu vào bị Python chặn gây AttributeError." },
  { q: "Output của đoạn code sau? (Tối ưu bộ nhớ nhờ slots)", c: "class Point:\n  __slots__ = ('x', 'y')\n  def __init__(self, x, y):\n    self.x = x\n    self.y = y\np = Point(1, 2)\ntry:\n  p.z = 3\nexcept AttributeError:\n  print('Err')", o: ["A. 3", "B. Err", "C. None", "D. NameError"], a: 1, e: "Sử dụng __slots__ khóa cứng từ điển biến __dict__ chặn không cho thêm thuộc tính rác. Cố khởi tạo p.z sinh ra AttributeError." },
  { q: "Output của đoạn code sau? (Sự khác biệt giữa __new__ và __init__)", c: "class A:\n  def __new__(cls):\n    print('New')\n    return super().__new__(cls)\n  def __init__(self):\n    print('Init')\na = A()", o: ["A. New tiếp theo Init", "B. New", "C. Init tiếp theo New", "D. TypeError"], a: 0, e: "__new__ là hàm sinh học cấp phát bộ nhớ gọi trước. Xong xuôi mới gọi hàm thiết lập thuộc tính __init__ phía sau." },
  { q: "Output của đoạn code sau? (Kiểu dữ liệu của các class cơ sở - Metaclass)", c: "print(type(str), type(list))", o: ["A. <class 'str'> <class 'list'>", "B. <class 'object'> <class 'object'>", "C. <class 'type'> <class 'type'>", "D. TypeError"], a: 2, e: "Mọi hệ quy chiếu Class built-in như int, str, list hay do người dùng tự tạo trong Python đều chung cội nguồn từ metaclass cốt lõi là 'type'." },
  { q: "Output của đoạn code sau? (Tính băm - Hashable của đối tượng)", c: "t = (1, 2, [3])\nd = {}\ntry:\n  d[t] = 'value'\nexcept TypeError:\n  print('Err')", o: ["A. OK", "B. Err", "C. None", "D. SyntaxError"], a: 1, e: "Dù Tuple immutable nhưng chứa phần tử con list mutable. Tuple lây nhiễm tính biến đổi nên trở thành Unhashable, không thể làm key dictionary." },
  { q: "Output của đoạn code sau? (Ghi đè toán tử so sánh bằng eq)", c: "class AlwaysEqual:\n  def __eq__(self, other):\n    return True\nobj = AlwaysEqual()\nprint(obj == 'Anything', obj == 404)", o: ["A. False False", "B. True True", "C. TypeError", "D. True False"], a: 1, e: "Overriding hàm ma thuật __eq__ ép giá trị trả về True. Toán tử == luôn hỏi hàm này nên obj bằng bất cứ thứ gì trên đời." },
  { q: "Output của đoạn code sau? (Hàm call)", c: "class Multiplier:\n  def __init__(self, factor):\n    self.factor = factor\n  def __call__(self, x):\n    return x * self.factor\ndouble = Multiplier(2)\nprint(double(5))", o: ["A. 2", "B. 5", "C. 10", "D. TypeError"], a: 2, e: "Magic method __call__ biến thực thể của Class hoạt động đóng giả như một function. double(5) gọi call: 5 * 2 = 10." },
  { q: "Output của đoạn code sau? (C3 Linearization)", c: "class A: pass\nclass B(A): pass\nclass C(A): pass\nclass D(B, C): pass\nprint([cls.__name__ for cls in D.__mro__[:4]])", o: ["A. ['D', 'B', 'A', 'C']", "B. ['D', 'B', 'C', 'A']", "C. ['D', 'C', 'B', 'A']", "D. MRO Error"], a: 1, e: "Theo C3 MRO, Python quét con D trước, rẽ trái nhánh B, đi sang nhánh C, rồi mới quy nạp về gốc A chung cuối cùng. D -> B -> C -> A." },
  { q: "Output của đoạn code sau? (Garbage Collection với del)", c: "class Test:\n  def __del__(self):\n    print('Deleted')\nt = Test()\nt = None\nprint('End')", o: ["A. End Ended", "B. Deleted End", "C. Deleted", "D. End"], a: 1, e: "Gán t=None giải phóng tức thì RAM bộ nhớ thực thể t ban đầu. Trình thu gom rác tự động kích hoạt __del__ in 'Deleted' rồi luồng mới chạy tiếp in 'End'." },
  { q: "Output của đoạn code sau? (Khởi tạo Abstract Base Class)", c: "from abc import ABC, abstractmethod\nclass Shape(ABC):\n  @abstractmethod\n  def area(self): pass\ntry:\n  s = Shape()\nexcept TypeError:\n  print('Err')", o: ["A. OK", "B. Err", "C. None", "D. ImportError"], a: 1, e: "Lớp trừu tượng (Abstract Class) đại diện cho khung thiết kế bản vẽ chưa hoàn chỉnh. Khởi tạo trực tiếp thực thể từ bản vẽ gây lỗi TypeError." },
  { q: "Output của đoạn code sau? (Độc lập biến class khi kế thừa)", c: "class Base:\n  val = 1\nclass Sub(Base):\n  pass\nSub.val += 2\nprint(Base.val, Sub.val)", o: ["A. 1 1", "B. 3 3", "C. 1 3", "D. 2 1"], a: 2, e: "Phép thay đổi Sub.val tự động khởi tạo biến mới riêng biệt trên class Sub. Biến gốc Base.val được bảo vệ độc lập là 1, của Sub thành 3." },
  { q: "Output của đoạn code sau? (Kế thừa thiếu super().__init__)", c: "class Parent:\n  def __init__(self):\n    self.x = 10\nclass Child(Parent):\n  def __init__(self):\n    self.y = 20\nc = Child()\ntry:\n  print(c.x)\nexcept AttributeError:\n  print('Err')", o: ["A. 10", "B. 20", "C. Err", "D. None"], a: 2, e: "Ghi đè hàm init ở lớp Child mà không gọi super().__init__ khiến tính trạng x của lớp cha không bao giờ được cấu trúc. Gọi c.x báo AttributeError." },
  // --- PHẦN 3: CẤU TRÚC DỮ LIỆU & GIẢI THUẬT ---
  { q: "Độ phức tạp thời gian (Time Complexity) của đoạn code sau?: \nn = len(arr)\nfor i in range(n):\n  j = 1\n  while j < n:\n    j *= 2", c: "", o: ["A. O(n log n)", "B. O(n^2)", "C. O(n)", "D. O(log n)"], a: 0, e: "Vòng ngoài chạy tuyến tính N lần. Vòng trong nhân đôi biến j khiến nó đạt ngưỡng n bằng tốc độ hàm logarit cơ số 2. Kết hợp O(n log n)." },
  { q: "Độ phức tạp của hàm đệ quy tính toán dãy số Fibonacci sau đây?: \ndef fib(n):\n  if n <= 1: return n\n  return fib(n-1) + fib(n-2)", c: "", o: ["A. O(n)", "B. O(n^2)", "C. O(2^n)", "D. O(log n)"], a: 2, e: "Đây là thuật toán vét cạn chia cây đệ quy thành 2 nhánh chồng chất gọi liên tục vô hạn cấp. Tốc độ phình to bùng nổ hàm mũ O(2^n)." },
  { q: "Cấu trúc dữ liệu nào giúp kiểm tra sự tồn tại (x in collection) nhanh nhất trong trường hợp trung bình?:", c: "", o: ["A. List", "B. Dictionary / Set", "C. Tuple", "D. Linked List"], a: 1, e: "Cơ chế Hash table nội tại của Dict/Set dùng phép toán băm (hash) truy xuất vị trí cực nhanh. Chỉ mất O(1) để xác nhận phần tử tồn tại." },
  { q: "Thuật toán sắp xếp nào sau đây được coi là 'Stable Sort' (Sắp xếp ổn định)?:", c: "", o: ["A. Quick Sort", "B. Merge Sort", "C. Heap Sort", "D. Selection Sort"], a: 1, e: "Merge sort đảm bảo các phần tử mang giá trị giống nhau luôn bảo toàn thứ tự nguyên gốc trước khi sắp xếp, tránh xáo trộn logic dữ liệu." },
  { q: "Lỗi 'Stack Overflow' trong các bài toán đệ quy thường xảy ra do nguyên nhân nào?:", c: "", o: ["A. Thiếu bộ nhớ RAM vật lý", "B. Thiếu điều kiện dừng (base case) hoặc đệ quy quá sâu", "C. Tốc độ CPU quá chậm", "D. Do sử dụng quá nhiều biến cục bộ"], a: 1, e: "Chu kỳ đệ quy sai base case gọi liên hồi khiến luồng execution call stack liên tục đắp đầy RAM đệm đến ngưỡng giới hạn hệ thống nổ tung báo lỗi." },
  { q: "Ưu điểm chính của việc sử dụng đệ quy so với vòng lặp là gì?:", c: "", o: ["A. Luôn chạy nhanh hơn", "B. Mã nguồn gọn gàng, chia nhỏ vấn đề, cực tốt với cấu trúc cây", "C. Không treo chương trình", "D. Tốn ít bộ nhớ"], a: 1, e: "Đệ quy quy nạp các bài toán mẹ khổng lồ thành vấn đề con, biểu diễn mô hình toán, duyệt cây / thư mục vô cùng thanh thoát." },
  { q: "Trong bài toán Tháp Hà Nội với N tầng đĩa, số bước di chuyển tối thiểu để hoàn thành là?:", c: "", o: ["A. 2^n - 1", "B. 2n - 1", "C. n^2", "D. 2^n"], a: 0, e: "Dịch chuyển N đĩa đòi hỏi quy luật đệ quy tịnh tiến hàm mũ T(n) = 2T(n-1) + 1. Cho ra công thức chu kỳ tối ưu hoàn thiện 2^n - 1 bước." },
  { q: "Tìm kiếm nhị phân (Binary Search) bắt buộc yêu cầu danh sách đầu vào phải thỏa mãn điều kiện gì?:", c: "", o: ["A. Không chứa số âm", "B. Danh sách phải được sắp xếp trước", "C. Số phần tử chẵn", "D. Là kiểu Tuple"], a: 1, e: "Thuật toán chặt đôi kiểm tra mid point. Phải đảm bảo mảng sort đồng nhất mới quy ước được việc vứt đi nửa trái hay phải an toàn chuẩn xác." },
  { q: "Thuật toán sắp xếp mặc định của Python khi gọi list.sort() tên là gì?:", c: "", o: ["A. Quick Sort", "B. Timsort", "C. Bubble Sort", "D. Shell Sort"], a: 1, e: "Python chế tác thuật toán hybrid 'Timsort' (Lai ghép chắt lọc điểm mạnh giữa Merge sort và Insertion sort) tối ưu hóa đỉnh cao thực tế." },
  { q: "So sánh độ phức tạp của thao tác kiểm tra thành viên 'x in collection' giữa List và Set?:", c: "", o: ["A. O(1) ngang nhau", "B. List là O(n), Set là O(1)", "C. List là O(1), Set là O(n)", "D. Cả hai O(log n)"], a: 1, e: "List là mảng tuần tự phải duyệt cày chay tuyến tính O(n). Set vận hành Hash map định vị hàm băm trực diện ngay tắp lự mất O(1)." },
  { q: "Khi nào thực tế nên ưu tiên sử dụng Generator (dùng yield) thay vì sinh ra một mảng List?:", c: "", o: ["A. Cần truy cập nhảy cóc bằng index", "B. Khi xử lý luồng dữ liệu khổng lồ tiết kiệm bộ nhớ RAM", "C. Cần thực hiện thao tác sort", "D. Cần dùng lại dữ liệu nhiều lần"], a: 1, e: "Generator nhả chậm rãi từng phần tử lên không trung xử lý rồi vứt bỏ, tránh nhồi nhét cả Terabyte dữ liệu đè nát bộ nhớ RAM vật lý." },
  { q: "Độ phức tạp thời gian của thao tác tìm hàm min() hoặc max() trên một tập Set (không có thứ tự) trong Python là?:", c: "", o: ["A. O(1)", "B. O(log n)", "C. O(n)", "D. O(n^2)"], a: 2, e: "Do cấu trúc Set phân bổ dữ liệu rải rác không tuần tự (như Heap), Python phải ngậm ngùi quét cày bừa qua mọi node để chốt cực trị O(n)." },
  { q: "Nhược điểm trí mạng khi sử dụng list.pop(0) để giả lập hàng đợi (Queue) trong Python là gì?:", c: "", o: ["A. Không xóa được đầu", "B. Tốn thời gian O(n) do phải dịch chuyển toàn bộ phần tử còn lại phía sau tiến lên 1 bậc", "C. Gây lỗi tràn RAM", "D. Làm lỗi Type dữ liệu"], a: 1, e: "List là mảng tĩnh liền kề. Bóc phần tử đầu tiên tạo lỗ hổng bắt CPU phải còng lưng kéo toàn bộ phần tử còn lại tụt lùi về lấp vào O(n)." },
  { q: "Để thiết lập cấu trúc hàng đợi (Queue) hiệu năng hoàn hảo với độ phức tạp O(1) cho việc thêm xóa ở cả hai đầu, ta nên dùng class nào?:", c: "", o: ["A. list", "B. collections.deque", "C. set", "D. tuple"], a: 1, e: "Double Ended Queue (Deque) là danh sách liên kết đôi chuyên biệt xử lý đẩy dữ liệu linh hoạt đầu đuôi chớp nhoáng với chi phí thuật toán O(1)." },
  { q: "Thuật toán đồ thị Dijkstra nổi tiếng được sinh ra và tối ưu nhất cho mục đích bài toán nào sau đây?:", c: "", o: ["A. Sort mảng String", "B. Tìm đường đi ngắn nhất giữa các đỉnh trong một đồ thị (mạng lưới trọng số dương)", "C. Search text văn bản", "D. Mã hóa bảo mật"], a: 1, e: "Giải thuật của kỹ sư Hà Lan tối ưu hóa mạng máy tính định tuyến đường dẫn siêu tốc đi qua các Node có trọng số khoảng cách thực dương." },
  { q: "Trong trường hợp tồi tệ nhất (các Node bị add liên tiếp lệch hẳn về một phía), độ phức tạp tìm kiếm của Cây nhị phân (BST) bị suy thoái là?:", c: "", o: ["A. O(log n)", "B. O(n log n)", "C. O(n)", "D. O(n^2)"], a: 2, e: "Cây không cân bằng (Unbalanced Tree) bị duỗi thẳng băng không khác gì một danh sách liên kết Linked List. Mất sạch đặc tính Logarit rơi về O(n)." },
  { q: "Python xử lý giải quyết hiện tượng va chạm mã băm (Hash collision) trong bảng Dict theo cơ chế nào?:", c: "", o: ["A. Chaining (Liên kết chuỗi)", "B. Open Addressing / Random Probing (Thăm dò mở)", "C. Bỏ qua ghi đè", "D. Báo lỗi văng app"], a: 1, e: "Thay vì móc chuỗi phức tạp như Java, Python nhảy random tìm slot trống khác trong bảng băm theo quy luật đa thức pseudo-random Probing." },
  { q: "Sử dụng Quy hoạch động (Dynamic Programming - Array Memoization) để tính dãy Fibonacci sẽ kéo giảm độ phức tạp thời gian xuống còn bao nhiêu?:", c: "", o: ["A. O(n)", "B. O(2^n)", "C. O(1)", "D. O(n^2)"], a: 0, e: "Phương pháp tạo mảng tĩnh lưu trữ đáp án các nhánh con trùng lặp, triệt tiêu xử lý dư thừa tính lại từ đầu hạ độ phức tạp về tuyến tính O(n)." },
  { q: "Thuật toán trí tuệ nhân tạo K-Means thường được phân loại vào nhóm học máy (Machine Learning) chủ đạo nào?:", c: "", o: ["A. Học có giám sát", "B. Học không giám sát (Unsupervised Learning - Phân cụm)", "C. Học tăng cường", "D. Học sâu Deep Learning"], a: 1, e: "Thuật toán phân tích tọa độ data vô định hướng trên không gian gom về các nhóm bầy đàn chung điểm tương đồng (Clustering) không label giám sát." },
  { q: "Độ phức tạp của một thuật toán có cấu trúc 3 vòng lặp for lồng ghép phụ thuộc lẫn nhau, mỗi vòng quét N lần là?:", c: "", o: ["A. O(n)", "B. O(n^2)", "C. O(n^3)", "D. O(log n)"], a: 2, e: "Số vòng xử lý lõi bùng nổ cấp số nhân theo chiều không gian vòng lặp. Vòng trong N, Vòng giữa N, Vòng ngoài N = N*N*N = N^3 (O(n^3))." },
  // --- PHẦN 4: HỆ THỐNG, BỘ NHỚ & ADVANCED PYTHON ---
  { q: "Output của đoạn code sau? (Phạm vi biến của Exception)", c: "try:\n  1/0\nexcept ZeroDivisionError as e:\n  pass\n\ntry:\n  print('Caught')\n  print(e)\nexcept NameError:\n  print('Not Defined')", o: ["A. Caught tiếp theo e", "B. Caught tiếp theo Not Defined", "C. Caught None", "D. Lỗi SyntaxError"], a: 1, e: "Trên Python 3, ra khỏi khối except thì biến e lập tức bị Garbage Collector xóa sổ để dọn RAM. Việc gọi print(e) phía dưới kích hoạt NameError." },
  { q: "Output của đoạn code sau? (Thời điểm tính toán tham số mặc định)", c: "import time\ndef test(arg=time.time()):\n  return arg\nval1 = test()\ntime.sleep(0.1)\nval2 = test()\nprint(val1 == val2)", o: ["A. True", "B. False", "C. TypeError", "D. None"], a: 0, e: "Tham số mặc định (time.time()) chỉ được chốt cứng tính toán MỘT LẦN duy nhất lúc đọc biên dịch file (parse time). Gọi hàm muộn cách mấy nó vẫn in con số cũ (True)." },
  { q: "Output của đoạn code sau? (Phạm vi biến trong Class)", c: "x = 1\nclass MyClass:\n  x = 2\n  def get_x(self):\n    return x\nobj = MyClass()\nprint(obj.x, obj.get_x())", o: ["A. 2 2", "B. 2 1", "C. 1 1", "D. 1 2"], a: 1, e: "obj.x truy cập biến class = 2. Trong hàm get_x, chữ x đứng trơ trọi (không kèm self hay cls) Python sẽ vượt rào lục tìm biến toàn cục global x = 1. Kết quả 2 1." },
  { q: "Output của đoạn code sau? (Vòng lặp for và biến rò rỉ)", c: "for k in range(3):\n  pass\nprint(k)", o: ["A. 3", "B. 2", "C. NameError", "D. None"], a: 1, e: "Vòng lặp For trên Python 'rỉ' rác biến toàn cục. Trái với List Comprehension, biến k sau loop lưu lại giá trị chạy chu kỳ cuối cùng là số 2." },
  { q: "Output của đoạn code sau? (Giá trị NaN đặc biệt)", c: "import math\nnan_val = float('nan')\nprint(nan_val == nan_val, nan_val is nan_val)", o: ["A. True True", "B. False False", "C. False True", "D. True False"], a: 2, e: "Theo chuẩn quốc tế IEEE 754 float toán học, biến thể Vô định (Not a Number) không bao giờ bằng chính nó (False). Phép 'is' so địa chỉ RAM nên True." },
  { q: "Output của đoạn code sau? (Toán tử cộng với vô cực)", c: "inf = float('inf')\nprint(inf + 100 == inf, inf > 10**20)", o: ["A. True True", "B. False True", "C. True False", "D. False False"], a: 0, e: "Số vô cực Infinity mang sức hút toán học tối thượng, bất kì phép tính nào cộng hay dẫu so sánh với số hữu hạn tỉ tỉ lớn nó vẫn luôn chiến thắng bành trướng." },
  { q: "Output của đoạn code sau? (Thay đổi kích thước Dict khi lặp)", c: "d = {'a': 1, 'b': 2}\ntry:\n  for key in d:\n    d[key + 'x'] = 3\nexcept RuntimeError:\n  print('Err')", o: ["A. Err", "B. Chạy vô hạn", "C. Vòng lặp vô hạn", "D. None"], a: 0, e: "Khác với list (loop vô tận), Dictionary nghiêm cấm tiệt tuyệt hành vi phá vỡ cấu trúc cấu hình hash bảng dữ liệu trong khi đang duyệt iter. Kích nổ lỗi RuntimeError." },
  { q: "Output của đoạn code sau? (So sánh mã băm của Tuple)", c: "t1 = (1, 2, (3, 4))\nt2 = (1, 2, (3, 4))\nprint(hash(t1) == hash(t2))", o: ["A. True", "B. False", "C. Ngẫu nhiên", "D. TypeError"], a: 0, e: "Mọi tầng lớp dữ liệu của Tuple trên đều là immutable rắn chắc thuần túy (tuple trong tuple). Do nội dung copy nguyên bản, hàm băm sẽ xử lý mã hash giống hệt nhau." },
  { q: "Output của đoạn code sau? (String Interning)", c: "s1 = 'python_is_cool_2026'\ns2 = 'python_is_cool_2026'\nprint(s1 is s2)", o: ["A. True", "B. False", "C. Ngẫu nhiên", "D. AttributeError"], a: 0, e: "String Interning là tuyệt kỹ CPython. Các chuỗi code literal biên dịch không chứa ký tự đặc biệt được cache gom vào chung một lõi RAM dùng lại (True)." },
  { q: "Output của đoạn code sau? (Toán tử Walrus - Python 3.8+)", c: "if (n := len([1, 2, 3])) > 2:\n  print(n * 2)", o: ["A. 6", "B. 3", "C. True", "D. SyntaxError"], a: 0, e: "Toán tử hải mã := gán biến siêu tốc trong thân logic. n nhận độ dài mảng là 3. Xét 3>2 kích hoạt nhanh if, in đáp số cấp tốc 3*2 = 6." },
  { q: "Output của đoạn code sau? (F-string debug format)", c: "x = 10\nprint(f'{x=}')", o: ["A. 10", "B. x=10", "C. x= 10", "D. SyntaxError"], a: 1, e: "Từ bản 3.8, mẹo f-string đi kèm '=' tự động chèn tên biến, phơi bày dữ liệu dạng code logic phục vụ Debug gỡ lỗi trực quan nhàn hạ hơn." },
  { q: "Giá trị của biến hệ thống `__name__` sẽ là gì khi file script đang được chạy trực tiếp từ Terminal?:", c: "", o: ["A. tên_file_gốc", "B. '__main__'", "C. None", "D. 'script'"], a: 1, e: "Được định danh là module thực thi lõi đầu não hệ thống, luồng app khi chạy trực tiếp file sẽ cưỡng chế gán nhãn module thành __main__." },
  { q: "Output của đoạn code sau? (Hàm zip_longest)", c: "from itertools import zip_longest\nresult = list(zip_longest([1, 2], [3], fillvalue=0))\nprint(result)", o: ["A. [(1, 3)]", "B. [(1, 3), (2, 0)]", "C. [(1, 3), (2, None)]", "D. TypeError"], a: 1, e: "zip_longest lấp đầy khuyết điểm của zip(). Khi gặp mảng lệnh ngắn cộc, thay vì chặt đuôi mảng dài, nó sẽ bơm chèn fillvalue=0 vào lấp lỗ hổng." },
  { q: "Việc định nghĩa phương thức ma thuật __getitem__ giúp class trở thành đối tượng mang tính chất nào?:", c: "", o: ["A. Callable", "B. Subscriptable (Có thể truy cập qua index [..])", "C. Iterable", "D. String"], a: 1, e: "Cơ chế này biến thực thể custom của lập trình viên có năng lực vận hành như Dict/List bóc tách phần tử bằng cặp ngoặc vuông obj[key]." },
  { q: "Bộ đôi phương thức ma thuật (dunder methods) nào sau đây cấu thành nên Giao thức lặp 'Iterator Protocol'?:", c: "", o: ["A. __init__ và __new__", "B. __iter__ và __next__", "C. __enter__ và __exit__", "D. __get__ và __set__"], a: 1, e: "Hai trụ cột sống còn của cơ chế vòng lặp. __iter__ reset biến con trỏ. __next__ đẩy con trỏ nhích từng nhịp nạp nguyên liệu về máy." },
  { q: "Ảnh hưởng lớn nhất của kiến trúc GIL (Global Interpreter Lock) đối với hiệu năng CPython là gì?:", c: "", o: ["A. Không cho chạy Process", "B. Ngăn cản nhiều luồng (Thread) chạy mã bytecode song song đồng thời trên đa nhân CPU", "C. Tăng tốc tính toán AI", "D. Giải phóng RAM tự động"], a: 1, e: "GIL là chốt khóa an toàn chặn luồng cực đoan, tránh va chạm bộ nhớ hỏng file, nhưng bóp nghẹt năng lực lập trình Thread tận dụng CPU đa lõi." },

  { q: "Hàm nào dùng để check giới hạn số lượng gọi đệ quy cắm sâu tối đa của luồng hệ thống?:", c: "import sys\nprint(sys.getrecursionlimit() > 100)", o: ["A. True (Mặc định thường 1000)", "B. False", "C. AttributeError", "D. None"], a: 0, e: "CPython cấu hình rào chắn mềm mặc định dao động mốc 1000 khung lệnh xếp tầng, tránh app viết đệ quy lỗi lầm kích nổ bộ nhớ Stack Server." },
