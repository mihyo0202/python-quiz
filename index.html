  { q: "Phát biểu nào đúng nhất về Syntax Error trong Python?", c: "", o: ["A. Syntax Error được phát hiện trong lúc chương trình đang chạy và luôn có thể bắt bằng try-except.", "B. Syntax Error do vi phạm quy tắc ngữ pháp của Python và được phát hiện bởi parser trước khi chương trình bắt đầu thực thi.", "C. Syntax Error chỉ xảy ra khi chia cho 0.", "D. Syntax Error là lỗi do file không tồn tại (FileNotFoundError)."], a: 1, e: "Lỗi cú pháp (Syntax error) là lỗi vi phạm cốt trúc cốt lõi, bị bộ phân tích ngữ pháp chặn ngay lập tức lúc đọc file trước khi chạy lệnh." },

  { q: "Trong định nghĩa hàm def f(x):, x được gọi là gì?", c: "", o: ["A. Đối số (argument)", "B. Tham số (parameter)", "C. Biến toàn cục", "D. Giá trị trả về"], a: 1, e: "Biến trừu tượng được đặt trong cặp ngoặc khi định nghĩa hàm được gọi là Tham số (Parameter)." },

  { q: "Khác nhau cơ bản giữa 'return' và 'print' trong hàm là gì?", c: "", o: ["A. return trả về giá trị cho nơi gọi; print chỉ in ra màn hình", "B. print trả về giá trị, return chỉ in ra màn hình", "C. Cả hai đều kết thúc chương trình", "D. return chỉ dùng trong vòng lặp"], a: 0, e: "return xuất giá trị ra ngoài hàm để phục vụ phép toán kế tiếp. print chỉ đơn thuần đẩy text ra giao diện người dùng." },

  { q: "Mở file với mode \"w\" (write) có tác động nào sau đây?", c: "", o: ["A. Được đọc và ghi file; nếu file không tồn tại thì báo lỗi.", "B. Mở file để ghi; nếu file đã tồn tại thì nội dung cũ bị xóa (truncate) trước khi ghi.", "C. Mở file để ghi tiếp vào cuối file mà không ảnh hưởng nội dung cũ.", "D. Mở file ở chế độ nhị phân (binary) mặc định."], a: 1, e: "Mode 'w' tàn nhẫn xóa sạch sành sanh mọi dữ liệu cũ nếu tệp đã tồn tại trước đó để viết văn bản mới vào." },

  { q: "Trong try-except, điều gì xảy ra khi ValueError được ném ra?", c: "try:\n  #...\nexcept Exception:\n  # xử lý 1\nexcept ValueError:\n  # xử lý 2", o: ["A. Sẽ vào except ValueError", "B. Sẽ vào except Exception (vì bắt trước), except ValueError không bao giờ tới", "C. Chương trình luôn crash", "D. Không có output"], a: 1, e: "Exception là cha của mọi loại lỗi. Do nó đứng trên cùng, nó hốt và xử lý trọn ValueError, khiến nhánh dưới trở nên vô nghĩa." },

  { q: "What happens when this program runs?", c: "def divide(a, b):\n  assert b != 0, \"cannot be zero\"\n  return a/b\nprint(divide(10,0))", o: ["A. It prints inf", "B. It raises ZeroDivisionError", "C. It raises AssertionError", "D. It returns None and prints nothing"], a: 2, e: "Lệnh assert kiểm tra b != 0 bị đánh giá là False. Ngay lập tức nó quăng lỗi AssertionError kèm theo lời nhắn bên cạnh." },

  { q: "Giả sử có DataFrame tên là df. Lệnh nào xem nhanh 5 dòng đầu để kiểm tra dữ liệu?", c: "", o: ["A. df.top()", "B. df.head()", "C. df.show(5)", "D. df.first(5)"], a: 1, e: "df.head() là phương thức tiêu chuẩn của Pandas để hiển thị nhanh 5 hàng dữ liệu đầu tiên." },

  { q: "Syntax error khác runtime exception ở điểm nào?", c: "", o: ["A. Syntax error xảy ra khi chương trình đang chạy; runtime exception xảy ra trước khi chạy", "B. Syntax error được phát hiện trước khi chạy; runtime exception xảy ra trong lúc chạy", "C. Cả hai đều giống nhau", "D. Runtime exception không thể bắt bằng try/except"], a: 1, e: "Syntax là lỗi do gõ sai ngữ pháp chặn đứng việc chạy. Runtime nảy sinh bất ngờ (chia 0, lỗi file) khi logic phần mềm đang diễn ra." },

  { q: "Đoạn code sau ra gì?", c: "for i in range(3):\n  for j in range(2):\n    print(i, j)", o: ["A. (0, 0) (0, 1) (1, 0) (1, 1) (2,0) (2, 1)", "B. Từng cặp giá trị i, j trên các dòng riêng biệt", "C. 011223", "D. Chỉ in 3 dòng"], a: 1, e: "Vòng lặp lồng tạo tổ hợp 3 x 2 = 6 chu kỳ. Mỗi lệnh print mặc định tự động ngắt dòng." },

  { q: "Trong dictionary, điều nào sau đây đúng?", c: "", o: ["A. Một key có thể xuất hiện nhiều lần với nhiều value khác nhau", "B. Keys phải là các đối tượng mutable như list", "C. Mỗi key là duy nhất, gán lại key sẽ ghi đè value cũ", "D. Dictionary luôn được sắp xếp theo key tăng dần"], a: 2, e: "Key mang tính chất định danh độc bản. Nếu bạn gán dữ liệu vào một key đã tồn tại, nó sẽ ghi đè lên dữ liệu cũ." },

  { q: "Nếu hàm đệ quy không có base case đúng, hậu quả thường gặp là gì?", c: "", o: ["A. SyntaxError", "B. ZeroDivisionError", "C. RecursionError do vượt quá giới hạn độ sâu đệ quy", "D. Chương trình tự tối ưu hóa và vẫn chạy đúng"], a: 2, e: "Đệ quy gọi vô hạn làm lấp đầy vùng nhớ Stack, kích hoạt rào chắn RecursionError an toàn của hệ thống Python." },

  { q: "Cho đoạn mã sau, chương trình in ra gì?", c: "for num in range(1, 4):\n  print(num)", o: ["A. 1 2 3 (xuống dòng)", "B. 1 2 3 4", "C. 0 1 2", "D. 1 3 4"], a: 0, e: "Hàm range(start, stop) sinh số bắt đầu từ 1 và DỪNG LẠI sát mốc stop (không lấy 4). Do đó nó sinh ra 1, 2, 3." },

  { q: "Phát biểu nào đúng về docstring/spec của hàm?", c: "", o: ["A. Nêu rõ hàm làm gì, input/output, và các giả định (điều kiện tiên quyết) nếu có", "B. Chỉ dùng để trang trí, không liên quan đến kiểm thử", "C. Bắt buộc phải có nếu muốn Python chạy được", "D. Chỉ ghi tên tác giả và ngày tạo"], a: 0, e: "Docstring đóng vai trò như hợp đồng giao ước giữa tác giả viết hàm và người dùng hàm về chuẩn cấu trúc." },

  { q: "Chương trình in ra gì?", c: "nums = [4, 0, 7]\nfor n in nums:\n  n = n + 1\nprint(nums)", o: ["A. [7, 1, 8]", "B. [5, 1, 8]", "C. [4, 0, 7]", "D. Báo lỗi vì không thể cộng 1 cho phần tử trong list"], a: 2, e: "Biến lặp 'n' chỉ nhận bản sao dữ liệu. Việc cộng n nội bộ không hề ảnh hưởng hay tác động lại mảng gốc nums." },

  { q: "Bài học thực tiễn về việc thực thi tự động mã nguồn do AI tạo ra đối với các tệp hệ thống quan trọng là gì?", c: "", o: ["A. Không bao giờ nên sử dụng AI để viết mã tương tác với hệ thống tệp.", "B. Chỉ những lập trình viên cao cấp mới nên sử dụng AI để tạo mã lệnh", "C. ChatGPT an toàn hơn GitHub Copilot để tạo các mã lệnh hệ thống", "D. Không bao giờ chạy mã do AI tạo ra, đặc biệt là các lệnh nguy hiểm, mà không hiểu 100% nó làm gì"], a: 3, e: "Mã code tương tác hệ thống có quyền phá hủy file (xóa, format). Tuyệt đối phải hiểu nó làm gì trước khi bấm Run." },

  { q: "Độ phức tạp thời gian của binary search trong trường hợp xấu nhất là gì?", c: "", o: ["A. O(1)", "B. O(log n)", "C. O(n)", "D. O(n log n)"], a: 1, e: "Mỗi nhịp kiểm tra thuật toán nhị phân loại bỏ đi một nửa không gian dữ liệu, tốc độ tương ứng với hàm Logarit cơ số 2." },

  { q: "Hàm sau trả về gì khi gọi fact(4)?", c: "def fact(n):\n  if n == 0:\n    return 1\n  return n * fact(n-1)", o: ["A. 4", "B. 12", "C. 24", "D. 120"], a: 2, e: "Dịch vòng đệ quy: 4 * 3 * 2 * 1 * 1. Tích cuối cùng bằng 24." },

  { q: "Kết quả in ra là gì?", c: "def divide(a, b):\n  try:\n    result = a/b\n    print(\"Result\", result)\n  except ZeroDivisionError:\n    print(\"Error: Cannot divide by zero.\")\n  finally:\n    print(\"Cleaning up and completing\")\nres = divide(10, 0)\nprint(res)", o: ["A. Result 0 Cleaning up and completing 0", "B. Error: Cannot divide by zero. Cleaning up and completing None", "C. Error: Cannot divide by zero. Cleaning up and completing None", "D. Cleaning up and completing None"], a: 2, e: "Lỗi chia 0 lọt vào khối except (in lỗi). Khối finally luôn chạy (in dọn dẹp). Do không có lệnh return nào, hàm tự trả về None." },

  { q: "Đoạn code sau có kết quả là gì?", c: "class A:\n  def f(self):\n    return \"A\"\nclass B(A):\n  def f(self):\n    return \"B\"\nx = B()\nprint(x.f())", o: ["A. A", "B. B", "C. Lỗi vì B kế thừa A không được ghi đè", "D. In ra cả \"A\" và \"B\""], a: 1, e: "Tính chất ghi đè (Overriding) trong OOP: Class B viết đè lên hàm f() của class A. Thực thể sinh từ B sẽ xài luật của B." },

  { q: "Đâu là cách đúng để tính thời điểm đúng 3 tuần kể từ hiện tại với thư viện datetime?", c: "", o: ["A. datetime.now() + timedelta(weeks=3)", "B. datetime.now().add(days=21)", "C. datetime.now() + 21", "D. datetime.today(weeks=3)"], a: 0, e: "Lớp timedelta được sinh ra chuyên trách việc cộng trừ thời gian một cách chuẩn xác toán học trong Python." },

  { q: "Which of the following statements about Python functions is TRUE?", c: "", o: ["A. A function must always explicitly return a value", "B. A function can return multiple values", "C. A function cannot return any value", "D. A function can return only a value"], a: 1, e: "Cơ chế Tuple Packing mạnh mẽ của Python cho phép hàm trả về cùng lúc nhiều biến ngăn cách bằng dấu phẩy." },

  { q: "Vòng lặp sau chạy bao nhiêu lần?", c: "for i in range(2, 10, 2): pass", o: ["A. 3", "B. 4", "C. 5", "D. 8"], a: 1, e: "Dãy số sinh ra chạy từ 2, nhảy bước 2 tới sát 10: 2, 4, 6, 8. Mảng có 4 phần tử tương ứng 4 vòng lặp." },

  { q: "Tại sao method __repr__() phải có tham số self?", c: "", o: ["A. Vì self lưu tên của class nên cần để tạo biểu diễn string", "B. Vì mọi hàm trong Python đều bắt buộc có ít nhất 1 tham số", "C. Để method có thể truy cập đến đối tượng hiện tại cần biểu diễn string", "D. Để Python biết __repr__() là built-in function"], a: 2, e: "self đại diện cho bản thân object, cung cấp cho hàm __repr__ quyền truy cập các biến bên trong object đó để tạo chuỗi text." },

  { q: "Trong đệ quy, \"base case\" (trường hợp cơ sở) có vai trò gì?", c: "", o: ["A. Làm chương trình chạy nhanh hơn luôn", "B. Dừng hàm đệ quy, tránh gọi vô hạn", "C. Bắt buộc để dùng vòng lặp for", "D. Chỉ dùng cho hàm sort"], a: 1, e: "Base case đóng vai trò như phanh hãm, báo hiệu lúc bài toán nhỏ đến mức có thể giải ngay để thoát đệ quy." },

  { q: "Trong một lớp (class) Python, tham số self trong định nghĩa phương thức (method) dùng để làm gì?", c: "", o: ["A. Là biến toàn cục dùng chung cho mọi đối tượng.", "B. Đại diện cho chính đối tượng (instance) đang gọi phương thức.", "C. Là tên hàm của lớp (class).", "D. Là kiểu dữ liệu của tham số đầu vào."], a: 1, e: "self trỏ thẳng tới thực thể (instance) trên vùng nhớ Heap lúc runtime để lấy các biến cục bộ của thực thể đó." },

  { q: "Phát biểu nào sau đây đúng nhất về binary search?", c: "", o: ["A. Binary search hoạt động tốt nhất trên dữ liệu chưa sắp xếp.", "B. Binary search chia khoảng tìm kiếm làm đôi mỗi lần và yêu cầu dữ liệu đã được sắp xếp.", "C. Binary search luôn có độ phức tạp O(n).", "D. Binary search chỉ áp dụng được cho list có phần tử duy nhất."], a: 1, e: "Thuật toán tìm kiếm nhị phân chia đôi mảng tìm kiếm và CHỈ hoạt động được trên dữ liệu đã được sort trước." },

  { q: "Khi chuyển một bài toán sang dạng đệ quy, bước quan trọng nhất là gì?", c: "", o: ["A. Viết càng nhiều vòng lặp càng tốt", "B. Xác định base case và mối quan hệ giữa bài toán và bài toán con", "C. Luôn dùng biến toàn cục", "D. Tránh dùng return"], a: 1, e: "Bạn phải tìm ra điểm dừng (base case) và quy luật thu hẹp bài toán lớn thành bài toán nhỏ (như n thu về n-1)." },

  { q: "Trong gỡ lỗi (debugging), \"watch\" trong debugger thường dùng để làm gì?", c: "", o: ["A. Theo dõi giá trị của một biểu thức biến khi chương trình chạy từng bước", "B. Tự động sửa lỗi logic", "C. Biên dịch chương trình nhanh hơn", "D. Ấn các lỗi runtime"], a: 0, e: "Cửa sổ Watch giống như camera giám sát ghim cố định sự thay đổi các biến khi bạn debug chạy từng dòng (Step)." },

  { q: "Trong các kỹ thuật chính của Tư duy Tính toán, \"Phân rã\" (Decomposition) là gì?", c: "", o: ["A. Chia một vấn đề lớn thành các phần nhỏ hơn, dễ quản lý hơn.", "B. Tìm kiếm những điểm tương đồng hoặc các yếu tố lặp lại trong một vấn đề.", "C. Tập trung vào các chi tiết quan trọng và bỏ qua những chi tiết không liên quan.", "D. Tạo ra các hướng dẫn từng bước để giải quyết một vấn đề."], a: 0, e: "Phân rã là việc băm nhỏ bài toán đại thể thành các Module chức năng con gọn gàng (chia để trị)." },

  { q: "Đoạn code dưới đây in ra gì?", c: "d1 = {'a':1, 'b':2, 'c':3}\ntotal = 0\nfor key in d1:\n  total = total + d1[key]\nprint(total)", o: ["A. 0", "B. 6", "C. In ra toàn bộ dictionary d1", "D. Raises a TypeError"], a: 1, e: "Vòng lặp duyệt qua các keys. Lấy key truy xuất vào value và cộng dồn: 1 + 2 + 3 = 6." },

  { q: "Đoạn code sau in ra gì?", c: "for i in range(3):\n  if i == 1:\n    continue\n  print(i)", o: ["A. 012", "B. 1", "C. 0 2 (in từng số trên 1 dòng)", "D. 2"], a: 2, e: "Lệnh continue sẽ ngắt ngang chu kỳ hiện tại (i=1), bỏ qua lệnh print phía dưới và nhảy sang chu kỳ i=2. In ra 0 và 2." },

  { q: "Dùng binary search để tìm 8 trong mảng a = [2, 4, 6, 8, 10]. Khoảng còn lại sau lần so sánh giữa đầu tiên?", c: "", o: ["A. [2, 4]", "B. [2, 4, 6]", "C. [8, 10]", "D. [10]"], a: 2, e: "Mid ban đầu là 6. Vì 8 > 6, thuật toán rẽ ngoặt triệt tiêu nửa trái mảng, thu hẹp vùng tìm kiếm về nửa phải là [8, 10]." },

  { q: "Đoạn code sau in ra gì?", c: "if \"a\":\n  print(\"A\")\nelse:\n  print(\"B\")", o: ["A. A", "B. B", "C. Lỗi cú pháp", "D. Không in gì"], a: 0, e: "Chuỗi 'a' không rỗng (độ dài > 0) nên mang giá trị truthy (True) trong các biểu thức logic. Khối if được chạy." },

  { q: "Biểu thức so sánh dạng chuỗi (chained comparison) nào dưới đây là hợp lệ và đúng cú pháp Python?", c: "", o: ["A. 1 < x < 3", "B. 1 < x and < 3", "C. ((1 < x < 3)", "D. 1 < (x < 3)"], a: 0, e: "Cú pháp 1 < x < 3 là tính năng cực xịn của Python so với C/Java, tự dịch ngầm thành 1 < x and x < 3." },

  { q: "Tuples trong Python có đặc điểm gì nổi bật so với lists?", c: "", o: ["A. Có thể thay đổi (mutable)", "B. Không thể thay đổi (immutable)", "C. Chỉ chứa số", "D. Chỉ dùng làm key của dict"], a: 1, e: "Sau khi Tuple sinh ra, nội dung của nó bị khóa cứng bất biến vĩnh viễn, không thể gán lại hay cấu trúc thêm bớt." },

  { q: "Trong subclass, gọi super().__init__() thường nhằm mục đích gì?", c: "", o: ["A. Gọi constructor của lớp cha để khởi tạo phần kế thừa", "B. Xóa tất cả thuộc tính của lớp cha", "C. Tạo một object mới không liên quan", "D. Bắt lỗi ngoại lệ tự động"], a: 0, e: "Để đảm bảo lớp con thừa hưởng trọn vẹn và đúng đắn các thuộc tính được cấu hình sẵn trong init của lớp cha." },

  { q: "Trong Python, sự khác nhau lớn nhất giữa __str__ và __repr__ là gì?", c: "", o: ["A. __str__ dùng cho máy tính, __repr__ dùng cho người dùng.", "B. __str__ luôn được gọi khi debug, __repr__ không bao giờ được dùng.", "C. __str__ thường là chuỗi thân thiện khi in (print), còn __repr__ thường là biểu diễn rõ ràng/không mơ hồ phục vụ debug.", "D. Hai hàm hoàn toàn giống nhau, không có khác biệt."], a: 2, e: "str sinh ra chuỗi cho con người xem. repr sinh ra dạng chuỗi mô tả bản chất mã nguồn cho Dev." },

  { q: "Đoạn code sau in ra gì?", c: "for i in range(3):\n  if i == 1:\n    continue\n  print(i)", o: ["A. 012", "B. 0 và 2 (in ra từng số trên một dòng riêng biệt)", "C. 1", "D. Không in gì"], a: 1, e: "continue bắt vòng lặp nhảy vọt chu kỳ i=1, chỉ có số 0 và 2 chạm tới lệnh print để in ra 2 dòng lẻ." },

  { q: "Overriding (ghi đè) method xảy ra khi nào?", c: "", o: ["A. Hai class có method trùng tên, subclass định nghĩa lại method đó", "B. Hai method có chữ ký (signature) khác nhau", "C. Một method được gán lại giá trị", "D. Một list được sort()"], a: 0, e: "Ghi đè là đặc tính Đa hình (Polymorphism) mạnh mẽ. Lớp con viết lại luật lệ thay thế cho chức năng mặc định của cha." },

  { q: "Cho đoạn code sau, in ra gì?", c: "lst = [10, 20, 30, 40]\nprint(lst[1:3])", o: ["A. [10, 20, 30]", "B. [20, 30]", "C. [20, 30, 40]", "D. [10, 20]"], a: 1, e: "Slicing cắt list bắt đầu từ vị trí thứ 1 (gồm số 20) cho đến sát nút index 3 (dừng trước số 40). Mảng thu được [20, 30]." },

  { q: "Tập hợp (set) trong Python có đặc điểm nào?", c: "", o: ["A. Cho phép phần tử trùng lặp và có thứ tự", "B. Không cho phép trùng lặp, thứ tự không đảm bảo", "C. Luôn giữ thứ tự chèn vào như list", "D. Chỉ chứa được số nguyên"], a: 1, e: "Set là một dạng bảng băm (Hash table), nó tiêu diệt triệt để mọi phần tử bị trùng và sắp xếp chúng tự do hỗn loạn." },

  { q: "Kết quả khi chạy chương trình là gì?", c: "x = 10\ny = 8\nprint(x > 0 and (y == 0 or 10 / y > 1))", o: ["A. In ra: True", "B. In ra: False", "C. Báo lỗi ZeroDivisionError", "D. Báo lỗi SyntaxError"], a: 0, e: "10 > 0 (True). y = 8 nên y == 0 là False, nhưng 10/8 = 1.25 > 1 là True. True and (False or True) = True." },

  { q: "Giả sử lst = [1, 2, 3]. Sau lệnh lst.extend([4, 5]), lst trở thành gì?", c: "", o: ["A. [1, 2, 3, [4, 5]]", "B. [1, 2, 3, 4, 5]", "C. [[1, 2, 3], 4, 5]", "D. Raises an error"], a: 1, e: "Lệnh extend sẽ rã đông mảng truyền vào rồi rải nối tiếp từng phần tử con xếp đuôi vào sau mảng cũ (khác append đóng hộp)." },

  { q: "Chương trình in ra gì?", c: "a = [1, 2, 3]\nb = a\nb.append(4)\nprint(a)", o: ["A. [1, 2, 3]", "B. [1, 2, 3, 4]", "C. [1, 2, 3], [4]", "D. Báo lỗi vì b là bản sao của a"], a: 1, e: "Gán b = a trong Python là phép tham chiếu đến chung 1 RAM. Sửa b chính là đang chọc phá trực tiếp vào a." },

  { q: "Trong Python, lợi ích chính của cú pháp: with open(\"data.txt\", \"r\") as f: Là gì?", c: "", o: ["A. Tự động xóa file sau khi đọc xong.", "B. Đảm bảo file được đóng (close) tự động sau khi kết thúc khối with, kể cả khi có lỗi.", "C. Cho được đọc file từ đĩa, không đọc được file khác.", "D. Tăng tốc đọc file lên gấp đôi."], a: 1, e: "Việc xử lý file thường gây crash dẫn tới quên close() luồng RAM. Lệnh with sinh ra tự động dọn dẹp lỗi lo này." },

  { q: "Trong Python, hàm input() trả về kiểu dữ liệu nào?", c: "", o: ["A. int", "B. float", "C. str", "D. bool"], a: 2, e: "Mọi dữ liệu bạn gõ từ phím qua input() đều mặc định bị đóng gói thành chuỗi văn bản (String) để đảm bảo an toàn." },

  { q: "Chế độ mở file nào sẽ GHI ĐÈ nội dung nếu file đã tồn tại?", c: "", o: ["A. 'r'", "B. 'w'", "C. 'a'", "D. 'rb'"], a: 1, e: "Mode 'w' (write) mở tệp và dọn trống tệp (truncate) xóa bay sạch mọi nội dung cũ trước khi viết đè văn bản mới." },

  { q: "Cho đoạn code sau, giá trị của x là gì?", c: "d = {\"a\": 1, \"b\": 2}\nx = d.get(\"c\")", o: ["A. None", "B. 0", "C. Raises KeyError", "D. Raises IndexError"], a: 0, e: "Truy cập key ảo bằng d['c'] sẽ kích nổ KeyError. Nhưng dùng d.get('c') thì hàm ngậm ngùi trả về None an toàn." },

  { q: "Trong cấu trúc if-elif-else, khi một nhánh elif đúng thì điều gì xảy ra?", c: "", o: ["A. Các nhánh sau vẫn được kiểm tra tiếp", "B. Chỉ nhánh else chạy", "C. Python chạy nhánh đúng đó và bỏ qua các nhánh còn lại", "D. Tất cả nhánh đúng đều chạy"], a: 2, e: "Cấu trúc rẽ nhánh độc quyền. Máy tính sẽ thoát ngay vòng phán xét khi tìm thấy nhánh đầu tiên thỏa mãn yêu cầu True." },

  { q: "Mở file ở chế độ nào sẽ GHI TIẾP vào cuối file nếu file đã tồn tại?", c: "", o: ["A. r", "B. w", "C. a", "D. rw"], a: 2, e: "Chế độ 'a' (append) nhân đạo vô cùng. Nó bảo toàn văn bản cũ và đặt con trỏ xuống dòng cuối chót để viết nối theo sau." },

  { q: "Với d = {\"a\": 1}, d.get(\"b\", 0) trả về gì?", c: "", o: ["A. Raises KeyError", "B. None", "C. 0", "D. 'b'"], a: 2, e: "Phiên bản nâng cấp của get(). Nếu không tìm thấy key 'b', nó không trả None mà quăng ra giá trị mặc định là số 0 cho vững trãi code." },

  { q: "Mục đích chính của câu lệnh raise trong Python là gì?", c: "", o: ["A. Tăng tốc chương trình bằng cách bỏ qua các lỗi.", "B. In ra thông báo lỗi nhưng vẫn tiếp tục chạy mà không ảnh hưởng luồng chương trình.", "C. Cố tình phát sinh một exception khi phát hiện điều kiện dữ liệu không hợp lệ.", "D. Thay thế hoàn toàn cho if-else."], a: 2, e: "Lập trình viên chủ động dùng raise văng ngoại lệ vào mặt luồng chạy (như TypeError, ValueError) để răn đe điều kiện logic sai." },

  { q: "Phát biểu nào đúng nhất về exception trong Python?", c: "", o: ["A. Exception là lỗi cú pháp được phát hiện trước khi chạy", "B. Exception xảy ra khi chương trình đang chạy thực thi và làm gián đoạn luồng bình thường", "C. Exception chỉ xảy ra khi dùng try-except", "D. Exception không làm chương trình dừng"], a: 1, e: "Ngoại lệ (Exception) bộc phát khi code đang vận hành (Runtime) bắt gặp lỗ hổng (chia 0, file chết), phá nát tiến trình đang chạy." },

  { q: "Hàm binary_search(arr, value) với arr=[11, 14, 25, 30, 42, 51, 57, 70] tìm value=57 trả về gì?", c: "", o: ["A. 57", "B. 7", "C. 6", "D. -1"], a: 2, e: "Số 57 đứng cố định ở vị trí index 6 trong mảng tăng dần. Thuật toán trả về 6." },

  { q: "Phát biểu nào đúng nhất về \"function specification\" (đặc tả hàm)?", c: "", o: ["A. Chỉ cần code chạy được là đủ", "B. Mô tả mục tiêu hàm làm gì, trả gì, và điều kiện ý nghĩa kết quả", "C. Thực ra đó là phần comment cho đẹp", "D. Dùng để thay thế hoàn toàn việc test"], a: 1, e: "Đặc tả hàm quy định chi tiết bộ luật hợp đồng đầu vào đầu ra của một khối mã cho người gọi hàm tuân thủ." },

  { q: "Linear search (tìm tuyến tính) tìm V=70 trong mảng [10, 11, 70, 40, 41, 70, 57...], dừng lần đầu thì index ra gì?", c: "", o: ["A. 2", "B. 5", "C. [2, 5]", "D. -1"], a: 0, e: "Tìm tuyến tính quét tuần tự ngây ngô từ trái sang phải, gặp con 70 đầu tiên lộ diện ở index 2 lập tức dừng chạy." },

  { q: "Selection sort: Sau 1 vòng lặp ngoài đầu tiên, phần tử nào chắc chắn đúng vị trí trong list (tăng dần)?", c: "", o: ["A. Phần tử nhỏ nhất", "B. Phần tử lớn nhất", "C. Phần tử ở giữa", "D. Không có phần tử nào chắc chắn đúng vị trí"], a: 0, e: "Selection sort luôn truy tìm kẻ nhỏ nhất toàn cầu mảng ném thẳng về mốc đầu [0]. 1 lượt quét khóa chốt 1 số cực tiểu." },

  { q: "Chương trình in ra gì?", c: "x = [10, 20, 30, 40]\ny = x[1:3]\ny[0] = 99\nprint(x)", o: ["A. [10, 99, 30, 40]", "B. [10, 20, 30, 40]", "C. [99, 20, 30, 40]", "D. [10, 20, 99, 40]"], a: 1, e: "Phép cắt lát (slicing) x[1:3] tạo bản sao vùng nhớ mới độc lập cho mảng y. Sửa y hoàn toàn vô hại đối với bản gốc x." },

  { q: "Đâu không phải là một kiểu dữ liệu (giá trị/đối tượng)?", c: "", o: ["A. Hàm (ví dụ move_forward())", "B. Số vô tỉ (ví dụ -1, -2.5)", "C. Chuỗi ký tự (ví dụ \"Hello\")", "D. Danh sách (ví dụ [1, 2, 3])"], a: 0, e: "Hàm (Function) không phải là kiểu dữ liệu chứa thông tin tĩnh, bản chất nó là khối lệnh có năng lực thực thi (Callable instruction)." },

  { q: "Chương trình in ra gì?", c: "raining = True\nfreezing = False\nif raining and freezing:\n  print(\"Waterproof coat\")\nelif raining and not freezing:\n  print(\"Umbrella\")\nelif not raining and freezing:\n  print(\"Warm coat\")\nelse:\n  print(\"Sweater\")", o: ["A. Waterproof coat", "B. Umbrella", "C. Warm coat", "D. Sweater"], a: 1, e: "Ở nhánh 2: raining(True) and not freezing(True) = True. Câu lệnh xuất Umbrella." },

  { q: "Which of the following statements best describes a syntax error in Python?", c: "", o: ["A. It occurs when an invalid input is given during program execution.", "B. It is detected by the interpreter before the program starts running.", "C. It occurs when dividing a number by zero.", "D. It can be fixed using a try-except block."], a: 1, e: "Syntax là lỗi do gõ sai ngữ pháp nghiêm trọng. Trình phân tích (Parser) tóm sống được ngay cả khi chương trình chưa bắt đầu vận hành." },

  { q: "Phát biểu nào đúng nhất về bubble sort?", c: "", o: ["A. Chọn phần tử nhỏ nhất và đưa lên đầu danh sách ở mỗi bước.", "B. Chia danh sách làm hai nửa, sắp xếp từng nửa rồi trộn (merge) lại.", "C. Lặp lại việc so sánh và đổi chỗ các phần tử kề nhau nếu sai thứ tự, phần tử lớn dần \"nổi\" về cuối sau mỗi vòng.", "D. Luôn chọn pivot, phân hoạch nhỏ hơn và lớn hơn pivot rồi đệ quy."], a: 2, e: "Hoán vị liên tục cặp kề nhau đẩy những giá trị khổng lồ phình bong bóng dồn về vị trí đáy phía sau list." },

  { q: "Trong os.path, hàm nào thường dùng để nối các phần của đường dẫn một cách portable (đa hệ điều hành)?", c: "", o: ["A. os.path.merge()", "B. os.path.join()", "C. os.path.concat()", "D. os.path.addpath()"], a: 1, e: "os.path.join() tự nhận thức được việc dùng gạch chéo ngược (\\) cho Win hay gạch sắc (/) cho Linux khi nối chuỗi folder path." },

  { q: "Xét hàm đệ quy sau, f(4) in ra kết quả nào?", c: "def f(n):\n  if n <= 1:\n    return 1\n  return f(n-1) + f(n-2)\nprint(f(4))", o: ["A. 3", "B. 4", "C. 5", "D. 8"], a: 2, e: "Toán học Fibonacci chạy: f(0)=1, f(1)=1, f(2)=2, f(3)=3, f(4)=5." },

  { q: "Cấu trúc dữ liệu nào phù hợp nhất để biểu diễn tọa độ GPS (vĩ độ, kinh độ) cố định và không nên thay đổi?", c: "", o: ["A. List", "B. Tuple", "C. Dictionary", "D. Set"], a: 1, e: "Vì cấu trúc tọa độ mang tính tuyệt đối bất biến, khóa cứng data trong không gian Tuple là tối ưu bộ nhớ nhất." },

  { q: "assert b != 0 ở đây thường được dùng với mục đích gì?", c: "def divide(a, b):\n  assert b != 0\n  return a / b", o: ["A. Đảm bảo điều kiện tiền (precondition) trước khi chia", "B. Tối ưu hóa tốc độ chương trình", "C. Thay thế try/except trong mọi trường hợp", "D. Ghi log ra file"], a: 0, e: "Lệnh assert mang tôn chỉ phòng thủ chặn đứng luồng thực thi hàm nếu tham số vi phạm điều kiện sống còn của khối mã." },

  { q: "Test nào sau đây bắt lỗi tốt nhất nếu ai đó lỡ sửa nhầm thành (a+b)//2 (chia lấy phần nguyên)?", c: "def avg(a, b):\n  return (a+b)/2", o: ["A. assert avg(2,4) == 3", "B. assert avg(2,2) == 2", "C. assert avg(0,0) == 0", "D. assert avg(1,2) == 1.5"], a: 3, e: "(1+2)//2 = 1. Kết quả này sai trật lất hoàn toàn so với đáp số thực 1.5, Test Case D là cạm bẫy tuyệt vời để lôi cổ lỗi logic ẩn này." },

  { q: "Which of the following is NOT a built-in function in Python?", c: "", o: ["A. max()", "B. round()", "C. sqrt()", "D. type()"], a: 2, e: "Căn bậc hai sqrt() không có sẵn. Bạn buộc phải 'import math' để nạp thư viện toán học vào mới dùng được." },

  { q: "Chương trình in ra gì?", c: "total = 0\nfor a in (2, 3, 1):\n  total = total + a\nprint(total)", o: ["A. 2", "B. 5", "C. 6", "D. Báo lỗi vì tuple không cộng được"], a: 2, e: "Tuple vẫn là đối tượng iterable hỗ trợ vòng for như list. Bóc tách từng số và cộng dồn: 2 + 3 + 1 = 6." },

  { q: "Output của đoạn code sau là gì?", c: "t = (1, 2)\nt[0] = 10", o: ["A. t trở thành (10, 2)", "B. Không có thay đổi", "C. Raises a TypeError", "D. Raises a SyntaxError"], a: 2, e: "Cố tình phá vỡ cấu trúc nguyên thủy bất khả xâm phạm của Tuple sẽ kích nổ hình phạt TypeError." },

  { q: "Trong lời gọi f(10), 10 được gọi là gì?", c: "", o: ["A. Đối số (argument)", "B. Tham số (parameter)", "C. Kiểu dữ liệu", "D. Tên hàm"], a: 0, e: "Con số vật lý thực sự được đẩy tống vào miệng hàm lúc hệ thống đang vận hành được gọi là Argument (Đối số truyền vào)." },

  { q: "Bubble sort có đặc điểm gì sau mỗi pass (sau mỗi lượt) đẩy đủ qua list?", c: "", o: ["A. Phần tử nhỏ nhất được đưa về đầu list", "B. Phần tử lớn nhất được \"đẩy\" về cuối list", "C. List được chia đôi để tính nhanh hơn", "D. List luôn được sắp xếp xong sau 1 pass"], a: 1, e: "Sau 1 quá trình bốc phần tử lớn dồn hoán vị dần, kẻ to con nhất mảng tự khắc bị nhốt chốt sổ về tận đáy đuôi cuối cùng list." },

  { q: "Đâu là bốn thành phần chính của Tư duy Tính toán?", c: "", o: ["A. Phân rã, Nhận dạng mẫu, Trừu tượng hóa và Thiết kế thuật toán.", "B. Lập trình, Gỡ lỗi, Biên dịch và Thực thi.", "C. Đầu vào, Đầu ra, Xử lý và Lưu trữ.", "D. Phần cứng, Phần mềm, Dữ liệu và Mạng máy tính."], a: 0, e: "Bốn cột trụ của CT: Decomposition, Pattern Recognition, Abstraction, Algorithms." },

  { q: "Luật truy cập: Nhân viên có thẻ → được vào. Khách có giấy mời → được vào. Các trường hợp khác → không được vào. Xét đoạn mã:", c: "def allow_access(is_employee, has_card, is_guest, has_invite):\n    if is_employee:\n        if has_card:\n            return True\n        else:\n            return False\n    if is_guest:\n        if has_invite:\n            return True\n        else:\n            return False\n    else:\n        return False\n\nprint(allow_access(True, False, True, True))", o: ["A. False - vì nhánh nhân viên trả về sớm, làm cho điều kiện khách không bao giờ được xét", "B. True - vì điều kiện khách có giấy mời vẫn được kiểm tra", "C. Lỗi runtime do thiếu kiểu dữ liệu", "D. True - vì cả hai điều kiện đều độc lập", "E. False - vì thiếu elif nên Python gán sai else"], a: 0, e: "Kết quả in ra là gì, và tại sao kết quả này không đúng với yêu cầu ban đầu? Vì is_employee=True nên hàm return False ngay trong nhánh đầu (has_card=False) và không bao giờ chạy tới việc kiểm tra is_guest, dù khách có giấy mời thật." },

  { q: "Xét đoạn mã:", c: "def grade(score):\n    if score >= 90:\n        return \"A\"\n    elif score >= 75:\n        return \"B\"\n    elif score >= 60:\n        return \"C\"\n    else:\n        return \"D\"", o: ["A. [90, 80, 75, 60]", "B. [89, 80, 74, 59]", "C. [60, 60, 60, 60]", "D. [100, 0]", "E. [95, 80, 65, 40]"], a: 4, e: "Tập test input nào dưới đây đảm bảo *bao phủ đầy đủ các nhánh* (mỗi nhánh if/elif/else được chạy ít nhất một lần)? [95, 80, 65, 40] cho điểm lần lượt rơi vào A (≥90), B (≥75), C (≥60), D (else) — bao phủ đủ cả 4 nhánh." },

  { q: "Cho đoạn mã python sau:", c: "nums = [2, 3, 5, 7, 11]\nres = 0\nfor i, v in enumerate(nums):\n    if i == 0:\n        continue\n    if v % nums[i-1] == 0:\n        res += 10\n    else:\n        res += (v - nums[i-1])\nprint(res)", o: ["A. 13", "B. 11", "C. 15", "D. 9", "E. 7"], a: 3, e: "Kết quả sau khi chạy đoạn code trên là: i=1: 3%2!=0 → res+=1; i=2: 5%3!=0 → res+=2; i=3: 7%5!=0 → res+=2; i=4: 11%7!=0 → res+=4. Tổng = 1+2+2+4 = 9." },

  { q: "Trong đoạn mã sau, kết quả được in ra là gì?", c: "def incr_list(nums):\n    for n in nums:\n        n = n+1\n    return nums\n\nlst = [6, 0, 7]\nprint(incr_list(lst))", o: ["A. [6, 0, 7]", "B. Không in ra gì", "C. Chương trình báo lỗi", "D. [6, 0, 7, 1, 1, 1]", "E. [7, 1, 8]"], a: 0, e: "Biến n chỉ là tham chiếu tạm trong vòng lặp; gán lại n = n+1 không thay đổi phần tử thực trong list gốc. Vậy list nums không đổi: [6, 0, 7]." },

  { q: "Hàm range(2, 10, 3) sẽ tạo ra dãy số nào sau đây?", c: "", o: ["A. 5, 8", "B. 2, 5, 8", "C. 2, 3, 4, 5, 6, 7, 8, 9", "D. 2, 5, 8, 11"], a: 1, e: "range(2, 10, 3) bắt đầu từ 2, bước nhảy 3, dừng trước 10: 2, 5, 8 (11 vượt quá 10 nên không có)." },

  { q: "Hàm xử lý chuỗi sau trả về kết quả gì?", c: "data = 'a1b2c3d4'\nres = ''\nfor char in data:\n    if char.isdigit():\n        res += str(int(char) * 2)\n    else:\n        res += char.upper()\nprint(res)", o: ["A. a2b4c6d8", "B. A1B2C3D4", "C. ABCD", "D. A2B4C6D8"], a: 3, e: "Mỗi chữ cái được viết hoa, mỗi chữ số được nhân 2: a→A, 1→2, b→B, 2→4, c→C, 3→6, d→D, 4→8. Kết quả: A2B4C6D8." },

  { q: "Cho đoạn mã python sau:", c: "def add(x, L=[]):\n    if L is None:\n        L = []\n    L.append(x)\n    return L\n\nprint(add(1), add(2), add(3))", o: ["A. Error", "B. [1] [1, 2] [1, 2, 3]", "C. [1] [2] [3]", "D. 1 2 3", "E. [1, 2, 3]"], a: 1, e: "Kết quả sau khi chạy đoạn code trên là: tham số mặc định L=[] chỉ được tạo một lần và dùng chung cho mọi lần gọi hàm (mutable default argument) — list bị cộng dồn qua các lần gọi, in ra [1] [1, 2] [1, 2, 3]." },

  { q: "Kết quả của đoạn code sau là gì?", c: "s = 0\nfor i in range(1, 4):\n    s += i\nprint(s)", o: ["A. 10", "B. 6", "C. 12", "D. 3"], a: 1, e: "range(1,4) cho 1, 2, 3. Tổng s = 1+2+3 = 6." },

  { q: "Cho đoạn mã sau:", c: "nums = [6, 0, 7]\nfor n in nums:\n    n = n + 1\nprint(nums)", o: ["A. [6, 0, 7, 1]", "B. [7, 1, 8]", "C. [6, 0, 7]", "D. Báo lỗi vì không thể cộng 1 cho phần tử trong list", "E. [6, 1, 7]"], a: 2, e: "Chương trình in ra gì? Biến n chỉ là một tham chiếu cục bộ trong vòng lặp, gán lại n không làm thay đổi các phần tử thực trong list. List nums vẫn giữ nguyên [6, 0, 7]." },

  { q: "Kết quả sau khi thực hiện chương trình sau:", c: "x = (i for i in range(3))\nfor i in x:\n    print(i)\nfor i in x:\n    print(i)", o: ["A. 0 1 2", "B. Error", "C. 0 1 2 0 1 2", "D. Không đáp án nào đúng"], a: 0, e: "x là generator, chỉ có thể duyệt qua một lần. Vòng lặp đầu in 0, 1, 2; vòng lặp thứ hai không in gì vì generator đã cạn. Vậy chương trình chỉ in ra 0 1 2." },

  { q: "Cho định nghĩa hàm sau:", c: "def check_value(n):\n    \"\"\"Kiểm tra số n.\n    Trả về True nếu n là số dương, ngược lại False.\"\"\"\n    return n > 0", o: ["A. Hàm trên sẽ gây lỗi AssertionError nếu ta truyền vào số 0", "B. assert check_value(-1) == True sẽ không gây ra lỗi", "C. Câu lệnh assert check_value(10) sẽ trả về kết quả là None ra màn hình", "D. assert check_value(5) == True sẽ không gây ra lỗi", "E. Docstring của hàm không cung cấp thông tin về giá trị trả về"], a: 3, e: "Khẳng định nào sau đây về việc kiểm thử hàm này là đúng? check_value(5) trả về True (vì 5>0), nên assert check_value(5) == True luôn đúng, không gây lỗi. Các phương án khác đều sai theo logic của hàm." },

  { q: "Phát biểu nào mô tả đúng nhất về 'specification' (đặc tả) của một hàm?", c: "", o: ["A. Đặc tả mô tả hàm *làm gì* (hành vi), thường viết dưới dạng docstring: tham số, kết quả trả về, và điều kiện liên quan.", "B. Đặc tả chỉ cần viết sau khi đã code xong để 'cho đẹp'.", "C. Đặc tả chỉ gồm tên hàm và danh sách tham số (không cần mô tả).", "D. Đặc tả mô tả *cách* cài đặt chi tiết từng dòng lệnh trong hàm.", "E. Đặc tả là một file riêng, không liên quan đến docstring."], a: 0, e: "Specification tập trung vào hành vi (input, output, điều kiện) — 'làm gì', không phải 'làm như thế nào' (đó là cài đặt/implementation)." },

  { q: "Đâu là output đoạn mã sau:", c: "def writer():\n    title = 'Sir'\n    name = (lambda x: title + ' ' + x)\n    return name\n\nwho = writer()\nprint(who('Arthur'))", o: ["A. Arthur Sir", "B. Arthur", "C. Không đáp án đúng", "D. Sir Arthur"], a: 3, e: "Hàm lambda closure giữ tham chiếu tới biến title = 'Sir' từ hàm writer(). Khi gọi who('Arthur'), kết quả là 'Sir' + ' ' + 'Arthur' = 'Sir Arthur'." },

  { q: "Yêu cầu: Nhập một chuỗi từ bàn phím, chuyển toàn bộ thành chữ thường, rồi in ra. Xét đoạn mã sau:", c: "text = input\nresult = text.lower\nprint(result)", o: ["A. In ra một object hàm - sai vì không gọi hàm", "B. In ra chuỗi người dùng nhập ở dạng chữ thường - đúng yêu cầu", "C. Không in ra gì", "D. In ra chuỗi người dùng nhập - sai vì thiếu .lower()", "E. Lỗi TypeError do lower không nhận tham số"], a: 0, e: "Kết quả thực thi đoạn mã in ra là gì? text = input (thiếu dấu ()) chỉ gán đối tượng hàm input, không gọi hàm. Tương tự result = text.lower chỉ gán method object, không thực thi. print(result) in ra một bound method object, không phải chuỗi đã xử lý." },

  { q: "Phân tích đoạn mã dưới đây. Khi thực thi, chương trình sẽ dừng lại (tung ra AssertionError) ở dòng nào?", c: "def power(base, exp):\n    if exp == 0: return 1\n    if exp < 0: return 1 / power(base, -exp)\n    return base * power(base, exp - 1)\n\n# Test cases\nassert power(2, 3) == 8        # Dòng 1\nassert power(5, 0) == 1        # Dòng 2\nassert power(2, -1) == 0.5     # Dòng 3\nassert power(-2, 2) == -4      # Dòng 4\nassert power(10, 2) == 100     # Dòng 5", o: ["A. Không có dòng nào, tất cả các test đều vượt qua.", "B. Dòng 3", "C. Dòng 5", "D. Dòng 4", "E. Dòng 1"], a: 3, e: "power(-2, 2) tính đúng ra 4 (vì (-2)*(-2)=4), không phải -4 như assert kỳ vọng. Vậy chương trình dừng và báo lỗi tại Dòng 4." },

  { q: "Kết quả thực hiện đoạn mã sau:", c: "total={}\ndef insert(items):\n    if items in total:\n        total[items] += 1\n    else:\n        total[items] = 1\n\ninsert('Apple')\ninsert('Ball')\ninsert('Apple')\nprint(len(total))", o: ["A. 1", "B. 2", "C. 0", "D. 3"], a: 1, e: "'Apple' và 'Ball' là 2 khóa khác nhau trong dict total (lần insert thứ 3 chỉ tăng giá trị của khóa 'Apple' đã có). Vậy len(total) = 2." },

  { q: "Kết quả khi thực thi đoạn mã này là gì?", c: "counts = {\"apple\": 1, \"banana\": 2}\n\nfor fruit in counts:\n    if counts[fruit] > 1:\n        counts[\"orange\"] = 3\n    else:\n        counts[fruit] += 1\n\nprint(len(counts))", o: ["A. In ra 3", "B. Chương trình chạy vô hạn (Infinite loop)", "C. Chương trình báo lỗi RuntimeError: dictionary changed size during iteration", "D. In ra 2", "E. Chương trình báo lỗi KeyError: 'orange'"], a: 2, e: "Khi đang lặp qua \"banana\" (giá trị 2 > 1), chương trình thêm khóa mới \"orange\" vào dict ngay trong lúc vòng lặp đang chạy trên counts — Python cấm thay đổi kích thước dict khi đang iterate, gây lỗi RuntimeError." },

  { q: "Kết quả của đoạn code sau là gì?", c: "s = {1, 2, 3}\nt = {3, 4}\nprint(s & t)", o: ["A. Lỗi cú pháp", "B. {1, 2, 3, 4}", "C. {1, 2, 4}", "D. {3}"], a: 3, e: "Toán tử & giữa hai set trả về phần giao (intersection). Giao của {1,2,3} và {3,4} chỉ có phần tử 3 chung, nên kết quả là {3}." },

  { q: "Cho đoạn mã sau:", c: "d = {\"a\": 1, \"b\": 2}\nprint(d.get(\"c\", 0))", o: ["A. None", "B. \"c\"", "C. Báo lỗi TypeError", "D. Báo lỗi KeyError", "E. 0"], a: 4, e: "Chương trình in ra gì? dict.get(key, default) trả về giá trị mặc định nếu key không tồn tại, không gây lỗi. Vì \"c\" không có trong d, hàm trả về 0." },

  { q: "Cách nào sau đây sẽ lấy ra được đoạn [20, 30, 40] từ my_list = [10, 20, 30, 40, 50]?", c: "my_list = [10, 20, 30, 40, 50]", o: ["A. my_list[2:5]", "B. my_list[1:4]", "C. my_list[1:-2]", "D. my_list[1:3]"], a: 1, e: "my_list[1:4] lấy các phần tử từ chỉ số 1 đến trước chỉ số 4, tức [20, 30, 40] — đúng yêu cầu." },

  { q: "Kết quả in ra màn hình của đoạn code sau là gì?", c: "def update_record(rec):\n    rec['status'] = 'Active'\n    rec = {'id': 99, 'status': 'Pending'}\n    rec['status'] = 'Closed'\n\nmy_record = {'id': 1}\nupdate_record(my_record)\nprint(my_record.get('status'))", o: ["A. Pending", "B. None", "C. Active", "D. Closed"], a: 2, e: "Dòng đầu sửa trực tiếp dict gốc (my_record['status']='Active'). Dòng sau gán rec = {...} chỉ làm rec trỏ tới một dict khác trong bộ nhớ, không ảnh hưởng tới my_record gốc. Vậy my_record['status'] vẫn là 'Active'." },

  { q: "Cho mảng số nguyên A = [29, 10, 14, 37, 13]. Nếu sử dụng thuật toán Sắp xếp chọn (Selection Sort) để sắp xếp mảng theo thứ tự tăng dần, trạng thái của mảng sau 2 lần hoán đổi (swaps) đầu tiên là gì?", c: "", o: ["A. [10, 13, 14, 29, 37]", "B. [10, 13, 14, 37, 29]", "C. [10, 14, 29, 13, 37]", "D. [10, 13, 29, 37, 14]", "E. [10, 29, 14, 37, 13]"], a: 1, e: "Lần 1: tìm min toàn mảng (10) đổi với vị trí 0 → [10, 29, 14, 37, 13]. Lần 2: tìm min trong phần còn lại (13) đổi với vị trí 1 (29) → [10, 13, 14, 37, 29]." },

  { q: "Đâu là phát biểu đúng về Linear search (tìm kiếm tuyến tính)?", c: "", o: ["A. Duyệt từng phần tử cho tới khi gặp mục tiêu hoặc hết danh sách", "B. Chỉ dùng cho danh sách đã sắp xếp", "C. Luôn có độ phức tạp O(log n)", "D. Luôn nhanh hơn tìm kiếm nhị phân (binary search)"], a: 0, e: "Linear search kiểm tra tuần tự từng phần tử của danh sách theo thứ tự cho đến khi tìm thấy mục tiêu hoặc duyệt hết danh sách. Nó không yêu cầu danh sách phải được sắp xếp và có độ phức tạp O(n), không phải O(log n)." },

  { q: "Yêu cầu: Sắp xếp danh sách số theo thứ tự tăng dần bằng merge sort. Xét đoạn mã sau:", c: "def merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] < right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    return result\n\ndef merge_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    mid = len(arr) // 2\n    left = merge_sort(arr[:mid])\n    right = merge_sort(arr[mid:])\n    return merge(left, right)\n\nprint(merge_sort([3, 1, 4, 2]))", o: ["A. [1, 3, 4, 2] - sai do chia mảng sai", "B. [1] - sai vì các phần tử còn thừa không được ghép", "C. [3, 4] - sai vì chỉ ghép nửa đầu", "D. Lỗi IndexError", "E. [1, 2, 3, 4] - đúng với merge sort"], a: 1, e: "Kết quả in ra là gì? Hàm merge() thiếu bước thêm các phần tử còn dư của left hoặc right vào result sau khi vòng while kết thúc. Vì vậy nhiều phần tử bị mất, kết quả cuối cùng chỉ còn [1] thay vì [1, 2, 3, 4]." },

  { q: "Cho đoạn mã sau (giả sử arr đã tăng dần):", c: "def bs(arr, target):\n    lo, hi = 0, len(arr) - 1\n    while lo < hi:\n        mid = (lo + hi) // 2\n        if arr[mid] == target:\n            return mid\n        elif arr[mid] < target:\n            lo = mid + 1\n        else:\n            hi = mid\n    return -1", o: ["A. Trả về sai khi target ở giữa mảng", "B. Trả về sai khi mảng có số âm", "C. Không sai, luôn đúng với mảng tăng dần", "D. Trả về sai khi mảng có phần tử trùng nhau", "E. Trả về sai khi target đúng bằng phần tử cuối cùng của mảng"], a: 4, e: "Hàm trên sai trong trường hợp nào? Điều kiện vòng lặp là lo < hi (không phải <=), nên khi target nằm ở vị trí cuối mảng (lo = hi), vòng lặp không chạy và hàm trả về -1 sai, dù phần tử đó thực sự có trong mảng." },

  { q: "Đoạn mã này có một lỗi logic ẩn khiến kết quả trả về bị thiếu dữ liệu. Đó là lỗi gì?", c: "def merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] < right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    # [VỊ TRÍ LỖI]\n    return result", o: ["A. Thiếu việc thêm các phần tử còn dư của mảng left hoặc right vào result.", "B. Biến i và j không được khởi tạo lại bằng 0 bên trong hàm.", "C. Kết quả result phải được sắp xếp lại bằng hàm sort().", "D. Vòng lặp while bị sai điều kiện, phải là or thay vì and.", "E. Phép so sánh left[i] < right[j] làm thuật toán không ổn định (unstable)."], a: 0, e: "Khi một trong hai mảng left hoặc right hết phần tử trước, vòng while kết thúc nhưng mảng còn lại vẫn còn phần tử chưa được thêm vào result. Đây chính là bug ở câu 34 trước đó." },

  { q: "Chương trình báo lỗi AttributeError: 'SmartDevice' object has no attribute 'brand'. Lỗi nằm ở dòng nào?", c: "class SmartDevice:\n    def __init__(self, brand, price):\n        brand = brand        # Dòng 1\n        self.price = price   # Dòng 2\n\n    def display(self):\n        print(f\"Brand: {self.brand}, Price: {self.price}\")  # Dòng 3\n\nphone = SmartDevice(\"UET-Phone\", 500)\nphone.display()", o: ["A. Dòng khởi tạo phone: Thiếu tham số truyền vào.", "B. Dòng 2: Không được gán trực tiếp giá trị vào self.price.", "C. Dòng 3: F-string không hỗ trợ truy cập thuộc tính đối tượng.", "D. Tên lớp SmartDevice không được viết hoa chữ cái đầu.", "E. Dòng 1: Thiếu từ khóa self. để tạo thuộc tính cho đối tượng."], a: 4, e: "Ở Dòng 1, brand = brand chỉ gán lại biến tham số cục bộ, không tạo thuộc tính self.brand cho đối tượng. Vì thiếu self., khi display() truy cập self.brand sẽ báo lỗi AttributeError." },

  { q: "Biến Class (Class Variable) vs Biến Instance:", c: "class Dog:\n    kind = 'canine' # Class variable\n    def __init__(self, name):\n        self.name = name\n\nd1 = Dog('Fido')\nd2 = Dog('Buddy')\nd1.kind = 'wolf'\nprint(d1.kind, d2.kind)", o: ["A. canine wolf", "B. canine canine", "C. wolf wolf", "D. wolf canine"], a: 3, e: "d1.kind = 'wolf' tạo một thuộc tính instance mới riêng cho d1, không ảnh hưởng tới biến class kind dùng chung. d2 vẫn dùng biến class gốc 'canine'. Kết quả: wolf canine." },

  { q: "Phân tích đoạn code Python sau. Nội dung cuối cùng của log.txt sẽ là gì sau khi script chạy xong?", c: "with open('log.txt', 'w') as f:\n  f.write('init\\n')\nwith open('log.txt', 'a') as f:\n  f.write('update\\n')\nwith open('log.txt', 'w') as f:\n  f.write('reset\\n')", o: ["A. init\\nupdate\\nreset", "B. init\\nreset", "C. Chương trình sẽ báo lỗi vì tệp được mở nhiều lần.", "D. reset"], a: 3, e: "Lệnh with thứ nhất mở bằng 'w' và ghi 'init'. Lệnh with thứ hai mở bằng 'a' và ghi nối 'update' vào sau. Nhưng lệnh with thứ ba lại mở lại bằng 'w', xóa sạch toàn bộ nội dung cũ (cả init và update) rồi chỉ ghi 'reset'. Nội dung cuối cùng của tệp chỉ còn đúng một dòng: reset." },
  { q: "Bạn muốn viết hàm save(msg) để ghi thêm msg vào cuối file log.txt, mỗi lần ghi một dòng. Phiên bản nào sau đây đúng nhất theo đặc tả?", c: "A)\ndef save(msg):\n  f = open(\"log.txt\", \"w\")\n  f.write(msg + \"\\n\")\n  f.close()\n\nB)\ndef save(msg):\n  f = open(\"log.txt\", \"a\")\n  f.write(msg + \"\\n\")\n  f.close()\n\nC)\ndef save(msg):\n  with open(\"log.txt\", \"r\") as f:\n    f.write(msg + \"\\n\")\n\nD)\ndef save(msg):\n  with open(\"log.txt\", \"a\") as f:\n    print(msg)\n\nE)\ndef save(msg):\n  f = open(\"log.txt\", \"a\")\n  f.write(msg + \"\\n\")\n  return\n  f.close()", o: ["A. Phiên bản A", "B. Phiên bản B", "C. Phiên bản D", "D. Phiên bản E"], a: 1, e: "Phiên bản A dùng mode 'w' nên mỗi lần gọi sẽ xóa sạch nội dung cũ, sai yêu cầu 'ghi thêm'. Phiên bản C mở file ở mode 'r' (chỉ đọc) nên gọi f.write() sẽ báo lỗi io.UnsupportedOperation. Phiên bản D chỉ in msg ra màn hình bằng print(msg) mà không hề ghi gì vào file. Phiên bản E có lệnh return nằm trước f.close(), khiến f.close() không bao giờ được thực thi (dù dữ liệu vẫn được ghi nhờ buffer flush khi hàm kếtthu hình). Chỉ có phiên bản B dùng đúng mode 'a' (append) để ghi nối vào cuối file, kèm write() và close() đúng cách." },
  { q: "Xét đoạn mã sau:", c: "with open(\"a.txt\", \"w\") as f:\n  f.write(\"Hello\")\n1 / 0", o: ["A. File bị mất nội dung", "B. File không được đóng", "C. File được đóng trước khi xảy ra lỗi", "D. Python sẽ phát sinh lỗi FileExistsError"], a: 2, e: "Dòng 1/0 gây lỗi ZeroDivisionError, nhưng nó nằm NGOÀI khối with — tại thời điểm đó, khối with đã kết thúc bình thường và tự động gọi __exit__ để đóng file 'a.txt' rồi. Vì vậy file đã được đóng an toàn trước khi lỗi chia cho 0 xảy ra ở dòng kế tiếp." },
  { q: "Lệnh nào sau đây đọc toàn bộ nội dung file thành một chuỗi (string) duy nhất?", c: "", o: ["A. f.readline()", "B. f.read()", "C. f.splitlines()", "D. f.readlines()", "E. f.read(1)"], a: 1, e: "f.read() không truyền tham số sẽ đọc và trả về toàn bộ nội dung còn lại của file dưới dạng một chuỗi string duy nhất. f.readline() chỉ đọc 1 dòng, f.readlines() trả về list các dòng, f.read(1) chỉ đọc 1 ký tự, còn splitlines() là phương thức của string để tách dòng, không phải của file object." },

  { q: "Cho danh sách Ist = [0, 1, 2, 3, 4, 5]. Lệnh Ist[1:4] (Slicing) trả về kết quả gì?", c: "", o: ["A. [1, 2]", "B. [1, 2, 3, 4]", "C. [0, 1, 2, 3]", "D. [1, 2, 3]"], a: 3, e: "Cắt mảng chọn phần tử từ vị trí 1 đến sát cận biên 4 (không lấy vị trí 4), thu về mảng con gồm index 1, 2, 3 tương ứng [1, 2, 3]." },
  { q: "Cấu trúc dữ liệu nào KHÔNG cho phép chứa các phần tử trùng lặp (duplicate)?", c: "", o: ["A. List", "B. Tuple", "C. Set", "D. String"], a: 2, e: "Tập hợp (Set) triệt tiêu hoàn toàn trùng lặp dữ liệu nhờ thuật toán băm khóa định danh độc bản." },
  { q: "Phương thức d.keys() của Dictionary trả về cái gì?", c: "", o: ["A. Danh sách các giá trị (values)", "B. Danh sách các khóa định danh (keys)", "C. Danh sách các cặp tuple (key, value)", "D. Số lượng phần tử"], a: 1, e: "Hàm keys() trích xuất toàn bộ tập hợp các trường Khóa (khóa định danh) đang làm hộ chiếu quản lý giá trị trong từ điển d." },
  { q: "Độ phức tạp thời gian (Time Complexity) trong trường hợp xấu nhất của thuật toán Tìm kiếm tuần tự (Linear Search) trên danh sách n phần tử là:", c: "", o: ["A. O(1)", "B. O(n)", "C. O(n^2)", "D. O(log n)"], a: 1, e: "Worst-case của tìm kiếm tuyến tính xảy ra khi đối tượng nằm ở slot cuối cùng hoặc không có trong danh sách, thuật toán phải cày quét qua n node." },
  { q: "Thuật toán sắp xếp nào hoạt động theo nguyên lý 'Chia để trị' (Divide and Conquer)?", c: "", o: ["A. Bubble Sort", "B. Insertion Sort", "C. Merge Sort", "D. Linear Sort"], a: 2, e: "Merge Sort áp dụng chia để trị băm nhỏ danh sách về mảng đơn lẻ đệ quy, rồi thực hiện hàm trộn có trật tự tăng dần ngược lên." },
  { q: "Trong thuật toán Insertion Sort (Sắp xếp chèn), chúng ta làm gì?", c: "", o: ["A. Luôn tìm phần tử nhỏ nhất và đưa về đầu mảng.", "B. Chia đôi danh sách liên tục.", "C. Lấy từng phần tử và chèn nó vào đúng vị trí trong phần danh sách con đã được sắp xếp trước đó.", "D. Hoán đổi ngẫu nhiên các vị trí ô nhớ."], a: 2, e: "Insertion sort bốc phần tử kế tiếp ở mảng chưa sort để rà quét chèn chêm vào đúng vị trí có thứ tự của khối mảng con bên trái." },
  { q: "Biến self trong định nghĩa phương thức của Class đại diện cho điều gì?", c: "", o: ["A. Class đó nói chung.", "B. Đối tượng hiện tại (current instance) đang trực tiếp gọi phương thức.", "C. Một biến toàn cục.", "D. Thư viện hệ thống Python."], a: 1, e: "self là tham số ngữ cảnh, đại diện trực quan cho chính thực thể instance đang thực thi phương thức tại thời điểm runtime." },
  { q: "Tính chất 'Kế thừa' (Inheritance) cho phép điều gì?", c: "", o: ["A. Một Class con (Subclass) có thể sử dụng lại các thuộc tính và phương thức của Class cha (Superclass).", "B. Class con xóa đi hoàn toàn cấu trúc Class cha.", "C. Class cha tự động sao chép mã từ Class con.", "D. Không cho phép tạo thêm thực thể mới."], a: 0, e: "Kế thừa tối ưu hóa hiệu năng viết code giúp lớp con dùng lại tài nguyên sẵn có từ lớp cha mà không cần viết lại (Code Reusability)." },
  { q: "Để kiểm tra xem một đối tượng obj có phải thuộc lớp MyClass hay không, ta dùng hàm nào?", c: "", o: ["A. obj.type() == MyClass", "B. isinstance(obj, MyClass)", "C. check(obj, MyClass)", "D. MyClass.has(obj)"], a: 1, e: "Hàm built-in `isinstance(object, class)` duyệt phả hệ đa hình trả về kết quả True nếu đối tượng ăn khớp với lớp chỉ định." },
  { q: "Lỗi 'RecursionError: maximum recursion depth exceeded' xảy ra khi nào?", c: "", o: ["A. Trình duyệt Chrome bị lỗi xung đột", "B. Hàm đệ quy không có trường hợp cơ sở (base case) hoặc không bao giờ chạm tới base case dẫn tới lặp vô hạn", "C. Máy tính bị hỏng hoặc chập thanh RAM vật lý", "D. Đặt sai tên hàm chức năng"], a: 1, e: "Đệ quy không đáy nạp liên tục vô hạn các khung hàm Stack frame đè nén làm tràn ngập bộ nhớ đệm Call Stack hệ thống." },
  { q: "Cho hàm đệ quy tính giai thừa. Nếu gọi factorial(3), các bước gọi hàm sẽ diễn ra như thế nào?", c: "", o: ["A. Tính ngay lập tức ra kết quả bằng 6", "B. Gọi factorial(3) -> gọi factorial(2) -> gọi factorial(1) -> gọi factorial(0) (base case) rồi quay lui tính kết quả", "C. Gọi tiến lên factorial(3) -> gọi factorial(4)", "D. Chỉ gọi duy nhất 1 lần hiệu năng"], a: 1, e: "Đệ quy hoạt động theo cơ chế LIFO, luồng xử lý đi xuống chạm đáy base case factorial(0) lấy mỏ neo số 1 rồi mới nhân cuộn ngược trở lại." },
  { q: "Vòng lặp while thường được ưu tiên sử dụng hơn for khi nào?", c: "", o: ["A. Khi biết trước chính xác số chu kỳ lặp dữ liệu", "B. Khi muốn lặp rà soát qua một danh sách mảng", "C. Khi số lần lặp chưa biết trước, hoàn toàn phụ thuộc vào trạng thái biến thiên của một điều kiện logic", "D. Không bao giờ nên sử dụng"], a: 2, e: "While mạnh về vòng lặp vô định (indefinite iteration), chạy liên hồi cho tới khi biểu thức logic điều kiện bị đánh giá sang False." },
  { q: "Khai báo nào sau đây tạo ra một Tuple chứa duy nhất một phần tử?", c: "", o: ["A. t = (1)", "B. t = tuple(1)", "C. t = (1, )", "D. Cả A và C"], a: 2, e: "Trong Python, viết dấu ngoặc đơn không `(1)` chỉ tính là dấu ngoặc toán học, biến vẫn là kiểu int. Phải bổ sung thêm dấu phẩy `(1, )` Python mới nhận diện là Tuple 1 phần tử." },
  { q: "Cho list học sinh `students = ['Toan', 'Ly', 'Hoa', 'Sinh', 'Su']`. Lệnh cắt lát `students[::-2]` trả về kết quả nào?", c: "", o: ["A. ['Su', 'Hoa', 'Toan']", "B. ['Toan', 'Hoa', 'Su']", "C. ['Sinh', 'Ly']", "D. Lỗi do bước nhảy âm"], a: 0, e: "Slicing bước nhảy âm -2 quét mảng đảo ngược từ cuối lên đầu cách 2 đơn vị. Lấy vị trí cuối 'Su', bỏ qua 'Sinh' lấy 'Hoa', bỏ qua 'Ly' lấy 'Toan'." },
  { q: "Cho đoạn mã sau, kết quả in ra màn hình là gì?", c: "a = [1, 2, [3, 4]]\nb = a.copy()\nb[2].append(5)\nprint(a[2])", o: ["A. [3, 4]", "B. [3, 4, 5]", "C. Lỗi AttributeError", "D. [1, 2, [3, 4, 5]]"], a: 1, e: "Hàm .copy() tạo Shallow Copy (sao chép nông), mảng con `[3, 4]` bên trong vẫn bị dùng chung tham chiếu địa chỉ ô nhớ. b thêm phần tử vào mảng con làm thay đổi trực tiếp cả mảng con của a." },
  { q: "Phương thức dict.get(key, default) có ưu điểm gì so với việc truy cập trực tiếp bằng ngoặc vuông dict[key]?", c: "", o: ["A. Tốc độ thực thi nhanh hơn O(1) bảng băm", "B. Không báo lỗi KeyError nếu khóa không tồn tại, mà an toàn trả về giá trị default gán sẵn", "C. Tự động thêm khóa mới vào Dictionary", "D. Xóa khóa đó khỏi từ điển sau khi đọc xong"], a: 1, e: "Truy cập ngoặc vuông gặp key ảo gây sập luồng code vì lỗi KeyError. Hàm .get() cứu cánh bảo vệ an toàn bằng cách hoàn tác về giá trị default dự phòng." },
  { q: "Dictionary Comprehension nào sau đây là hợp lệ để tạo ra tập hợp dữ liệu `{1: 1, 2: 4, 3: 9}`?", c: "", o: ["A. {x^2: x for x in [1, 2, 3]}", "B. {x: x**2 for x in range(1, 4)}", "C. [x: x*2 for x in range(1, 4)]", "D. dict(x=x**2 for x in range(1, 4))"], a: 1, e: "Cú pháp tạo từ điển nén chuẩn: `{key: value for biến in iterable}`. range(1,4) sinh số từ 1 đến 3. Toán tử lũy thừa mũ là **." },
  { q: "Phép toán ký hiệu mũ A ^ B trên hai tập hợp (Set) trong Python thực hiện chức năng toán học nào?", c: "", o: ["A. Hợp của hai tập hợp (Union)", "B. Giao của hai tập hợp (Intersection)", "C. Hiệu đối xứng (Symmetric Difference) - trích xuất các phần tử chỉ thuộc A hoặc chỉ thuộc B", "D. Kiểm tra tập con Subset"], a: 2, e: "Toán tử ^ đại diện phép hiệu đối xứng, lấy tất cả phần tử của cả 2 set ngoại trừ các phần tử chung giao nhau của hai bên." },
  { q: "Đoạn mã xử lý Set đặc biệt sau đây in ra kết quả độ dài bằng bao nhiêu?", c: "s = {1, True, 'UET', 1.0}\nprint(len(s))", o: ["A. 4", "B. 3", "C. 2", "D. Lỗi vì set không chứa hỗn hợp nhiều kiểu dữ liệu"], a: 2, e: "Trong Python logic, số 1 == True == 1.0 mang chung mã băm hash và bằng nhau. Set triệt tiêu trùng lặp và giữ lại đại diện đầu tiên là 1. Set cuối chỉ còn lại `{1, 'UET'}` có độ dài bằng 2." },
  { q: "Hàm đồng bộ zip() khi thực hiện ghép nối hai mảng List có độ dài lệch nhau sẽ xử lý ra sao?", c: "", o: ["A. Báo lỗi hệ thống ValueError", "B. Tự động điền giá trị khuyết thiếu bằng None", "C. Cắt bỏ các phần tử thừa của List dài hơn, lấy kích thước neo theo List ngắn nhất", "D. Trả về mảng phẳng chứa tất cả phần tử"], a: 2, e: "Hàm zip() hoạt động lười biếng và ngắt luồng chốt sổ ngay khi mảng ngắn nhất cạn kiệt phần tử, chấp nhận hy sinh vứt bỏ đoạn thừa của mảng dài." },
  { q: "Đối tượng nào sau đây cấu trúc bản chất KHÔNG PHẢI là một Iterable (đối tượng có thể lặp)?", c: "", o: ["A. Một luồng file mở (open('file.txt'))", "B. Một giá trị số nguyên thô (int)", "C. Chuỗi văn bản ký tự (str)", "D. Kết quả trả về của hàm range()"], a: 1, e: "Kiểu số nguyên int là một thực thể đơn nhất không chứa cấu trúc tập hợp bên trong, cố tình nhét vào vòng lặp For sẽ văng lỗi TypeError." },
  { q: "Để sử dụng một tập hợp tập dữ liệu làm trường Khóa (Key) trong một Dictionary, ta phải áp dụng kiểu dữ liệu nào?", c: "", o: ["A. set", "B. list", "C. frozenset", "D. Không thể dùng tập hợp làm Key dưới mọi hình thức"], a: 2, e: "Key của từ điển yêu cầu thuộc tính bất biến hoàn toàn (Hashable). Set thông thường là mutable (khả biến) nên bị cấm. Ta phải đóng băng nó bằng kiểu `frozenset`." },
  { q: "Nếu áp dụng thuật toán Tìm kiếm nhị phân (Binary Search) trên một mảng đã sắp xếp có 1000 phần tử, số lần so sánh tối đa trong trường hợp xấu nhất là khoảng bao nhiêu?", c: "", o: ["A. Khoảng 10 lần", "B. Khoảng 100 lần", "C. Khoảng 500 lần", "D. Khoảng 1000 lần"], a: 0, e: "Do chặt đôi không gian dữ liệu sau mỗi vòng lặp, số bước tính bằng logarit cơ số 2 của 1000: $2^{10} = 1024 > 1000$, mất tối đa 10 lần so sánh." },
  { q: "Thuật toán sắp xếp nào sau đây có độ phức tạp thời gian tốt nhất (Best case) đạt ngưỡng O(n) khi mảng đầu vào đã có tính thứ tự sắp xếp sẵn?", c: "", o: ["A. Selection Sort", "B. Insertion Sort (hoặc Bubble Sort phiên bản tối ưu early-exit)", "C. Merge Sort", "D. Quick Sort"], a: 1, e: "Insertion Sort hoặc Bubble Sort tối ưu khi quét mảng đã được xếp sẵn chỉ tốn 1 lượt kiểm tra rà soát tuyến tính mất O(n) rồi ngắt kết thúc." },
  { q: "Hàm sắp xếp mặc định của hệ thống `.sort()` trên cấu trúc List của Python vận hành giải thuật nào ẩn bên dưới?", c: "", o: ["A. Quick Sort", "B. Timsort (Cơ chế lai ghép thông minh giữa Merge Sort và Insertion Sort)", "C. Heap Sort", "D. Radix Sort"], a: 1, e: "Timsort do Tim Peters chế tác là giải thuật chuẩn của Python, tối ưu tốc độ đỉnh cao dựa trên các chuỗi dữ liệu có sẵn trong thực tế." },
  { q: "Đoạn mã nào sắp xếp một danh sách các Dictionary theo giá trị trường điểm 'score' giảm dần chuẩn xác nhất?", c: "", o: ["A. students.sort(key=lambda x: x['score'], reverse=True)", "B. students.sort(reverse=True, score)", "C. sorted(students, lambda x: x['score'])", "D. students.sort(key='score', descending=True)"], a: 0, e: "Phương thức `.sort()` yêu cầu định nghĩa hàm trích xuất khóa qua tham số `key` (sử dụng lambda) và đảo chiều mảng qua tham số `reverse=True`." },
  { q: "Biến thuộc tính 'wheels' khai báo trực tiếp trong lòng Class như đoạn mã sau được định danh là gì?", c: "class RobotCar:\n    wheels = 4\n\n    def __init__(self, board):\n        self.board = board", o: ["A. Biến toàn cục (Global variable)", "B. Biến của lớp (Class variable)", "C. Biến của đối tượng (Instance variable)", "D. Biến cục bộ (Local variable)"], a: 1, e: "Biến wheels nằm ngoài init và khai báo trực tiếp trong class là Biến của lớp (Class variable), nằm chung ô nhớ dùng chung cho mọi thực thể." },
  { q: "Hàm cấu trúc `super().__init__()` đóng vai trò kỹ thuật gì trong Lập trình hướng đối tượng?", c: "", o: ["A. Triệu gọi kích hoạt phương thức khởi tạo constructor của lớp cha (Superclass) từ không gian lớp con (Subclass).", "B. Khởi tạo một đối tượng độc lập thuộc lớp cha.", "C. Giải phóng xóa đối tượng hiện tại khỏi bộ nhớ RAM.", "D. Ép phương thức hiện tại biến đổi thành phương thức tĩnh Static."], a: 0, e: "super() trỏ ngược về ngữ cảnh lớp cha, kích hoạt hàm init của cha giúp lớp con thiết lập đầy đủ các thuộc tính kế thừa phả hệ." },
  { q: "Đoạn code kế thừa ghi đè phương thức sau đây in ra kết quả nào?", c: "class UETStudent:\n    def study(self):\n        return 'Learning...'\n\nclass Mechatronics(UETStudent):\n    def study(self):\n        return 'Building circuits...'\n\nsv = Mechatronics()\nprint(sv.study())", o: ["A. 'Learning...'", "B. 'Building circuits...'", "C. 'Learning... Building circuits...'", "D. Lỗi hệ thống do trùng tên hàm"], a: 1, e: "Thực thể sv thuộc lớp con Mechatronics. Theo tính chất đa hình đa diện, phương thức trùng tên của lớp con đã ghi đè (override) hoàn toàn lớp cha." },
  { q: "Trong Python, làm thế nào để khai báo một thuộc tính là 'private' (chỉ sử dụng nội bộ trong class) theo quy ước name mangling bảo mật?", c: "", o: ["A. Dùng từ khóa private đứng chặn trước tên biến", "B. Đặt tên biến bắt đầu bằng hai dấu gạch dưới liên tiếp __ (ví dụ: __voltage)", "C. Đặt tên biến bắt đầu bằng một dấu gạch dưới _", "D. Viết hoa toàn bộ các ký tự tên biến"], a: 1, e: "Quy ước tiền tố `__` kích hoạt cơ chế Name Mangling ẩn danh biến thành `_ClassName__variableName`, ngăn chặn các truy cập thô bạo từ rìa ngoài lớp." },
  { q: "Hàm kiểm tra đệ quy countdown(2) sau đây xuất ra chuỗi kết quả nào?", c: "def countdown(n):\n    if n <= 0:\n        print('Go!')\n    else:\n        print(n)\n        countdown(n-1)\n\ncountdown(2)", o: ["A. 2, 1, Go! (xuống dòng đơn)", "B. Go!, 1, 2", "C. 2, Go!, 1", "D. 1, 2, Go!"], a: 0, e: "Chu kỳ 1: in 2, gọi countdown(1). Chu kỳ 2: in 1, gọi countdown(0). Chu kỳ 3: chạm base case n<=0, in 'Go!'. Thứ tự in trên các dòng: 2, 1, Go!." },
  { q: "Khái niệm 'Memoization' kết hợp với giải thuật đệ quy nhằm mục đích tối ưu hóa nào?", c: "", o: ["A. Tiết kiệm dung lượng văn bản mã nguồn file code", "B. Tiêu diệt triệt tiêu các trường hợp cơ sở base case", "C. Thiết lập bộ nhớ mảng đệm lưu trữ kết quả của các bài toán con đã giải để tránh việc phải tính toán lặp lại dư thừa", "D. Ép buộc hàm đệ quy biến đổi thành vòng lặp while"], a: 2, e: "Memoization (Ghi nhớ) lưu cấu trúc kết quả toán học vào một mảng đệm (bảng tra cứu/cache). Lần sau gặp lại chỉ cần bốc đáp án ra dùng trong O(1)." },

// ==========================================

// QUIZ ENGINE LOGIC VỚI TÍNH NĂNG MỚI

// ==========================================

let quizData = [];

let answered = 0, correct = 0, wrong = 0;

let totalQuestions = 0;



// Hệ thống tính giờ

let startTime, timerInterval;



function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }



function highlight(code) {

  let s = esc(code);

  s = s.replace(/\b(print|range|len|type|list|dict|set|tuple|str|int|float|bool|super|map|filter|zip|enumerate|sorted|min|max|sum|any|all|hash|isinstance|hasattr|getattr|setattr|id|repr|open|input|abs)\b/g, '<bi>$1</bi>');

  s = s.replace(/\b(def|class|return|if|elif|else|for|while|in|not|and|or|is|try|except|finally|import|from|pass|break|continue|yield|lambda|with|as|del|raise|nonlocal|global|True|False|None|self|cls)\b/g, '<kw>$1</kw>');

  s = s.replace(/(&#39;[^&#39;\n]*&#39;)/g, '<str>$1</str>');

  s = s.replace(/(&quot;[^&quot;\n]*&quot;)/g, '<str>$1</str>');

  s = s.replace(/\b(\d+\.?\d*)\b/g, '<num>$1</num>');

  s = s.replace(/(#[^\n]*)/g, '<cmt>$1</cmt>');

  return s;

}



function shuffleArray(array) {

  for (let i = array.length - 1; i > 0; i--) {

    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] = [array[j], array[i]];

  }

}



// Bấm giờ làm bài

function updateTimer() {

  let elapsed = Math.floor((Date.now() - startTime) / 1000);

  let m = String(Math.floor(elapsed / 60)).padStart(2, '0');

  let s = String(elapsed % 60).padStart(2, '0');

  document.getElementById('quiz-timer').textContent = `⏱️ ${m}:${s}`;

}



function startQuiz(mode) {

  document.getElementById('start-menu').style.display = 'none';

  document.getElementById('main-header').style.display = 'block';

  document.getElementById('main-content').style.display = 'block';



  let clone1 = rawQuizData1.map((q, i) => ({ ...q, originalId: 'Đề 1 - Q' + (i + 1) }));

  let clone2 = rawQuizData2.map((q, i) => ({ ...q, originalId: 'Đề 2 - Q' + (i + 1) }));

  let clone3 = rawQuizData3.map((q, i) => ({ ...q, originalId: 'Đề 3 - Q' + (i + 1) }));

  let clone4 = rawQuizData4.map((q, i) => ({ ...q, originalId: 'Đề 4 - Q' + (i + 1) }));

  let clone5 = rawQuizData5.map((q, i) => ({ ...q, originalId: 'Đề 5 - Q' + (i + 1) }));

  

  if (mode === 1) {

    document.getElementById('quiz-title').textContent = "🐍 Quiz: Đề 1 Cơ Bản";

    quizData = clone1;

  } 

  else if (mode === 2) {

    document.getElementById('quiz-title').textContent = "🐍 Quiz: Đề 2 Nâng Cao";

    quizData = clone2;

  } 

  else if (mode === 4) {

    document.getElementById('quiz-title').textContent = "🧠 Quiz: Đề 3 Tư Duy Tính Toán";

    quizData = clone3;

  }

  else if (mode === 3) {

  document.getElementById('quiz-title').textContent = "🎲 Quiz: Random Tổng Hợp";

  // Đã bổ sung .concat(clone5) để random cả 5 đề

  let combined = clone1.concat(clone2).concat(clone3).concat(clone4).concat(clone5);

  shuffleArray(combined);

  quizData = combined.slice(0, 50);

}

  else if (mode === 5) {

    document.getElementById('quiz-title').textContent = "🏆 Quiz: Tư Duy Tính Toán Kì 1";

    quizData = clone4;

  }

  else if (mode === 6) {

  document.getElementById('quiz-title').textContent = "🆕 Quiz: Đề 5 Bổ Sung Mới";

  quizData = clone5;

}



  shuffleArray(quizData);

  totalQuestions = quizData.length;

  document.getElementById('grade-total').textContent = `/ ${totalQuestions}`;

  

  buildQuiz();

  updateProgress();



  // Khởi động đồng hồ

  startTime = Date.now();

  timerInterval = setInterval(updateTimer, 1000);

}



function buildQuiz() {

  const container = document.getElementById('quiz-container');

  container.innerHTML = '';

  quizData.forEach((q, qi) => {

    const card = document.createElement('div');

    card.className = 'q-card';

    card.id = 'card-' + qi;

    const optHtml = q.o.map((opt, oi) => {

      const letter = ['A','B','C','D','E'][oi];

      const text = opt.replace(/^[A-D]\.\s*/, '');

      return `<div class="opt" id="opt-${qi}-${oi}" onclick="choose(${qi},${oi})">

        <div class="opt-key">${letter}</div><div class="opt-text">${esc(text)}</div>

      </div>`;

    }).join('');

    

    card.innerHTML = `

      <div class="q-head">

        <div class="q-num">Q${qi+1}<span class="original-id">(Nguồn: ${q.originalId})</span></div>

        <div class="q-text">${esc(q.q)}</div>

        <div class="q-status" id="st-${qi}"></div>

      </div>

      ${q.c ? `<pre class="code-block">${highlight(q.c)}</pre>` : ''}

      <div class="options" id="opts-${qi}">${optHtml}</div>

      <div class="explanation" id="exp-${qi}">

        <div class="exp-label">💡 Giải thích</div>${esc(q.e)}

      </div>`;

    container.appendChild(card);

  });

}



function choose(qi, oi) {

  const optsEl = document.getElementById('opts-' + qi);

  if (optsEl.dataset.done) return;

  optsEl.dataset.done = '1';

  const q = quizData[qi];

  const isCorrect = (oi === q.a);



  optsEl.querySelectorAll('.opt').forEach((el, i) => {

    el.classList.add('disabled');

    if (i === q.a) el.classList.add('correct');

    else if (i === oi && !isCorrect) el.classList.add('wrong');

  });



  const st = document.getElementById('st-' + qi);

  st.textContent = isCorrect ? '✓' : '✗';

  st.className = 'q-status show ' + (isCorrect ? 'correct-icon' : 'wrong-icon');



  document.getElementById('card-' + qi).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  document.getElementById('exp-' + qi).classList.add('show');



  answered++;

  if (isCorrect) correct++; else wrong++;

  updateProgress();

  if (answered === totalQuestions) showResult();

}



function updateProgress() {

  const pct = Math.round(answered / totalQuestions * 100) || 0;

  document.getElementById('prog-text').textContent = `${answered} / ${totalQuestions} đã trả lời`;

  document.getElementById('prog-pct').textContent = pct + '%';

  document.getElementById('prog-fill').style.width = pct + '%';

  document.getElementById('cnt-c').textContent = correct;

  document.getElementById('cnt-w').textContent = wrong;

}



function showResult() {

  clearInterval(timerInterval); // Dừng đồng hồ

  

  const pct = Math.round(correct / totalQuestions * 100);

  const ring = document.getElementById('grade-ring');

  let color, title, sub;

  if (pct >= 90)      { color='#34d399'; title='🏆 Xuất sắc!';  sub='Bạn nắm kiến thức cực kỳ vững vàng!'; }

  else if (pct >= 75) { color='#7c6af7'; title='🎉 Giỏi lắm!';  sub='Chỉ còn một ít cần ôn thêm.'; }

  else if (pct >= 55) { color='#fbbf24'; title='📚 Khá tốt!';   sub='Cần ôn lại một số chủ đề quan trọng.'; }

  else                { color='#f87171'; title='💪 Cố lên!';     sub='Hãy ôn lại và thử lại nhé!'; }



  ring.style.cssText += `;border:3px solid ${color};background:${color}22;color:${color}`;

  document.getElementById('grade-txt').textContent = correct;

  document.getElementById('res-title').textContent = title;

  document.getElementById('res-sub').textContent = `Bạn đúng ${correct}/${totalQuestions} câu (${pct}%). ${sub}`;

  

  // Hiển thị thời gian hoàn thành

  const timeTaken = document.getElementById('quiz-timer').textContent.replace('⏱️ ', '');

  document.getElementById('res-time').textContent = `⏱️ Thời gian hoàn thành: ${timeTaken}`;



  const banner = document.getElementById('result-banner');

  banner.style.display = 'block';

  setTimeout(() => banner.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);

}

</script>

      <span id="toggle-pwd" onclick="togglePassword()" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #a3abc9; user-select: none; font-size: 1.3rem;">👁️</span>

    </div>

    

    <button onclick="loginWithFirebase()" style="width: 100%; padding: 16px; background: linear-gradient(90deg, #7c6af7, #56cfb2); color: #0f1117; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(86, 207, 178, 0.4);">Đăng Nhập</button>

    <p id="login-error" style="color: #f87171; margin-top: 18px; display: none; font-size: 0.95rem; font-weight: 500;"></p>

  </div>

</div>



<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";



  // Cấu hình từ dự án của bạn

  const firebaseConfig = {

    apiKey: "AIzaSyCgXX1v_RAgkPeL9OH8q8EhpxnVO0YmZBU",

    authDomain: "python-quiz-db.firebaseapp.com",

    projectId: "python-quiz-db",

    storageBucket: "python-quiz-db.firebasestorage.app",

    messagingSenderId: "51548747869",

    appId: "1:51548747869:web:57e02c55b3ef9477c9b5b4",

    measurementId: "G-HPHTCS2HLC"

  };



  const app = initializeApp(firebaseConfig);

  const auth = getAuth(app);



  // Theo dõi trạng thái: Đã đăng nhập hay chưa?

  onAuthStateChanged(auth, (user) => {

    const btnLogout = document.getElementById('btn-logout');

    if (user) {

      document.getElementById('login-screen').style.display = 'none';

      if(btnLogout) btnLogout.style.display = 'flex'; // Hiện nút Đăng Xuất ở Menu

    } else {

      document.getElementById('login-screen').style.display = 'flex';

      if(btnLogout) btnLogout.style.display = 'none'; // Giấu nút đi khi chưa Login

    }

  });



  // Hàm login

  window.loginWithFirebase = () => {

    const email = document.getElementById('email').value;

    const password = document.getElementById('password').value;

    const errBox = document.getElementById('login-error');

    

    if(!email || !password) {

      errBox.textContent = "Vui lòng nhập đủ email và mật khẩu!";

      errBox.style.display = 'block';

      return;

    }



    signInWithEmailAndPassword(auth, email, password)

      .then((userCredential) => {

        errBox.style.display = 'none';

      })

      .catch((error) => {

        errBox.textContent = "Sai tài khoản hoặc mật khẩu!";

        errBox.style.display = 'block';

      });

  };



  // Ẩn / Hiện password

  window.togglePassword = () => {

    const pwdInput = document.getElementById('password');

    const toggleIcon = document.getElementById('toggle-pwd');

    

    if (pwdInput.type === 'password') {

      pwdInput.type = 'text';

      toggleIcon.textContent = '🙈';

    } else {

      pwdInput.type = 'password';

      toggleIcon.textContent = '👁️';

    }

  };



  // Hàm Đăng xuất

  window.logoutFirebase = () => {

    signOut(auth).then(() => {

      location.reload(); 

    }).catch((error) => {

      console.log("Lỗi đăng xuất:", error);

    });

  };

</script>

</body>

</html>
