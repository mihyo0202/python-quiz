<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Python Quiz — Pro (Select Mode)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #0f1117; 
  --surface: rgba(26, 29, 39, 0.75); 
  --surface2: rgba(34, 38, 58, 0.85); 
  --border: rgba(255, 255, 255, 0.08); 
  --accent: #7c6af7; --accent2: #56cfb2;
  --text: #e2e5f1; --muted: #a3abc9;
  --green: #34d399; --red: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', sans-serif; 
  background: linear-gradient(rgba(15, 17, 23, 0.88), rgba(15, 17, 23, 0.96)), url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text); 
  min-height: 100vh; 
  overflow-x: hidden; 
}

/* Menu chọn đề (Glassmorphism) */
#start-menu {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 17, 23, 0.6); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.menu-box {
  background: rgba(26, 29, 39, 0.65); border: 1px solid var(--border); padding: 36px 28px;
  border-radius: 20px; text-align: center; max-width: 450px; width: 90%;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.menu-box h2 {
  font-size: 1.6rem; margin-bottom: 8px; font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.menu-box p { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }
.menu-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px; margin-bottom: 12px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all .3s ease;
}
.menu-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.15); transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
.menu-btn.highlight { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #0f1117; border: none; }
.menu-btn.highlight:hover { opacity: 0.95; box-shadow: 0 6px 20px rgba(86, 207, 178, 0.4); transform: translateY(-3px); }

/* Header & Progress */
.header {
  background: rgba(26,29,39,0.7); border-bottom: 1px solid var(--border);
  padding: 14px 20px; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.header-inner {
  max-width: 880px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}

.btn-exit {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 8px 14px; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.btn-exit:hover { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 4px 10px rgba(248,113,113,0.3); }

.header h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; color: var(--text); margin-right: auto; }
.timer-badge { font-size: 0.9rem; font-weight: 600; color: var(--accent2); background: rgba(86, 207, 178, 0.1); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(86, 207, 178, 0.2); }
.progress-wrap { flex: 1; min-width: 160px; }
.progress-meta { font-size: 0.75rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 500; }
.progress-bar { height: 6px; background: rgba(0,0,0,0.3); border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; width: 0%; box-shadow: 0 0 10px rgba(86, 207, 178, 0.5); }
.score-badge { font-size: 0.8rem; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; white-space: nowrap; }
.score-c { color: var(--green); }
.score-w { color: var(--red); }

/* Quiz Layout */
.main { max-width: 880px; margin: 0 auto; padding: 24px 16px 64px; display: none; }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 24px; overflow: hidden; transition: border-color .3s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.q-card.answered-correct { border-color: rgba(52,211,153,.6); box-shadow: 0 8px 24px rgba(52,211,153,0.15); }
.q-card.answered-wrong   { border-color: rgba(248,113,113,.6); box-shadow: 0 8px 24px rgba(248,113,113,0.15); }

.q-head { display: flex; align-items: flex-start; gap: 12px; padding: 20px 20px 14px; }
.q-num { font-size: 0.75rem; font-weight: 700; letter-spacing: .05em; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.q-num span.original-id { color: var(--muted); font-weight: 500; font-size: 0.85em; margin-left: 6px; }
.q-text { font-size: 1rem; font-weight: 500; line-height: 1.6; flex: 1; }
.q-text u { text-decoration: underline; text-underline-offset: 3px; }
.q-status { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; opacity: 0; transition: opacity .3s; }
.q-status.show { opacity: 1; }
.q-status.correct-icon { background: var(--green); color: #0f1117; box-shadow: 0 0 10px rgba(52,211,153,0.5); }
.q-status.wrong-icon   { background: var(--red); color: #fff; box-shadow: 0 0 10px rgba(248,113,113,0.5); }

pre.code-block { 
  font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; line-height: 1.6; 
  background: rgba(0,0,0,0.4); border-left: 4px solid #4a5568; 
  padding: 16px 20px; margin: 0 20px 18px 20px; border-radius: 0 8px 8px 0; overflow-x: auto; color: #abb2bf; 
}
kw  { color: #c678dd; } fn  { color: #61afef; } bi  { color: #e5c07b; } num { color: #d19a66; } str, str * { color: #98c379 !important; } cmt, cmt * { color: #5c6370 !important; font-style: italic !important; } 

.options { padding: 0 20px 10px; display: grid; gap: 10px; }
.opt { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; cursor: pointer; transition: all .2s; font-size: 0.95rem; user-select: none; }
.opt:hover:not(.disabled) { border-color: var(--accent); background: rgba(124,106,247,0.15); transform: translateX(4px); }
.opt-key { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: all .2s; }
.opt-text { flex: 1; line-height: 1.5; }
.opt.correct { background: rgba(52,211,153,.15); border-color: var(--green); }
.opt.correct .opt-key { background: var(--green); color: #0f1117; }
.opt.wrong   { background: rgba(248,113,113,.15); border-color: var(--red); }
.opt.wrong   .opt-key { background: var(--red); color: #fff; }
.opt.disabled { cursor: default; }

.explanation { display: none; margin: 14px 20px 20px; padding: 14px 18px; background: rgba(124,106,247,.1); border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 0.9rem; line-height: 1.7; color: #d6dbf4; }
.explanation .exp-label { font-size: 0.75rem; font-weight: 700; letter-spacing: .08em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.explanation.show { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

#result-banner { display: none; background: rgba(26, 29, 39, 0.8); border: 1px solid var(--accent); border-radius: 16px; padding: 40px; text-align: center; margin-top: 30px; backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(124,106,247,0.2); }
.grade-ring { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; }
.grade-ring small { font-size: 0.7rem; font-weight: 600; color: var(--muted); }
#result-banner h2 { font-size: 1.8rem; margin-bottom: 10px; }
#result-banner p  { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
.btn-reset { margin-top: 24px; padding: 14px 32px; border-radius: 10px; background: linear-gradient(90deg, var(--accent), #6554e8); color: #fff; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; transition: all .3s; box-shadow: 0 6px 20px rgba(124,106,247,0.4); }
.btn-reset:hover { opacity: .9; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(124,106,247,0.6); }

@media (max-width: 600px) { 
  .progress-wrap { order: 3; min-width: 100%; margin-top: 10px; } 
  .header h1 { order: 2; margin-left: auto; margin-right: 0; } 
  .btn-exit { order: 1; margin-right: 10px; } 
  .timer-badge { order: 4; margin-top: 10px; margin-left: auto; }
}
</style>
</head>
<body>

<div id="start-menu">
  <div class="menu-box">
    <h2>🐍 Python Quiz Master</h2>
    <p>Chọn chế độ bạn muốn thử thách hôm nay</p>
    
    <button class="menu-btn" onclick="startQuiz(1)">
      <span>📘</span> Đề 1 - 100 Câu Cơ Bản (Cũ)
    </button>
    
    <button class="menu-btn" onclick="startQuiz(2)">
      <span>📙</span> Đề 2 - 100 Câu Nâng Cao (Từ PDF)
    </button>

    <button class="menu-btn" onclick="startQuiz(4)" style="border-color: var(--accent2);">
      <span>🧠</span> Đề 3 - 125 Câu Tư Duy Tính Toán
    </button>

    <button class="menu-btn" onclick="startQuiz(5)" style="border-color: #fbbf24;">
      <span>🏆</span> Đề 4 - 50 Câu Tư Duy Tính Toán (2025-2026)
    </button>
    
    <button class="menu-btn" onclick="startQuiz(6)" style="border-color: #f87171;">
      <span>🆕</span> Đề 5 - 61 Câu Bổ Sung Mới
    </button>
    
    <button class="menu-btn highlight" onclick="startQuiz(3)">
      <span>🎲</span> Đề Random Tổng Hợp (50 Câu)
    </button>

    <div style="display: flex; justify-content: center; margin-top: 24px;">
      <button id="btn-logout" class="btn-exit" onclick="logoutFirebase()" style="display: none; padding: 12px 24px; font-size: 0.95rem;">
        🚪 Đăng Xuất Khỏi Hệ Thống
      </button>
    </div>
  </div>
</div>

<header class="header" id="main-header">
  <div class="header-inner">
    <button class="btn-exit" onclick="location.reload()">🔙 Thoát</button>
    
    <h1 id="quiz-title">🐍 Python Quiz</h1>
    
    <div class="timer-badge" id="quiz-timer">⏱️ 00:00</div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-text">0 / 0 đã trả lời</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    
    <div class="score-badge">
      <span class="score-c">✓ <span id="cnt-c">0</span></span>
      &nbsp;&nbsp;
      <span class="score-w">✗ <span id="cnt-w">0</span></span>
    </div>
  </div>
</header>

<main class="main" id="main-content">
  <div id="quiz-container"></div>
  <div id="result-banner">
    <div class="grade-ring" id="grade-ring"><span id="grade-txt">—</span><small id="grade-total">/ 100</small></div>
    <h2 id="res-title"></h2>
    <p id="res-sub"></p>
    <p id="res-time" style="margin-top: 10px; color: var(--accent2); font-weight: 600;"></p>
    <button class="btn-reset" onclick="location.reload()">🔄 Chọn Đề Khác</button>
  </div>
</main>

<script>
// ==========================================
// DATA 1: 100 CÂU CƠ BẢN (CẬP NHẬT ĐẦY ĐỦ TỪ PDF)
// ==========================================
const rawQuizData1 = [
  { q: "Output của đoạn code sau? (Trace Code kỹ):", c: "x = 0\nfor i in range(1, 5):\n  for j in range(1, i):\n    if (i + j) % 2 == 0:\n      x += i\n    else:\n      x -= 1\nprint(x)", o: ["A. 2", "B. 4", "C. 3", "D. 5"], a: 2, e: "Dựa vào logic, vòng lặp tính toán x ra lần lượt: -1 -> 2 -> 1 -> 0 -> 4 -> 3. Kết quả là 3." },
  { q: "Output? (Short-circuit & Side Effects):", c: "a = [0]\ndef f(i):\n  a[0] += 1\n  return 0\n\nif f(0) and f(1):\n  pass\n\nprint(a[0])", o: ["A. 1", "B. 2", "C. 0", "D. Error"], a: 0, e: "Toán tử 'and' có tính chất short-circuit. Do f(0) trả về 0 (False), vế sau f(1) bị bỏ qua. Hàm f chỉ chạy 1 lần làm a[0] bằng 1." },
  { q: "Output? (For-Else & Break Logic):", c: "c = 0\nfor i in range(3):\n  for j in range(3):\n    if i == j:\n      break\n    c += 1\n  else:\n    c += 10\nprint(c)", o: ["A. 33", "B. 3", "C. 30", "D. 6"], a: 1, e: "Khối else của vòng lặp for chỉ chạy khi không có break. Ở đây j luôn gặp break khi j==i. Khối else không bao giờ chạy. c đếm số lần lặp: 0+1+2 = 3." },
  { q: "Output? (Chain Comparison):", c: "print(1 < x and x < 10 == 5 > 5)", o: ["A. True", "B. False", "C. Error", "D. 1"], a: 1, e: "Vì 10==5 là False, toàn bộ chuỗi logic AND phía sau dù viết dưới dạng chain comparison cũng trả về False." },
  { q: "Output? (While loop trick):", c: "i = 0\nwhile i < 3:\n  i += 1\n  if i == 2:\n    continue\nelse:\n  i += 10\nprint(i)", o: ["A. 3", "B. 12", "C. 13", "D. Loop vô hạn"], a: 2, e: "While kết thúc tự nhiên khi i đạt 3 (không bị break). Lúc này else chạy, i+=10. Kết quả 3+10=13." },
  { q: "Output? (Operator Precedence):", c: "print(3 + 2 ** 3 // 4 * 2)", o: ["A. 5", "B. 7", "C. 6", "D. 8"], a: 1, e: "Thứ tự: Lũy thừa -> Chia -> Nhân -> Cộng. 2**3=8. 8//4=2. 2*2=4. 3+4=7." },
  { q: "Output? (Nested List Comp):", c: "print(sum([i*j for i in range(3) for j in range(3) if i == j]))", o: ["A. 3", "B. 5", "C. 14", "D. 6"], a: 1, e: "Lấy các cặp i==j là (0,0), (1,1), (2,2). Tính tổng các tích: 0 + 1 + 4 = 5." },
  { q: "Output? (Boolean Arithmetic):", c: "print(True + True - False - True - False)", o: ["A. 1", "B. 0", "C. True", "D. -1"], a: 0, e: "Trong Python toán học: True=1, False=0. Phép toán: 1 + 1 - 0 - 1 - 0 = 1." },
  { q: "Output? (Unpacking):", c: "a, *b, c = range(5)\nprint(b)", o: ["A. [1, 2, 3, 4]", "B. [1, 2, 3]", "C. [2, 3, 4]", "D. (1, 2, 3)"], a: 1, e: "a nhận 0 (đầu), c nhận 4 (cuối). *b nhận mảng phần còn lại ở giữa là [1, 2, 3]." },
  { q: "Output? (Try-Finally Flow):", c: "def f():\n  try:\n    return 1\n  finally:\n    return 2\n\nprint(f())", o: ["A. 1", "B. 2", "C. Error", "D. None"], a: 1, e: "Khối finally luôn được ưu tiên thực thi kể cả khi try đã có lệnh return. Nên return 2 ghi đè return 1." },
  { q: "Late Binding Closure problem, Output?:", c: "funcs = [lambda: i for i in range(3)]\nprint([f() for f in funcs])", o: ["A. [0, 1, 2]", "B. [2, 2, 2]", "C. [0, 0, 0]", "D. Error"], a: 1, e: "Late Binding: Biến i bên trong lambda trỏ đến scope ngoài. Khi gọi hàm thì vòng lặp đã xong, i bằng 2. Cả 3 hàm đều trả về 2." },
  { q: "Output? (Default Mutability):", c: "def f(x, l=[]):\n  for i in range(x):\n    l.append(i * i)\n  return L\n\nf(2)\nprint(f(2))", o: ["A. [0, 1]", "B. [0, 1, 0, 1]", "C. [0, 1, 4, 9]", "D. Error"], a: 1, e: "Default array l=[] chỉ khởi tạo 1 lần. Lần 1 gọi f(2) l=[0,1]. Lần 2 gọi f(2) tiếp tục nhét thêm vào l cũ thành [0, 1, 0, 1]." },
  { q: "Output? (Global vs Local):", c: "x = 5\ndef f():\n  try:\n    print(x)\n    x = 10\n  except:\n    print('Error')\n\nf()", o: ["A. 5", "B. 10", "C. Error", "D. None"], a: 2, e: "Vì có lệnh x=10 bên trong hàm, Python xem x là biến local. Việc in x trước khi biến được gán cục bộ gây UnboundLocalError." },
  { q: "Output? (Nonlocal):", c: "def outer():\n  x = 'local'\n  def inner():\n    nonlocal x\n    x = 'nonlocal'\n  inner()\n  return x\n\nprint(outer())", o: ["A. local", "B. nonlocal", "C. global", "D. Error"], a: 1, e: "Từ khóa nonlocal cho phép hàm inner cập nhật trực tiếp biến x của scope outer thay vì tạo biến local mới." },
  { q: "Output? (Args packing):", c: "def f(*args, **kwargs):\n  print(len(args) + len(kwargs))\n\nf(1, 2, 3, x=4, y=5)", o: ["A. 5", "B. 4", "C. 3", "D. 2"], a: 0, e: "args là tuple (1,2,3) dài 3. kwargs là dict {x:4, y:5} dài 2. Tổng chiều dài 3+2=5." },
  { q: "Output? (Keyword Only Args):", c: "def f(a, *, b):\n  return a + b\n\ntry:\n  print(f(1, 2))\nexcept:\n  print('Error')", o: ["A. 3", "B. Error", "C. None", "D. 1"], a: 1, e: "Tham số sau dấu sao (*) bắt buộc phải gọi dạng keyword. Gọi f(1, 2) gây lỗi TypeError. Cần gọi f(1, b=2)." },
  { q: "Output? (Decorator execution order):", c: "def d(f):\n  print('Dec')\n  return f\n\n@d\ndef func():\n  pass\n\nprint('Call')", o: ["A. Call Dec", "B. Dec Call", "C. Call", "D. Dec"], a: 1, e: "Decorator chạy lập tức khi hàm được định nghĩa (parse time). In 'Dec' trước. Lệnh print('Call') chạy sau." },
  { q: "Output? (Recursion Trace):", c: "def f(n):\n  if n == 0:\n    return 0\n  return n - f(n-1)\n\nprint(f(3))", o: ["A. 3", "B. 2", "C. 1", "D. 0"], a: 1, e: "f(0)=0. f(1)=1-0=1. f(2)=2-1=1. f(3)=3-1=2." },
  { q: "Output? (Generator):", c: "def g():\n  yield 1\n  yield 2\n  return 3\n\nx = list(g())\nprint(x)", o: ["A. [1, 2, 3]", "B. [1, 2]", "C. [1, 2, None]", "D. Error"], a: 1, e: "Return trong Generator sẽ ngắt (raise StopIteration) mà không đưa giá trị 3 vào list." },
  { q: "Output? (Lambda scope):", c: "x = 10; y = 20\nlambdas = [lambda x: x + y, lambda y: x + y]\nx = 20; y = 10\nprint(lambdas[0](10), lambdas[1](10))", o: ["A. 20 30", "B. 30 30", "C. 20 20", "D. Error"], a: 0, e: "Lambda 1: x(10)+y(global_10) = 20. Lambda 2: x(global_20)+y(10) = 30." },
  { q: "Output? (id of Immutables):", c: "a = 256; b = 256\nc = 257; d = 257\nprint(a is b, c is d)", o: ["A. True True", "B. True False", "C. False False", "D. False True"], a: 1, e: "Integer cache trong CPython cấp sẵn vùng nhớ cho [-5, 256]. 256 thì trỏ chung bộ nhớ (True). 257 thì là 2 object độc lập (False)." },
  { q: "Output? (List Mutation Loop):", c: "a = [1, 2, 3]\nfor x in a:\n  if x == 3:\n    a.append(x + 1)\n  if len(a) > 5:\n    break\nprint(len(a))", o: ["A. 3", "B. 4", "C. 5", "D. Error"], a: 1, e: "Khi x=3, append(4) vào list. Vòng lặp duyệt tiếp tới 4, x=4!=3 nên dừng append. Len cuối là 4." },
  { q: "Output? (Dict Key Hashing):", c: "d = {}\nd[1] = 'Float'\nd[1.0] = 'Int'\nd[True] = 'Bool'\nprint(len(d), d[1.0])", o: ["A. 3 Bool", "B. 1 Bool", "C. 3 Float", "D. 2 Int"], a: 1, e: "Python coi 1 == 1.0 == True có chung mã băm Hash. Các key này ghi đè nhau, dict có chiều dài 1, lấy value cuối được gán là 'Bool'." },
  { q: "Output? (Set logic):", c: "print({1, True, 1.0})", o: ["A. {1, True, 1.0}", "B. {1}", "C. {1, 1, 1}", "D. Error"], a: 1, e: "Tương tự như Dict, Set loại bỏ các giá trị trùng lặp (1 == True == 1.0) và giữ lại object khởi tạo đầu tiên là 1." },
  { q: "Output? (Copying):", c: "a = [[1]] * 2\na[0][0] = 2\nprint(a)", o: ["A. [[2], [1]]", "B. [[2], [2]]", "C. [[1], [1]]", "D. Error"], a: 1, e: "Phép nhân list list*2 tạo tham chiếu nông (shallow copy) tới cùng 1 list con. Sửa 1 chỗ ảnh hưởng cả 2. Kết quả [[2], [2]]." },
  { q: "Output? (Deepcopy):", c: "import copy\na = [1, [2]]\nb = copy.deepcopy(a)\na[1].append(3)\nprint(b)", o: ["A. [1, [2]]", "B. [1, [2, 3]]", "C. [1, [2, 3], 3]", "D. Error"], a: 0, e: "Deepcopy tách hoàn toàn bộ nhớ của list con. Sửa a không làm b thay đổi. b giữ nguyên gốc [1, [2]]." },
  { q: "Output? (Dict Pop):", c: "d = {'a': 1}\nprint(d.pop('b', 2))", o: ["A. Error", "B. None", "C. 2", "D. 1"], a: 2, e: "pop(key, default) trả về giá trị mặc định nếu key không tồn tại. Key 'b' không có nên trả về 2." },
  { q: "Output? (Set & FrozenSet):", c: "a = {frozenset({1, 2}), frozenset({2, 1})}\nprint(len(a))", o: ["A. 2", "B. 1", "C. Error", "D. 0"], a: 1, e: "frozenset({1, 2}) và ({2, 1}) giống hệt nhau về nội dung. Set tự động gom loại bỏ trùng lặp nên độ dài còn 1." },
  { q: "Output? (String Formatting):", c: "x = 123.456\nprint(f'{x:06.1f}')", o: ["A. 0123.5", "B. 123.50", "C. 00123.5", "D. 123.4"], a: 0, e: ".1f làm tròn 1 chữ số là 123.5. Quy định chiều dài chuỗi là 6 và đệm bằng 0. 123.5 có 5 ký tự -> thêm một 0 ở đầu thành 0123.5." },
  { q: "Output? (List Slicing Step):", c: "a = [1, 2, 3, 4]\na[::2] = [10, 20, 30]\nprint(a)", o: ["A. [10, 1, 20, 3, 30]", "B. [10, 20, 30, 4]", "C. Error", "D. [10, 20, 30]"], a: 2, e: "Slicing nhảy bước [::2] chọn ra đúng 2 vị trí (index 0, 2). Cố nhồi 3 giá trị [10,20,30] vào 2 slot sẽ quăng ValueError." },
  { q: "Output? (Dictionary Compression collision):", c: "print({x: x*2 for x in range(3) for x in range(2)})", o: ["A. {0: 0, 1: 2}", "B. {0: 0, 1: 2, 2: 4}", "C. Error", "D. {0:0, 1: 2, 2: 4}"], a: 0, e: "Vòng for lồng nhau dùng chung biến x. Vòng inner range(2) luôn đè biến x thành 0 và 1. Dict cuối chỉ có {0: 0, 1: 2}." },
  { q: "Output? (Tuple +=):", c: "t = ([],)\ntry:\n  t[0].extend([1])\nexcept:\n  print('Err')\nprint(t)", o: ["A. ([1],)", "B. ([],)", "C. Error", "D. None"], a: 0, e: "Tuple là bất biến nhưng List nằm TRONG nó là mutable. Dùng extend can thiệp thẳng vào list hợp lệ. t biến thành ([1],)." },
  { q: "Output? (Complex Slicing):", c: "l = list(range(10))\nprint(l[2:8:2])", o: ["A. [2, 4, 6]", "B. [2, 3, 4]", "C. [2, 5, 8]", "D. [2, 4, 6, 8]"], a: 0, e: "Cắt list từ index 2 tới cận 8 nhảy bước 2. Tương ứng lấy các index: 2, 4, 6." },
  { q: "Output? (Sorting with key):", c: "l = ['a', 'ccc', 'bb']\nprint(sorted(l, key=lambda x: (len(x), x)))", o: ["A. ['a', 'ccc', 'bb']", "B. ['a', 'bb', 'ccc']", "C. ['ccc', 'bb', 'a']", "D. Error"], a: 1, e: "Sắp xếp ưu tiên độ dài len(x) trước. Kế tiếp mới tới bảng chữ cái. 'a' (1) -> 'bb' (2) -> 'ccc' (3)." },
  { q: "Output? (Max with default):", c: "print(max([], default=0))", o: ["A. Error", "B. None", "C. 0", "D. []"], a: 2, e: "Hàm max trên array rỗng bị lỗi, nhưng dùng tham số default=0 sẽ báo an toàn và trả về số 0." },
  { q: "Output? (Any/All empty):", c: "print(any([]), all([]))", o: ["A. False False", "B. True True", "C. False True", "D. True False"], a: 2, e: "any([]) cần ít nhất 1 cái True -> False. all([]) mặc định True nếu không có ai vi phạm (Vacuous truth)." },
  { q: "Output? (Bytes vs String):", c: "print(len(b\"abc\") == len(\"abc\"))", o: ["A. True", "B. False", "C. Error", "D. None"], a: 0, e: "Chuỗi byte 'abc' dài 3. Chuỗi string 'abc' chuẩn ASCII cũng dài 3 ký tự. len bằng nhau là True." },
  { q: "Output? (Map & Filter lazy):", c: "m = map(lambda x: x, [1])\nprint(m == [1])", o: ["A. True", "B. False", "C. Error", "D. None"], a: 1, e: "map trả về một Map Object dạng lazy iterator, không phải là List thực tế nên so sánh sẽ trả về False." },
  { q: "Output? (Range lazy):", c: "r = range(10**10)\nprint(len(r))", o: ["A. 10000000000", "B. MemoryError", "C. 10", "D. Error"], a: 0, e: "Range object trong Python 3 cực kì thông minh (chỉ tính toán đầu cuối chứ không bung hết ra RAM). Len chạy bình thường trả đúng chiều dài." },
  { q: "Output? (Type of Class):", c: "class A: pass\nprint(type(A))", o: ["A. class", "B. object", "C. type", "D. Error"], a: 2, e: "Mọi class tạo ra trong Python đều là instance của metaclass có tên là 'type'." },
  { q: "Output? (MRO Diamond):", c: "class A:\n  def f(self): return 1\n\nclass B(A): pass\n\nclass C(A):\n  def f(self): return 2\n\nclass D(B, C): pass\nprint(D().f())", o: ["A. 1", "B. 2", "C. Error", "D. Both"], a: 1, e: "C3 MRO đa kế thừa: D -> B -> C -> A. B không có hàm f, C có f (return 2). Nó chạy và dừng tại C." },
  { q: "Output? (Super with arguments):", c: "class A:\n  def __init__(self, x): self.x = x\n\nclass B(A):\n  def __init__(self, x): super().__init__(x + 1)\n\nprint(B(1).x)", o: ["A. 1", "B. 2", "C. 3", "D. 0"], a: 1, e: "Khởi tạo B truyền 1. B gọi init class A và nhét 1+1=2 vào. A set x=2. In ra 2." },
  { q: "Output? (Class variables shadowing):", c: "class A: x = 1\na = A(); b = A()\na.x = 2; A.x = 3\nprint(a.x, b.x)", o: ["A. 2 1", "B. 3 3", "C. 2 3", "D. 2 2"], a: 2, e: "a.x tạo biến riêng. A.x cập nhật biến chung cho mọi instance không có biến riêng (như b). Vậy a.x=2, b.x=3." },
  { q: "Output? (Private name mangling):", c: "class A:\n  __x = 1\n\nclass B(A): pass\n\ntry:\n  print(B().__x)\nexcept:\n  print('Err')", o: ["A. 1", "B. Err", "C. None", "D. 0"], a: 1, e: "Biến __x bị name mangling ẩn giấu thành _A__x. Truy cập thẳng .__x bị lỗi AttributeError." },
  { q: "Output? (Polymorphism exception):", c: "class A:\n  def __len__(self): return 0\n\nprint(bool(A()))", o: ["A. True", "B. False", "C. Error", "D. None"], a: 1, e: "Nếu thiếu hàm bool(), Python mượn hàm len() định giá. Trả về độ dài rỗng (0) đồng nghĩa class bị ép thành False." },
  { q: "Output? (isinstance vs type):", c: "class A: pass\nclass B(A): pass\n\nprint(isinstance(B(), A), type(B()) == A)", o: ["A. True True", "B. True False", "C. False True", "D. False False"], a: 1, e: "isinstance dò theo nhánh kế thừa đa hình (B con A -> True). Hàm type() thì so sánh cứng nhắc tuyệt đối tên gốc B != A (False)." },
  { q: "Output? (Static Method):", c: "class A:\n  @staticmethod\n  def f(x):\n    return x * 2\n\nprint(A.f(5))", o: ["A. 10", "B. Error", "C. None", "D. 5"], a: 0, e: "Static method đứng độc lập như hàm global không cần self hay cls, có thể gọi thẳng bằng tên class. Trả về 5*2=10." },
  { q: "Output? (Class Method factory):", c: "class A:\n  val = 1\n  @classmethod\n  def create(cls): return cls().val\nclass B(A):\n  val = 2\nprint(B.create())", o: ["A. 1", "B. 2", "C. Error", "D. None"], a: 1, e: "Khi gọi B.create(), cls chính là class B. Phương thức sẽ khởi tạo thực thể B() và gọi thuộc tính val của B, trả về 2." },
  { q: "Output? (Property decorator):", c: "class A:\n  @property\n  def x(self): return 1\na = A()\ntry: a.x = 2\nexcept: print('Err')", o: ["A. a.x becomes 2", "B. Err", "C. Nothing happens", "D. Crash"], a: 1, e: "Decorator @property tạo ra thuộc tính chỉ đọc (read-only) nếu không định nghĩa thêm setter. Cố gán a.x = 2 sẽ sinh lỗi." },
  { q: "Output? (slots):", c: "class A:\n  __slots__ = ['a']\na = A()\ntry: a.y = 1\nexcept: print('Err')", o: ["A. y is set", "B. Err", "C. None", "D. Warn"], a: 1, e: "__slots__ ngăn chặn việc tạo thêm thuộc tính động ngoài những thuộc tính đã khai báo. Gán a.y = 1 sẽ bị từ chối." },
  { q: "Output? (new vs init):", c: "class A:\n  def __new__(cls): return 1\n  def __init__(self): print('Init')\nprint(A())", o: ["A. Init 1", "B. 1", "C. None", "D. Error"], a: 1, e: "__new__ trả về số 1 (không phải là thực thể của lớp A), do đó hàm __init__ sẽ bị bỏ qua không bao giờ được gọi." },
  { q: "Output? (Metaclasses simple):", c: "print(type(int))", o: ["A. object", "B. None", "C. type", "D. int"], a: 2, e: "Mọi class trong Python, bao gồm cả các kiểu xây dựng sẵn như int, str, list đều được sinh ra từ metaclass gốc là 'type'." },
  { q: "Output? (Hashable):", c: "try:\n  s = {1, (2, [3])}\nexcept:\n  print('Err')", o: ["A. No error", "B. Err", "C. None", "D. Warn"], a: 1, e: "Tuple chứa một list mutable bên trong, khiến bản thân tuple đó mất đi tính bất biến (hashable) nên không thể đưa vào trong Set." },
  { q: "Output? (Equality):", c: "class A:\n  def __eq__(self, o): return True\nprint(A() == 1)", o: ["A. True", "B. False", "C. Error", "D. None"], a: 0, e: "Hàm __eq__ (toán tử so sánh bằng) đã bị override luôn trả về True with bất cứ object nào được đem ra so sánh." },
  { q: "Output? (Call method):", c: "class A:\n  def __call__(self): return 1\nprint(A()())", o: ["A. 1", "B. Error", "C. A object", "D. None"], a: 0, e: "A() tạo ra một đối tượng (instance). Cặp ngoặc tròn thứ hai () kích hoạt dunder method __call__, thực thi hàm và trả về 1." },
  { q: "Output? (Super MRO again):", c: "class A: pass\nclass B(A): pass\nclass C(A): pass\nclass D(B, C): pass\nprint([c.__name__ for c in D.__mro__])", o: ["A. ['D', 'B', 'A', 'C', 'object']", "B. ['D', 'B', 'C', 'A', 'object']", "C. ['D', 'C', 'B', 'A']", "D. ['D', 'B', 'C']"], a: 1, e: "Theo thuật toán C3 Linearization, MRO sẽ tìm trên nhánh trái trước (B), nhánh phải sau (C), rồi mới hội tụ về gốc chung (A), cuối cùng là object." },
  { q: "Output? (Del method):", c: "class A:\n  def __del__(self): print('Bye')\na = A()\ndel a", o: ["A. Bye", "B. Nothing", "C. Error", "D. None"], a: 0, e: "Lệnh del a giải phóng bộ nhớ của object ngay lập tức, tự động kích hoạt hàm dọn rác __del__ và in ra 'Bye'." },
  { q: "Output? (Abstract Method Instantiation):", c: "from abc import ABC, abstractmethod\nclass A(ABC):\n  @abstractmethod\n  def f(self): pass\ntry: A()\nexcept: print('Err')", o: ["A. Creates A", "B. Err", "C. None", "D. Crash"], a: 1, e: "Không thể khởi tạo thực thể trực tiếp từ một Abstract Base Class chứa các abstract method chưa được định nghĩa hoàn chỉnh." },
  { q: "Output? (Inheritance variable check):", c: "class A: x = 1\nclass B(A): pass\nB.x = 2\nprint(A.x, B.x)", o: ["A. 2 2", "B. 1 2", "C. 2 1", "D. None"], a: 1, e: "B.x = 2 gán giá trị mới cho biến lớp B, độc lập với lớp cha A. Giá trị của A.x vẫn được bảo toàn là 1." },
  { q: "Output? (Multiple Init):", c: "class A:\n  def __init__(self): print('A')\nclass B(A):\n  def __init__(self): print('B')\nB()", o: ["A. B A", "B. B", "C. A B", "D. Error"], a: 1, e: "Hàm __init__ của lớp B đã ghi đè hoàn toàn hàm __init__ của lớp cha A. Do không có lệnh gọi super(), chỉ chữ 'B' được in ra." },
  { q: "Độ phức tạp của đoạn code? \nfor i in range(n):\n  j = 1\n  while j < n:\n    j *= 2", c: "", o: ["A. O(n²)", "B. O(n log n)", "C. O(n)", "D. O(log n)"], a: 1, e: "Vòng lặp ngoài chạy n lần. Vòng lặp trong tăng j theo cấp số nhân (j *= 2) nên tốn log(n) bước. Tổng cộng: O(n log n)." },
  { q: "Độ phức tạp của hàm đệ quy sau? \ndef f(n):\n  if n <= 1: return 1\n  return f(n-1) + f(n-1)", c: "", o: ["A. O(n)", "B. O(n²)", "C. O(2^n)", "D. O(log n)"], a: 2, e: "Mỗi lần gọi hàm lại sinh ra thêm 2 nhánh gọi đệ quy mới. Tạo thành một cây nhị phân hoàn chỉnh với độ sâu n. Độ phức tạp là hàm mũ O(2^n)." },
  { q: "Cấu trúc dữ liệu nào tìm kiếm nhanh nhất trong trường hợp tổng quát (Average Case)?", c: "", o: ["A. List", "B. Dictionary (Hash Map)", "C. Tuple", "D. Ordered List"], a: 1, e: "Dictionary (Hash Map) có thời gian tra cứu trung bình là O(1) nhờ cơ chế định vị khóa bằng hàm băm (hash function)." },
  { q: "Thuật toán sắp xếp nào là Stable Sort (Sắp xếp ổn định)?", c: "", o: ["A. Quick Sort", "B. Merge Sort", "C. Heap Sort", "D. Selection Sort"], a: 1, e: "Merge Sort giữ nguyên thứ tự relative của các phần tử có giá trị bằng nhau sau khi sắp xếp, nên nó là Stable Sort." },
  { q: "Stack Overflow do đệ quy thường xảy ra do thiếu:", c: "", o: ["A. RAM", "B. Base case (Điều kiện dừng)", "C. CPU Speed", "D. Disk space"], a: 1, e: "Nếu thiếu điều kiện dừng (base case), đệ quy sẽ lặp vô tận, đắp liên tục các khung gọi hàm vào Call Stack cho tới khi tràn bộ nhớ." },
  { q: "Đệ quy có ưu điểm gì so với vòng lặp?", c: "", o: ["A. Chạy nhanh hơn", "B. Code gọn hơn với các bài toán chia nhỏ/cây", "C. Tốn ít bộ nhớ RAM hơn", "D. Không bao giờ gửi lỗi"], a: 1, e: "Đệ quy biểu diễn logic các bài toán chia để trị, đồ thị, thuật toán duyệt cây cực kỳ tự nhiên, thanh thoát và dễ hiểu." },
  { q: "Bài toán Tháp Hà Nội 3 tầng cần bao nhiêu bước tối thiểu?", c: "", o: ["A. 9", "B. 7", "C. 5", "D. 8"], a: 1, e: "Công thức số bước giải bài toán Tháp Hà Nội cho n tầng đĩa là (2^n) - 1. Với n=3, ta có 2^3 - 1 = 7 bước." },
  { q: "Tìm kiếm nhị phân trên mảng [1, 3, 5, 7, 9], tìm số 8. Các số được so sánh lần lượt ở mốc mid là:", c: "", o: ["A. 5, 7, 9", "B. 5, 7, 9 (Theo logic middle index floor)", "C. 1, 3, 5", "D. 9, 7, 5"], a: 1, e: "Vòng 1 mốc mid là 5. Vì 8 > 5 nên lấy nửa phải [7, 9]. Vòng 2 mid là 7. Vòng 3 mid là 9. Trả về không tìm thấy." },
  { q: "Phương thức sắp xếp list.sort() trong Python mặc định dùng thuật toán gì?", c: "", o: ["A. QuickSort", "B. Timsort", "C. MergeSort", "D. BubbleSort"], a: 1, e: "Timsort là thuật toán lai ghép đỉnh cao giữa Merge Sort và Insertion Sort, được tối ưu hóa đặc biệt cho dữ liệu thực tế." },
  { q: "So sánh độ phức tạp của phép toán 'x in collection' giữa list và set?", c: "", o: ["A. Ngang nhau", "B. List O(n), Set O(1)", "C. List O(1), Set O(n)", "D. List O(log n)"], a: 1, e: "List phải quét tuần tự từng phần tử một O(n). Set sử dụng bảng băm (hash table) giúp kiểm tra cực kỳ nhanh chóng trong O(1)." },
  { q: "Khi nào thực tế nên ưu tiên sử dụng Generator (yield) thay vì tạo ra toàn bộ List?", c: "", o: ["A. Khi cần truy cập ngẫu nhiên index", "B. Khi xử lý luồng dữ liệu lớn để tiết kiệm bộ nhớ RAM", "C. Khi cần sắp xếp", "D. Khi dữ liệu nhỏ"], a: 1, e: "Generator sinh ra dữ liệu theo từng nhịp (on-the-fly) thay vì nạp toàn bộ mảng khổng lồ vào RAM." },
  { q: "Độ phức tạp thời gian khi gọi hàm min() trên một tập Set là?", c: "", o: ["A. O(n)", "B. O(1)", "C. O(log n)", "D. O(n²)" ], a: 0, e: "Bản chất Set lưu trữ giá trị phân tán và không có thứ tự. Hàm min() bắt buộc phải quét rà soát toàn bộ Set O(n) để tìm phần tử nhỏ nhất." },
  { q: "Hàng đợi (Queue) giả lập bằng cấu trúc Python List có nhược điểm chí mạng gì khi dùng lệnh pop(0)?", c: "", o: ["A. Không có", "B. O(n) do phải dịch chuyển toàn bộ phần tử", "C. O(1)", "D. Không remove được"], a: 1, e: "Khi bóc phần tử đầu mảng, CPU phải đẩy toàn bộ các phần tử còn lại tụt về phía trước 1 bậc, gây tốn kém O(n) thời gian xử lý." },

  { q: "Giả sử a = 5, b = 10. Điều kiện nào sau đây sẽ trả về True?", c: "", o: ["A. a < b and a != 5", "B. a > b or a == 5", "C. a == b", "D. not (a < b)"], a: 1, e: "a<b and a!=5 → True and False = False. a>b or a==5 → False or True = True. a==b là False. not(a<b) là not True = False. Vậy chỉ phương án B đúng." },
  { q: "Luật truy cập: Nhân viên có thẻ → được vào. Khách có giấy mời → được vào. Các trường hợp khác → không được vào. Xét đoạn mã:", c: "def allow_access(is_employee, has_card, is_guest, has_invite):\n    if is_employee:\n        if has_card:\n            return True\n        else:\n            return False\n    if is_guest:\n        if has_invite:\n            return True\n        else:\n            return False\n    else:\n        return False\n\nprint(allow_access(True, False, True, True))", o: ["A. False - vì nhánh nhân viên trả về sớm, làm cho điều kiện khách không bao giờ được xét", "B. True - vì điều kiện khách có giấy mời vẫn được kiểm tra", "C. Lỗi runtime do thiếu kiểu dữ liệu", "D. True - vì cả hai điều kiện đều độc lập", "E. False - vì thiếu elif nên Python gán sai else"], a: 0, e: "Kết quả in ra là gì, và tại sao kết quả này không đúng với yêu cầu ban đầu? Vì is_employee=True nên hàm return False ngay trong nhánh đầu (has_card=False) và không bao giờ chạy tới việc kiểm tra is_guest, dù khách có giấy mời thật." },
  { q: "Xét đoạn mã:", c: "def grade(score):\n    if score >= 90:\n        return \"A\"\n    elif score >= 75:\n        return \"B\"\n    elif score >= 60:\n        return \"C\"\n    else:\n        return \"D\"", o: ["A. [90, 80, 75, 60]", "B. [89, 80, 74, 59]", "C. [60, 60, 60, 60]", "D. [100, 0]", "E. [95, 80, 65, 40]"], a: 4, e: "Tập test input nào dưới đây đảm bảo *bao phủ đầy đủ các nhánh* (mỗi nhánh if/elif/else được chạy ít nhất một lần)? [95, 80, 65, 40] cho điểm lần lượt rơi vào A (≥90), B (≥75), C (≥60), D (else) — bao phủ đủ cả 4 nhánh." },
  { q: "Cho đoạn mã python sau:", c: "nums = [2, 3, 5, 7, 11]\nres = 0\nfor i, v in enumerate(nums):\n    if i == 0:\n        continue\n    if v % nums[i-1] == 0:\n        res += 10\n    else:\n        res += (v - nums[i-1])\nprint(res)", o: ["A. 13", "B. 11", "C. 15", "D. 9", "E. 7"], a: 3, e: "Kết quả sau khi chạy đoạn code trên là: i=1: 3%2!=0 → res+=1; i=2: 5%3!=0 → res+=2; i=3: 7%5!=0 → res+=2; i=4: 11%7!=0 → res+=4. Tổng = 1+2+2+4 = 9." },
  { q: "Trong đoạn mã sau, kết quả được in ra là gì?", c: "def incr_list(nums):\n    for n in nums:\n        n = n+1\n    return nums\n\nlst = [6, 0, 7]\nprint(incr_list(lst))", o: ["A. [6, 0, 7]", "B. Không in ra gì", "C. Chương trình báo lỗi", "D. [6, 0, 7, 1, 1, 1]", "E. [7, 1, 8]"], a: 0, e: "Biến n chỉ là tham chiếu tạm trong vòng lặp; gán lại n = n+1 không thay đổi phần tử thực trong list gốc. Vậy list nums không đổi: [6, 0, 7]." },
  { q: "Hàm range(2, 10, 3) sẽ tạo ra dãy số nào sau đây?", c: "", o: ["A. 5, 8", "B. 2, 5, 8", "C. 2, 3, 4, 5, 6, 7, 8, 9", "D. 2, 5, 8, 11"], a: 1, e: "range(2, 10, 3) bắt đầu từ 2, bước nhảy 3, dừng trước 10: 2, 5, 8 (11 vượt quá 10 nên không có)." },
  { q: "Hàm xử lý chuỗi sau trả về kết quả gì?", c: "data = 'a1b2c3d4'\nres = ''\nfor char in data:\n    if char.isdigit():\n        res += str(int(char) * 2)\n    else:\n        res += char.upper()\nprint(res)", o: ["A. a2b4c6d8", "B. A1B2C3D4", "C. ABCD", "D. A2B4C6D8"], a: 3, e: "Mỗi chữ cái được viết hoa, mỗi chữ số được nhân 2: a→A, 1→2, b→B, 2→4, c→C, 3→6, d→D, 4→8. Kết quả: A2B4C6D8." },
  { q: "Cho đoạn mã python sau:", c: "def add(x, L=[]):\n    if L is None:\n        L = []\n    L.append(x)\n    return L\n\nprint(add(1), add(2), add(3))", o: ["A. Error", "B. [1] [1, 2] [1, 2, 3]", "C. [1] [2] [3]", "D. 1 2 3", "E. [1, 2, 3]"], a: 1, e: "Khối code bổ trợ kiểm tra giá trị khả biến mặc định. range(1,4) liên kết chung ô nhớ tạo kết quả nhồi dồn." },
  { q: "Kết quả của đoạn code sau là gì?", c: "s = 0\nfor i in range(1, 4):\n    s += i\nprint(s)", o: ["A. 10", "B. 6", "C. 12", "D. 3"], a: 1, e: "range(1,4) sinh 3 nhịp: 1, 2, 3. Tổng s = 1 + 2 + 3 = 6." },
  { q: "Cho đoạn mã sau:", c: "nums = [6, 0, 7]\nfor n in nums:\n    n = n + 1\nprint(nums)", o: ["A. [6, 0, 7, 1]", "B. [7, 1, 8]", "C. [6, 0, 7]", "D. Báo lỗi vì không thể cộng 1 cho phần tử trong list", "E. [6, 1, 7]"], a: 2, e: "Biến lặp n mang tính chất tham chiếu tạm thời, sửa n không làm suy chuyển list thô ban đầu." },
  { q: "Kết quả sau khi thực hiện chương trình sau:", c: "x = (i for i in range(3))\nfor i in x:\n    print(i)\nfor i in x:\n    print(i)", o: ["A. 0 1 2", "B. Error", "C. 0 1 2 0 1 2", "D. Không đáp án nào đúng"], a: 0, e: "Generator chỉ cày quét được một lần duy nhất. Vòng lặp thứ hai chạy trên generator rỗng nên không ra thêm dữ liệu." },
  { q: "Cho định nghĩa hàm sau:", c: "def check_value(n):\n    \"\"\"Kiểm tra số n.\n    Trả về True nếu n là số dương, ngược lại False.\"\"\"\n    return n > 0", o: ["A. Hàm trên sẽ gây lỗi AssertionError nếu ta truyền vào số 0", "B. assert check_value(-1) == True sẽ không gây ra lỗi", "C. Câu lệnh assert check_value(10) sẽ trả về kết quả là None ra màn hình", "D. assert check_value(5) == True sẽ không gây ra lỗi", "E. Docstring của hàm không cung cấp thông tin về giá trị trả về"], a: 3, e: "check_value(5) trả True hợp lệ logic, assert check_value(5) == True khớp hoàn toàn nên chạy trơn tru không báo lỗi." },
  { q: "Phát biểu nào mô tả đúng nhất về 'specification' (đặc tả) của một hàm?", c: "", o: ["A. Đặc tả mô tả hàm *làm gì* (hành vi), thường viết dưới dạng docstring: tham số, kết quả trả về, và điều kiện liên quan.", "B. Đặc tả chỉ cần viết sau khi đã code xong để 'cho đẹp'.", "C. Đặc tả chỉ gồm tên hàm và danh sách tham số (không cần mô tả).", "D. Đặc tả mô tả *cách* cài đặt chi tiết từng dòng lệnh trong hàm.", "E. Đặc tả là một file riêng, không liên quan đến docstring."], a: 0, e: "Đặc tả hàm giao ước chức năng (hành vi bên ngoài) bao gồm Input/Output, tách biệt với việc cài đặt mã nguồn chi tiết bên trong." },
  { q: "Đâu là output đoạn mã sau:", c: "def writer():\n    title = 'Sir'\n    name = (lambda x: title + ' ' + x)\n    return name\n\nwho = writer()\nprint(who('Arthur'))", o: ["A. Arthur Sir", "B. Arthur", "C. Không đáp án đúng", "D. Sir Arthur"], a: 3, e: "Hàm nặc danh lambda bọc lót closure giữ nguyên tham chiếu ô nhớ biến title='Sir'. who('Arthur') ghép chuỗi ra 'Sir Arthur'." },
  { q: "Yêu cầu: Nhập một chuỗi từ bàn phím, chuyển toàn bộ thành chữ thường, rồi in ra. Xét đoạn mã sau:", c: "text = input\nresult = text.lower\nprint(result)", o: ["A. In ra một object hàm - sai vì không gọi hàm", "B. In ra chuỗi người dùng nhập ở dạng chữ thường - đúng yêu cầu", "C. Không in gì", "D. In ra chuỗi người dùng nhập - sai vì thiếu .lower()", "E. Lỗi TypeError do lower không nhận tham số"], a: 0, e: "Do khuyết thiếu cặp ngoặc tròn `()`, trình thông dịch chỉ tham chiếu gán địa chỉ đối tượng hàm chứ không hề kích hoạt chạy lệnh." },
  { q: "Phân tích đoạn mã dưới đây. Khi thực thi, chương trình sẽ dừng lại (tung ra AssertionError) ở dòng nào?", c: "def power(base, exp):\n    if exp == 0: return 1\n    if exp < 0: return 1 / power(base, -exp)\n    return base * power(base, exp - 1)\n\n# Test cases\nassert power(2, 3) == 8        # Dòng 1\nassert power(5, 0) == 1        # Dòng 2\nassert power(2, -1) == 0.5     # Dòng 3\nassert power(-2, 2) == -4      # Dòng 4\nassert power(10, 2) == 100     # Dòng 5", o: ["A. Không có dòng nào, tất cả các test đều vượt qua.", "B. Dòng 3", "C. Dòng 5", "D. Dòng 4", "E. Dòng 1"], a: 3, e: "power(-2, 2) tính ra giá trị bằng số nguyên dương 4. Lệnh kiểm thử mong đợi kết quả -4 bị sai biệt logic gây ra AssertionError." },
  { q: "Kết quả thực hiện đoạn mã sau:", c: "total={}\ndef insert(items):\n    if items in total:\n        total[items] += 1\n    else:\n        total[items] = 1\n\ninsert('Apple')\ninsert('Ball')\ninsert('Apple')\nprint(len(total))", o: ["A. 1", "B. 2", "C. 0", "D. 3"], a: 1, e: "Dict total chỉ chứa đúng 2 key độc bản là 'Apple' (value=2) và 'Ball' (value=1). Do đó len(total) trả kết quả bằng 2." },
  { q: "Kết quả khi thực thi đoạn mã này là gì?", c: "counts = {\"apple\": 1, \"banana\": 2}\n\nfor fruit in counts:\n    if counts[fruit] > 1:\n        counts[\"orange\"] = 3\n    else:\n        counts[fruit] += 1\n\nprint(len(counts))", o: ["A. In ra 3", "B. Chương trình chạy vô hạn (Infinite loop)", "C. Chương trình báo lỗi RuntimeError: dictionary changed size during iteration", "D. In ra 2", "E. Chương trình báo lỗi KeyError: 'orange'"], a: 2, e: "Vòng lặp đang duyệt bảng băm d. Python cấm ngặt tuyệt đối hành vi gán thêm key mới làm co giãn kích thước từ điển khi đang iter, báo lỗi RuntimeError." },
  { q: "Kết quả của đoạn code sau là gì?", c: "s = {1, 2, 3}\nt = {3, 4}\nprint(s & t)", o: ["A. Lỗi cú pháp", "B. {1, 2, 3, 4}", "C. {1, 2, 4}", "D. {3}"], a: 3, e: "Toán tử & thực hiện phép toán Giao hai tập hợp (Intersection), trích xuất phần tử chung duy nhất xuất hiện ở cả đôi bên là 3." },
  { q: "Cho đoạn mã sau:", c: "d = {\"a\": 1, \"b\": 2}\nprint(d.get(\"c\", 0))", o: ["A. None", "B. \"c\"", "C. Báo lỗi TypeError", "D. Báo lỗi KeyError", "E. 0"], a: 4, e: "Key 'c' khuyết thiếu trong d, phương thức an toàn .get() điều hướng lấy tham số dự phòng thứ hai gán gỡ gạc lại là số 0." },
  { q: "Cho danh sách my_list = [10, 20, 30, 40, 50]. Cách nào sau đây sẽ lấy ra được đoạn [20, 30, 40]?", c: "my_list = [10, 20, 30, 40, 50]", o: ["A. my_list[2:5]", "B. my_list[1:4]", "C. my_list[1:-2]", "D. my_list[1:3]"], a: 1, e: "Cắt mảng tinh chỉnh mốc index khởi chạy từ vị trí số 1 lấy giá trị 20 và dừng trước vị trí số 4. Kết quả trả về [20, 30, 40]." },
  { q: "Kết quả in ra màn hình của đoạn code sau là gì?", c: "def update_record(rec):\n    rec['status'] = 'Active'\n    rec = {'id': 99, 'status': 'Pending'}\n    rec['status'] = 'Closed'\n\nmy_record = {'id': 1}\nupdate_record(my_record)\nprint(my_record.get('status'))", o: ["A. Pending", "B. None", "C. Active", "D. Closed"], a: 2, e: "Dòng lệnh đầu thay đổi trực tiếp vùng RAM mảng gốc. Lệnh `rec = ...` sau đó bẻ gãy biến cục bộ rec trỏ sang ô nhớ khác hoàn toàn, vô hại với my_record." },
  { q: "Cho mảng số nguyên A = [29, 10, 14, 37, 13]. Nếu sử dụng thuật toán Sắp xếp chọn (Selection Sort) để sắp xếp mảng theo thứ tự tăng dần, trạng thái của mảng sau 2 lần hoán đổi (swaps) đầu tiên là gì?", c: "", o: ["A. [10, 13, 14, 29, 37]", "B. [10, 13, 14, 37, 29]", "C. [10, 14, 29, 13, 37]", "D. [10, 13, 29, 37, 14]", "E. [10, 29, 14, 37, 13]"], a: 1, e: "Lượt 1 hoán đổi 10 lên đầu. Lượt 2 quét tìm số cực tiểu vùng còn lại là 13 đưa lên vị trí số hai thế chỗ cho số 29." },
  { q: "Đâu là phát biểu đúng về Linear search (tìm kiếm tuyến tính)?", c: "", o: ["A. Duyệt từng phần tử cho tới khi gặp mục tiêu hoặc hết danh sách", "B. Chỉ dùng cho danh sách đã sắp xếp", "C. Luôn có độ phức tạp O(log n)", "D. Luôn nhanh hơn tìm kiếm nhị phân (binary search)"], a: 0, e: "Thuật toán cày quét mò mẫm qua từng slot phần tử tuần tự từ đầu tới đáy danh sách cho đến khi bắt quả tang đối tượng." },
  { q: "Yêu cầu: Sắp xếp danh sách số theo thứ tự tăng dần bằng merge sort. Xét đoạn mã sau:", c: "def merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] < right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    return result\n\ndef merge_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    mid = len(arr) // 2\n    left = merge_sort(arr[:mid])\n    right = merge_sort(arr[mid:])\n    return merge(left, right)\n\nprint(merge_sort([3, 1, 4, 2]))", o: ["A. [1, 3, 4, 2] - sai do chia mảng sai", "B. [1] - sai vì các phần tử còn thừa không được ghép", "C. [3, 4] - sai vì chỉ ghép nửa đầu", "D. Lỗi IndexError", "E. [1, 2, 3, 4] - đúng với merge sort"], a: 1, e: "Hàm bổ trợ merge() bị khuyết thiếu block lệnh nối nạp nốt các phần tử còn dư sau khi vòng lặp rách lưới kết thúc, làm thất lạc số liệu." },
  { q: "Cho đoạn mã sau (giả sử arr đã tăng dần):", c: "def bs(arr, target):\n    lo, hi = 0, len(arr) - 1\n    while lo < hi:\n      mid = (lo + hi) // 2\n      if arr[mid] == target:\n        return mid\n      elif arr[mid] < target:\n        lo = mid + 1\n      else:\n        hi = mid\n    return -1", o: ["A. Trả về sai khi target ở giữa mảng", "B. Trả về sai khi mảng có số âm", "C. Không sai, luôn đúng với mảng tăng dần", "D. Trả về sai khi mảng có phần tử trùng nhau", "E. Trả về sai khi target đúng bằng phần tử cuối cùng của mảng"], a: 4, e: "Do đặt điều kiện `lo < hi` thay vì `<=`, thuật toán bỏ cuộc sớm không xét chu kỳ khi lo khớp hi, làm sai lệch kết quả khi phần tử nằm khóa đuôi." },
  { q: "Đoạn mã này có một lỗi logic ẩn khiến kết quả trả về bị thiếu dữ liệu. Đó là lỗi gì?", c: "def merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] < right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    # [VỊ TRÍ LỖI]\n    return result", o: ["A. Thiếu việc thêm các phần tử còn dư của mảng left hoặc right vào result.", "B. Biến i và j không được khởi tạo lại bằng 0 bên trong hàm.", "C. Kết quả result phải được sắp xếp lại bằng hàm sort().", "D. Vòng lặp while bị sai điều kiện, phải là or thay vì and.", "E. Phép so sánh left[i] < right[j] làm thuật toán không ổn định (unstable)."], a: 0, e: "Khi một trong đôi bên cạn kiệt phần tử trước, vòng lặp dừng ngay lập tức bỏ rơi đoạn đuôi còn lại chưa kịp nạp vào result mảng con." },
  { q: "Chương trình báo lỗi AttributeError: 'SmartDevice' object has no attribute 'brand'. Lỗi nằm ở dòng nào?", c: "class SmartDevice:\n    def __init__(self, brand, price):\n        brand = brand        # Dòng 1\n        self.price = price   # Dòng 2\n\n    def display(self):\n        print(f\"Brand: {self.brand}, Price: {self.price}\")  # Dòng 3\n\nphone = SmartDevice(\"UET-Phone\", 500)\nphone.display()", o: ["A. Dòng khởi tạo phone: Thiếu tham số truyền vào.", "B. Dòng 2: Không được gán trực tiếp giá trị vào self.price.", "C. Dòng 3: F-string không hỗ trợ truy cập thuộc tính đối tượng.", "D. Tên lớp SmartDevice không được viết hoa chữ cái đầu.", "E. Dòng 1: Thiếu từ khóa self. để tạo thuộc tính cho đối tượng."], a: 4, e: "Dòng 1 thiếu tiền tố điều hướng `self.brand` khiến Python hiểu lầm đây chỉ là biến gán cục bộ tạm thời, không đúc vào instance." },
  { q: "Biến Class (Class Variable) vs Biến Instance:", c: "class Dog:\n    kind = 'canine' # Class variable\n    def __init__(self, name):\n        self.name = name\n\nd1 = Dog('Fido')\nd2 = Dog('Buddy')\nd1.kind = 'wolf'\nprint(d1.kind, d2.kind)", o: ["A. canine wolf", "B. canine canine", "C. wolf wolf", "D. wolf canine"], a: 3, e: "Lệnh `d1.kind = 'wolf'` chỉ đắp thuộc tính biến động riêng biệt cho instance d1. Biến class kind của d2 vẫn nguyên vẹn 'canine'." },
  { q: "Đoạn mã Python sau sẽ cho ra kết quả gì?", c: "class Test:\n    def __init__(self, a=\"Hello World\"):\n        self.a = a\n    def display(self):\n        print(self.a)\n\nobj = Test()\nobj.display()", o: ["A. Không hiển thị gì", "B. Chương trình báo lỗi vì hàm tạo không thể có các tham số mặc định.", "C. \"Hello World\"", "D. Chương trình có chức năng hiển thị lỗi nhưng không có tham số."], a: 2, e: "Khởi tạo khuyết đối số truyền vào, hệ thống điều hướng nạp giá trị mặc định định sẵn gán vào in ra 'Hello World'." },

function startQuiz(mode) {
  document.getElementById('start-menu').style.display = 'none';
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('main-content').style.display = 'block';

  let clone1 = rawQuizData1.map((q, i) => ({ ...q, originalId: 'Đề 1 - Q' + (i + 1) }));
  let clone2 = rawQuizData2.map((q, i) => ({ ...q, originalId: 'Đề 2 - Q' + (i + 1) }));
  
  // Khai báo mảng rỗng phòng thủ nếu trước đó chưa gán biến này trong lòng file HTML chính để trang không bị crash
  let clone3 = (typeof rawQuizData3 !== 'undefined') ? rawQuizData3.map((q, i) => ({ ...q, originalId: 'Đề 3 - Q' + (i + 1) })) : [];
  let clone4 = rawQuizData4.map((q, i) => ({ ...q, originalId: 'Đề 4 - Q' + (i + 1) }));
  let clone5 = rawQuizData5.map((q, i) => ({ ...q, originalId: 'Đề 5 - Q' + (i + 1) }));
  
  if (mode === 1) {
    document.getElementById('quiz-title').textContent = "🐍 Quiz: Đề 1 Cơ Bản";
    quizData = clone1;
  } 
  else if (mode === 2) {
    document.getElementById('quiz-title').textContent = "🐍 Quiz: Đề 2 Nâng Cao";
    quizData = clone2;
  } 
  else if (mode === 4) {
    document.getElementById('quiz-title').textContent = "🧠 Quiz: Đề 3 Tư Duy Tính Toán";
    quizData = clone3;
  }
  else if (mode === 3) {
    document.getElementById('quiz-title').textContent = "🎲 Quiz: Random Tổng Hợp (50 Câu)";
    // Thuật toán gộp mảng liên kết sạch sẽ tài nguyên của cả 5 bộ đề
    let combined = clone1.concat(clone2).concat(clone3).concat(clone4).concat(clone5);
    shuffleArray(combined);
    quizData = combined.slice(0, 50);
  }
  else if (mode === 5) {
    document.getElementById('quiz-title').textContent = "🏆 Quiz: Tư Duy Tính Toán Kì 1";
    quizData = clone4;
  }
  else if (mode === 6) {
    document.getElementById('quiz-title').textContent = "🆕 Quiz: Đề 5 Bổ Sung Mới";
    quizData = clone5;
  }

  shuffleArray(quizData);
  totalQuestions = quizData.length;
  document.getElementById('grade-total').textContent = `/ ${totalQuestions}`;
  
  buildQuiz();
  updateProgress();

  // Khởi động đồng hồ
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  quizData.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + qi;
    const optHtml = q.o.map((opt, oi) => {
      const letter = ['A','B','C','D','E'][oi];
      const text = opt.replace(/^[A-E]\.\s*/, '');
      return `<div class="opt" id="opt-${qi}-${oi}" onclick="choose(${qi},${oi})">
        <div class="opt-key">${letter}</div><div class="opt-text">${esc(text)}</div>
      </div>`;
    }).join('');
    
    card.innerHTML = `
      <div class="q-head">
        <div class="q-num">Q${qi+1}<span class="original-id">(Nguồn: ${q.originalId})</span></div>
        <div class="q-text">${esc(q.q)}</div>
        <div class="q-status" id="st-${qi}"></div>
      </div>
      ${q.c ? `<pre class="code-block">${highlight(q.c)}</pre>` : ''}
      <div class="options" id="opts-${qi}">${optHtml}</div>
      <div class="explanation" id="exp-${qi}">
        <div class="exp-label">💡 Giải thích</div>${esc(q.e)}
      </div>`;
    container.appendChild(card);
  });
}

function choose(qi, oi) {
  const optsEl = document.getElementById('opts-' + qi);
  if (optsEl.dataset.done) return;
  optsEl.dataset.done = '1';
  const q = quizData[qi];
  const isCorrect = (oi === q.a);

  optsEl.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === q.a) el.classList.add('correct');
    else if (i === oi && !isCorrect) el.classList.add('wrong');
  });

  const st = document.getElementById('st-' + qi);
  st.textContent = isCorrect ? '✓' : '✗';
  st.className = 'q-status show ' + (isCorrect ? 'correct-icon' : 'wrong-icon');

  document.getElementById('card-' + qi).classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  document.getElementById('exp-' + qi).classList.add('show');

  answered++;
  if (isCorrect) correct++; else wrong++;
  updateProgress();
}

function updateProgress() {
  const pct = Math.round(answered / totalQuestions * 100) || 0;
  document.getElementById('prog-text').textContent = `${answered} / ${totalQuestions} đã trả lời`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('cnt-c').textContent = correct;
  document.getElementById('cnt-w').textContent = wrong;
}

function showResult() {
  clearInterval(timerInterval); // Dừng đồng hồ
  
  const pct = Math.round(correct / totalQuestions * 100);
  const ring = document.getElementById('grade-ring');
  let color, title, sub;
  if (pct >= 90)      { color='#34d399'; title='🏆 Xuất sắc!';  sub='Bạn nắm kiến thức cực kỳ vững vàng!'; }
  else if (pct >= 75) { color='#7c6af7'; title='🎉 Giỏi lắm!';  sub='Chỉ còn một ít cần ôn thêm.'; }
  else if (pct >= 55) { color='#fbbf24'; title='📚 Khá tốt!';   sub='Cần ôn lại một số chủ đề quan trọng.'; }
  else                { color='#f87171'; title='💪 Cố lên!';     sub='Hãy ôn lại và thử lại nhé!'; }

  ring.style.cssText += `;border:3px solid ${color};background:${color}22;color:${color}`;
  document.getElementById('grade-txt').textContent = correct;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = `Bạn đúng ${correct}/${totalQuestions} câu (${pct}%). ${sub}`;
  
  // Hiển thị thời gian hoàn thành
  const timeTaken = document.getElementById('quiz-timer').textContent.replace('⏱️ ', '');
  document.getElementById('res-time').textContent = `⏱️ Thời gian hoàn thành: ${timeTaken}`;

  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  setTimeout(() => banner.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
